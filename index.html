      <select class="match-sel" data-q="q6" data-ri="4"><option value="" disabled selected>Choose...</option><option value="A">A</option><option value="B">B</option><option value="C">C</option><option value="D">D</option><option value="E">E</option></select>
    </div></div>
      <div class="match-col-b"><div class="match-b-item"><span class="match-letter">A</span> A · Sterile saline — NO formalin (formalin destroys GeneXpert DNA)</div><div class="match-b-item"><span class="match-letter">B</span> B · 10% neutral buffered formalin for histology</div><div class="match-b-item"><span class="match-letter">C</span> C · Lower immediately — drain bottle above chest allows fluid to siphon back into pleural space</div><div class="match-b-item"><span class="match-letter">D</span> D · Foam dressing — designed for highly exuding wounds</div><div class="match-b-item"><span class="match-letter">E</span> E · 1% sodium hypochlorite 10–20 minutes contact time before wiping</div></div>
    </div>
  </div>
</div>
<div class="sec-hdr">C · MCQ</div>
<div class="q-card" data-id="q11">
  <div class="q-hdr"><span class="q-num">Q11</span><span class="diff diff-hard">hard</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>A patient&#39;s pack-year history: smokes 1.5 packs/day for 20 years + 5 bidi/day for 10 years. Total pack-years:</p><div class="opts"><button class="opt-btn" data-q="q11" data-val="A"><span class="opt-letter">A</span><span class="opt-text">30 pack-years</span></button><button class="opt-btn" data-q="q11" data-val="B"><span class="opt-letter">B</span><span class="opt-text">35 pack-years</span></button><button class="opt-btn" data-q="q11" data-val="C"><span class="opt-letter">C</span><span class="opt-text">35.25 pack-years (1.5×20) + (5 bidis=5 cigarettes=0.25 packs × 10 years = 2.5)</span></button><button class="opt-btn" data-q="q11" data-val="D"><span class="opt-letter">D</span><span class="opt-text">40 pack-years</span></button></div></div>
</div>
<div class="q-card" data-id="q12">
  <div class="q-hdr"><span class="q-num">Q12</span><span class="diff diff-hard">hard</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>Dorsogluteal IM injection site must be avoided because:</p><div class="opts"><button class="opt-btn" data-q="q12" data-val="A"><span class="opt-letter">A</span><span class="opt-text">It is technically difficult to locate</span></button><button class="opt-btn" data-q="q12" data-val="B"><span class="opt-letter">B</span><span class="opt-text">The absorption rate is unpredictable for most drugs</span></button><button class="opt-btn" data-q="q12" data-val="C"><span class="opt-letter">C</span><span class="opt-text">It risks injury to the sciatic nerve — ventrogluteal is the correct large-volume IM site</span></button><button class="opt-btn" data-q="q12" data-val="D"><span class="opt-letter">D</span><span class="opt-text">The patient cannot be positioned correctly for this site in OPD</span></button></div></div>
</div>
<div class="q-card" data-id="q13">
  <div class="q-hdr"><span class="q-num">Q13</span><span class="diff diff-medium">medium</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>Blood tubes must be mixed by:</p><div class="opts"><button class="opt-btn" data-q="q13" data-val="A"><span class="opt-letter">A</span><span class="opt-text">10 vigorous shakes — ensures anticoagulant is fully mixed</span></button><button class="opt-btn" data-q="q13" data-val="B"><span class="opt-letter">B</span><span class="opt-text">3–8 gentle inversions — shaking causes haemolysis</span></button><button class="opt-btn" data-q="q13" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Centrifuging at 1500 rpm for 2 minutes</span></button><button class="opt-btn" data-q="q13" data-val="D"><span class="opt-letter">D</span><span class="opt-text">No mixing needed for serum tubes — leave to clot undisturbed</span></button></div></div>
</div>
<div class="q-card" data-id="q14">
  <div class="q-hdr"><span class="q-num">Q14</span><span class="diff diff-hard">hard</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>The Aldrete Score must be ≥___ before discharge from bronchoscopy recovery. NPO after bronchoscopy is maintained until:</p><div class="opts"><button class="opt-btn" data-q="q14" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Score ≥8 · 1 hour post-procedure</span></button><button class="opt-btn" data-q="q14" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Score ≥9 · gag reflex has returned (minimum 2 hours)</span></button><button class="opt-btn" data-q="q14" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Score ≥7 · patient reports they are comfortable</span></button><button class="opt-btn" data-q="q14" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Score ≥9 · 4 hours post-procedure (same as pre-procedure NPO)</span></button></div></div>
</div>
<div class="q-card" data-id="q15">
  <div class="q-hdr"><span class="q-num">Q15</span><span class="diff diff-medium">medium</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>The 5-step bronchoscope reprocessing sequence is:</p><div class="opts"><button class="opt-btn" data-q="q15" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Manual clean → Leak test → Pre-clean → HLD → Store</span></button><button class="opt-btn" data-q="q15" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Pre-clean → Leak test → Manual clean → HLD → Dry/Store</span></button><button class="opt-btn" data-q="q15" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Leak test → Pre-clean → Manual clean → HLD → Dry/Store</span></button><button class="opt-btn" data-q="q15" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Pre-clean → Manual clean → HLD → Leak test → Store</span></button></div></div>
</div>
<div class="q-card" data-id="q16">
  <div class="q-hdr"><span class="q-num">Q16</span><span class="diff diff-easy">easy</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>During bronchoscope HLD, minimum immersion time in 2% glutaraldehyde is:</p><div class="opts"><button class="opt-btn" data-q="q16" data-val="A"><span class="opt-letter">A</span><span class="opt-text">10 minutes</span></button><button class="opt-btn" data-q="q16" data-val="B"><span class="opt-letter">B</span><span class="opt-text">15 minutes</span></button><button class="opt-btn" data-q="q16" data-val="C"><span class="opt-letter">C</span><span class="opt-text">20 minutes — this cannot be shortened under any circumstance</span></button><button class="opt-btn" data-q="q16" data-val="D"><span class="opt-letter">D</span><span class="opt-text">30 minutes for tuberculosis cases</span></button></div></div>
</div>
<div class="q-card" data-id="q17">
  <div class="q-hdr"><span class="q-num">Q17</span><span class="diff diff-easy">easy</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>Patient position for thoracoscopy is:</p><div class="opts"><button class="opt-btn" data-q="q17" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Supine with 30° head elevation</span></button><button class="opt-btn" data-q="q17" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Prone position to allow gravity-assisted access</span></button><button class="opt-btn" data-q="q17" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Lateral decubitus with the affected side up</span></button><button class="opt-btn" data-q="q17" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Sitting upright, leaning forward on a pillow</span></button></div></div>
</div>
<div class="q-card" data-id="q18">
  <div class="q-hdr"><span class="q-num">Q18</span><span class="diff diff-easy">easy</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>Maximum volume of pleural fluid that may be drained in a single sitting is:</p><div class="opts"><button class="opt-btn" data-q="q18" data-val="A"><span class="opt-letter">A</span><span class="opt-text">500 mL — risk of cardiac shift</span></button><button class="opt-btn" data-q="q18" data-val="B"><span class="opt-letter">B</span><span class="opt-text">1000 mL — standard practice</span></button><button class="opt-btn" data-q="q18" data-val="C"><span class="opt-letter">C</span><span class="opt-text">1500 mL — exceeding this risks re-expansion pulmonary oedema</span></button><button class="opt-btn" data-q="q18" data-val="D"><span class="opt-letter">D</span><span class="opt-text">2000 mL if drainage is gradual and patient is asymptomatic</span></button></div></div>
</div>
<div class="q-card" data-id="q19">
  <div class="q-hdr"><span class="q-num">Q19</span><span class="diff diff-easy">easy</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>ICD swinging (movement of water column with respiration) confirms:</p><div class="opts"><button class="opt-btn" data-q="q19" data-val="A"><span class="opt-letter">A</span><span class="opt-text">There is an active air leak from the lung</span></button><button class="opt-btn" data-q="q19" data-val="B"><span class="opt-letter">B</span><span class="opt-text">The drain is patent and the tube tip is in the intrapleural space</span></button><button class="opt-btn" data-q="q19" data-val="C"><span class="opt-letter">C</span><span class="opt-text">The lung has fully re-expanded and ICD can be removed</span></button><button class="opt-btn" data-q="q19" data-val="D"><span class="opt-letter">D</span><span class="opt-text">The drain bottle water level is correct at 2 cm</span></button></div></div>
</div>
<div class="q-card" data-id="q20">
  <div class="q-hdr"><span class="q-num">Q20</span><span class="diff diff-medium">medium</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>The correct wound cleaning solution for routine wound dressing is:</p><div class="opts"><button class="opt-btn" data-q="q20" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Betadine — broad spectrum antiseptic for all wounds</span></button><button class="opt-btn" data-q="q20" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Hydrogen peroxide — effective against anaerobes in deep wounds</span></button><button class="opt-btn" data-q="q20" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Normal saline only — betadine and H₂O₂ impair healing</span></button><button class="opt-btn" data-q="q20" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Chlorhexidine 2% — recommended by NABH for wound care</span></button></div></div>
</div>
<div class="q-card" data-id="q21">
  <div class="q-hdr"><span class="q-num">Q21</span><span class="diff diff-medium">medium</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>After a TB patient&#39;s consultation, the room must be cleaned with:</p><div class="opts"><button class="opt-btn" data-q="q21" data-val="A"><span class="opt-letter">A</span><span class="opt-text">70% alcohol wipe of all surfaces</span></button><button class="opt-btn" data-q="q21" data-val="B"><span class="opt-letter">B</span><span class="opt-text">1% sodium hypochlorite and HEPA vacuuming for Aspergillus-risk rooms</span></button><button class="opt-btn" data-q="q21" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Standard hospital disinfectant spray only</span></button><button class="opt-btn" data-q="q21" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Glutaraldehyde 2% — same as endoscope reprocessing</span></button></div></div>
</div>
<div class="q-card" data-id="q22">
  <div class="q-hdr"><span class="q-num">Q22</span><span class="diff diff-easy">easy</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>WHO 5 Moments of Hand Hygiene: which moment is often missed in outpatient settings?</p><div class="opts"><button class="opt-btn" data-q="q22" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Before patient contact</span></button><button class="opt-btn" data-q="q22" data-val="B"><span class="opt-letter">B</span><span class="opt-text">After touching patient surroundings — &#39;the 5th moment&#39; (e.g., wiping a chair, adjusting equipment)</span></button><button class="opt-btn" data-q="q22" data-val="C"><span class="opt-letter">C</span><span class="opt-text">After body fluid exposure</span></button><button class="opt-btn" data-q="q22" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Before aseptic tasks</span></button></div></div>
</div>
<div class="q-card" data-id="q23">
  <div class="q-hdr"><span class="q-num">Q23</span><span class="diff diff-hard">hard</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>Glutaraldehyde concentration must be tested with test strips because:</p><div class="opts"><button class="opt-btn" data-q="q23" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Glutaraldehyde degrades with use and time — below 1.5% it is ineffective against mycobacteria</span></button><button class="opt-btn" data-q="q23" data-val="B"><span class="opt-letter">B</span><span class="opt-text">High concentration above 3% causes scope damage</span></button><button class="opt-btn" data-q="q23" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Concentration testing is a NABH documentation requirement only — efficacy is unaffected by small variation</span></button><button class="opt-btn" data-q="q23" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Temperature of the solution affects the concentration reading</span></button></div></div>
</div>
<div class="q-card" data-id="q24">
  <div class="q-hdr"><span class="q-num">Q24</span><span class="diff diff-medium">medium</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>Pleural aspiration specimens must be labelled with:</p><div class="opts"><button class="opt-btn" data-q="q24" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Patient name and MRN only — specimen type is standard</span></button><button class="opt-btn" data-q="q24" data-val="B"><span class="opt-letter">B</span><span class="opt-text">LEFT or RIGHT side, date, time, MRN, and specimen type — side labelling is critical for pathology correlation</span></button><button class="opt-btn" data-q="q24" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Date and time only — the requesting form has all other details</span></button><button class="opt-btn" data-q="q24" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Specimen type and colour of fluid — clinical information for the lab</span></button></div></div>
</div>
<div class="q-card" data-id="q25">
  <div class="q-hdr"><span class="q-num">Q25</span><span class="diff diff-hard">hard</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>A nurse is donning PPE for bronchoscopy of a TB-suspect patient. She puts on gloves first, then gown, then N95, then goggles. What is wrong?</p><div class="opts"><button class="opt-btn" data-q="q25" data-val="A"><span class="opt-letter">A</span><span class="opt-text">N95 is not required — surgical mask is sufficient for suspected TB in a ventilated room</span></button><button class="opt-btn" data-q="q25" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Goggles are not required for bronchoscopy</span></button><button class="opt-btn" data-q="q25" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Donning sequence is wrong — correct order is gown → mask/N95 → goggles → gloves last</span></button><button class="opt-btn" data-q="q25" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Nothing is wrong — the order of donning does not affect contamination risk</span></button></div></div>
</div>
<div class="sec-hdr">D · True or False</div>
<div class="q-card" data-id="q26">
  <div class="q-hdr"><span class="q-num">Q26</span><span class="diff diff-medium">medium</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>Leaving the allergy field blank in HIS is equivalent to documenting NKDA (No Known Drug Allergy).</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q26" data-val="True">True</button>
    <button class="tf-btn" data-q="q26" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q27">
  <div class="q-hdr"><span class="q-num">Q27</span><span class="diff diff-easy">easy</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>Vaccine injection sites must not be massaged after administration.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q27" data-val="True">True</button>
    <button class="tf-btn" data-q="q27" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q28">
  <div class="q-hdr"><span class="q-num">Q28</span><span class="diff diff-hard">hard</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>A haemolysed blood sample can be reported with a documented reason for haemolysis if recollection is not possible.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q28" data-val="True">True</button>
    <button class="tf-btn" data-q="q28" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q29">
  <div class="q-hdr"><span class="q-num">Q29</span><span class="diff diff-easy">easy</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>The bronchoscope leak test must be performed before immersion in HLD solution.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q29" data-val="True">True</button>
    <button class="tf-btn" data-q="q29" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q30">
  <div class="q-hdr"><span class="q-num">Q30</span><span class="diff diff-easy">easy</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>Bronchoscopes should be stored hanging vertically with caps off in a ventilated cabinet.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q30" data-val="True">True</button>
    <button class="tf-btn" data-q="q30" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q31">
  <div class="q-hdr"><span class="q-num">Q31</span><span class="diff diff-medium">medium</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>Thoracoscopy fluid specimens are sent in sterile container only — EDTA tube is not required.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q31" data-val="True">True</button>
    <button class="tf-btn" data-q="q31" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q32">
  <div class="q-hdr"><span class="q-num">Q32</span><span class="diff diff-easy">easy</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>An ICD must never be clamped without a specific documented doctor&#39;s order.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q32" data-val="True">True</button>
    <button class="tf-btn" data-q="q32" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q33">
  <div class="q-hdr"><span class="q-num">Q33</span><span class="diff diff-medium">medium</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>Post-thoracocentesis erect CXR is mandatory only if the patient develops new symptoms during the procedure.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q33" data-val="True">True</button>
    <button class="tf-btn" data-q="q33" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q34">
  <div class="q-hdr"><span class="q-num">Q34</span><span class="diff diff-easy">easy</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>Normal saline is the only routine wound cleaning solution — betadine and hydrogen peroxide are for specific indications only.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q34" data-val="True">True</button>
    <button class="tf-btn" data-q="q34" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q35">
  <div class="q-hdr"><span class="q-num">Q35</span><span class="diff diff-medium">medium</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>Soiled wound dressing material must be disposed of in a red biomedical waste bag.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q35" data-val="True">True</button>
    <button class="tf-btn" data-q="q35" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q36">
  <div class="q-hdr"><span class="q-num">Q36</span><span class="diff diff-hard">hard</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>OPA (ortho-phthalaldehyde) requires a minimum of 20 minutes for HLD — the same as glutaraldehyde.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q36" data-val="True">True</button>
    <button class="tf-btn" data-q="q36" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q37">
  <div class="q-hdr"><span class="q-num">Q37</span><span class="diff diff-easy">easy</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>A TB-suspect patient should be scheduled as the last consultation slot of the day.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q37" data-val="True">True</button>
    <button class="tf-btn" data-q="q37" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q38">
  <div class="q-hdr"><span class="q-num">Q38</span><span class="diff diff-medium">medium</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>ABHR (alcohol-based hand rub) is appropriate for hands visibly contaminated with blood.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q38" data-val="True">True</button>
    <button class="tf-btn" data-q="q38" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q39">
  <div class="q-hdr"><span class="q-num">Q39</span><span class="diff diff-hard">hard</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>FiO₂ is mandatory on every ABG label because PO₂ cannot be clinically interpreted without knowing the inspired oxygen concentration.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q39" data-val="True">True</button>
    <button class="tf-btn" data-q="q39" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q40">
  <div class="q-hdr"><span class="q-num">Q40</span><span class="diff diff-medium">medium</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>ICD monitoring chart must be completed once per nursing shift.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q40" data-val="True">True</button>
    <button class="tf-btn" data-q="q40" data-val="False">False</button>
  </div></div>
</div>
<div class="sec-hdr">F · Identify the error</div>
<div class="q-card" data-id="q41">
  <div class="q-hdr"><span class="q-num">Q41</span><span class="diff diff-hard">hard</span><span class="q-type">Identify the Error</span></div>
  <div class="q-body"><p>Before bronchoscopy, Helen checks: consent signed ✓, NPO 4h solids/2h liquids ✓, IV cannula 20G inserted ✓, SpO₂ probe attached ✓, 4% lignocaine nebulised 15 min before ✓, platelet count 65,000 — cleared for BAL only per doctor ✓, emergency tray checked by nurse only.</p><div class="opts"><button class="opt-btn" data-q="q41" data-val="A"><span class="opt-letter">A</span><span class="opt-text">IV cannula gauge is insufficient — 16G is required for bronchoscopy</span></button><button class="opt-btn" data-q="q41" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Platelet count 65,000 is below 80,000 — biopsy cannot proceed but BAL is permitted above 50,000. This is correctly managed.</span></button><button class="opt-btn" data-q="q41" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Emergency tray must be verified and SIGNED OFF by BOTH nurse AND doctor before every procedure — nurse-only check is incomplete</span></button><button class="opt-btn" data-q="q41" data-val="D"><span class="opt-letter">D</span><span class="opt-text">4% lignocaine should be administered 30 minutes before scope, not 15 minutes</span></button></div></div>
</div>
<div class="q-card" data-id="q42">
  <div class="q-hdr"><span class="q-num">Q42</span><span class="diff diff-medium">medium</span><span class="q-type">Identify the Error</span></div>
  <div class="q-body"><p>During pleural aspiration, the nurse measures drainage every 250 mL. At 1200 mL the patient coughs and reports chest tightness. The nurse slows the drainage rate, alerts the doctor, and continues monitoring BP every 10 minutes.</p><div class="opts"><button class="opt-btn" data-q="q42" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Drainage should be measured every 500 mL, not 250 mL</span></button><button class="opt-btn" data-q="q42" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Cough and chest tightness = stop drainage immediately — not slow it. Alert doctor and cease drainage at that point.</span></button><button class="opt-btn" data-q="q42" data-val="C"><span class="opt-letter">C</span><span class="opt-text">BP monitoring every 10 minutes is too frequent — every 30 minutes is the standard</span></button><button class="opt-btn" data-q="q42" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Nothing is wrong — slowing the rate is the correct response to chest tightness</span></button></div></div>
</div>
<div class="q-card" data-id="q43">
  <div class="q-hdr"><span class="q-num">Q43</span><span class="diff diff-medium">medium</span><span class="q-type">Identify the Error</span></div>
  <div class="q-body"><p>Nurse Sandhiya responds to a blood spill: dons gloves and apron, mops the spill with a disposable cloth, pours 1% sodium hypochlorite, waits 10 minutes, wipes again, discards in yellow bag, removes PPE, performs hand hygiene.</p><div class="opts"><button class="opt-btn" data-q="q43" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Goggles should also be worn — the PPE was incomplete</span></button><button class="opt-btn" data-q="q43" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Spill must be CONTAINED first with absorbent material working outside-in, THEN disinfectant applied — mopping first spreads the spill</span></button><button class="opt-btn" data-q="q43" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Contact time should be 20 minutes, not 10 minutes — the disinfection was insufficient</span></button><button class="opt-btn" data-q="q43" data-val="D"><span class="opt-letter">D</span><span class="opt-text">The contaminated material should go in a red bag, not yellow</span></button></div></div>
</div>
<div class="q-card" data-id="q44">
  <div class="q-hdr"><span class="q-num">Q44</span><span class="diff diff-hard">hard</span><span class="q-type">Identify the Error</span></div>
  <div class="q-body"><p>During bronchoscopy of a TB-suspect patient: scrub nurse wears N95 ✓, circulating nurse wears surgical mask (room is ventilated), vitals logged every 5 min ✓, bronchoscopy BAL specimen placed in sterile saline ✓, biopsy placed in 10% formalin ✓, specimens dispatched after 45 minutes post-procedure.</p><div class="opts"><button class="opt-btn" data-q="q44" data-val="A"><span class="opt-letter">A</span><span class="opt-text">BAL specimen container is wrong — should be CytoLyt for cytology</span></button><button class="opt-btn" data-q="q44" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Circulating nurse should also wear N95 — all staff in the room during TB bronchoscopy require N95, not surgical mask</span></button><button class="opt-btn" data-q="q44" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Specimen dispatch at 45 minutes exceeds the 30-minute limit</span></button><button class="opt-btn" data-q="q44" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Both B and C are errors — but B is the patient safety error and C is the specimen handling error</span></button></div></div>
</div>
<div class="q-card" data-id="q45">
  <div class="q-hdr"><span class="q-num">Q45</span><span class="diff diff-hard">hard</span><span class="q-type">Identify the Error</span></div>
  <div class="q-body"><p>Patient with ICD in situ is being transferred by wheelchair to radiology. The drain bottle is placed on the patient&#39;s lap (at chest level). On return, nurse Divya notices subcutaneous emphysema at the tube site and documents it in nursing notes. She does not alert the doctor as it was present before transfer.</p><div class="opts"><button class="opt-btn" data-q="q45" data-val="A"><span class="opt-letter">A</span><span class="opt-text">ICD drain bottle must ALWAYS be below chest level — placing it on the patient&#39;s lap during transfer allows fluid to siphon back</span></button><button class="opt-btn" data-q="q45" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Subcutaneous emphysema at the ICD site is a new finding and must be reported to the doctor immediately — not just documented</span></button><button class="opt-btn" data-q="q45" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Both A and B are errors — bottle on lap is the immediate safety risk and new subcutaneous emphysema requires immediate doctor alert</span></button><button class="opt-btn" data-q="q45" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Subcutaneous emphysema around an ICD tube is expected and does not need immediate reporting</span></button></div></div>
</div>
<div class="sec-hdr">G · Scenario</div>
<div class="q-card" data-id="q46">
  <div class="q-hdr"><span class="q-num">Q46</span><span class="diff diff-easy">easy</span><span class="q-type">Scenario</span></div>
  <div class="q-body"><p>A patient walks into OPD coughing continuously. What is the receptionist AND nurse&#39;s first action?</p><div class="opts"><button class="opt-btn" data-q="q46" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Register the patient first — triage happens after documentation</span></button><button class="opt-btn" data-q="q46" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Give the patient a surgical mask at OPD entry immediately — this is the first line of respiratory transmission prevention before any clinical assessment</span></button><button class="opt-btn" data-q="q46" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Take the patient directly to an isolation room — all coughing patients are TB suspects</span></button><button class="opt-btn" data-q="q46" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Ask the patient to wait outside until a doctor is available</span></button></div></div>
</div>
<div class="q-card" data-id="q47">
  <div class="q-hdr"><span class="q-num">Q47</span><span class="diff diff-medium">medium</span><span class="q-type">Scenario</span></div>
  <div class="q-body"><p>Post-bronchoscopy, a patient passes gag reflex test at 90 minutes. They request water. Aldrete Score is 8. What is correct?</p><div class="opts"><button class="opt-btn" data-q="q47" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Allow water — gag reflex has returned and 90 minutes is adequate</span></button><button class="opt-btn" data-q="q47" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Two issues: Aldrete Score must be ≥9 for discharge/oral intake, and NPO minimum is 2 hours regardless of gag reflex. Do not allow water yet.</span></button><button class="opt-btn" data-q="q47" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Allow sips of water only — solid food restriction is the 2-hour rule</span></button><button class="opt-btn" data-q="q47" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Aldrete 8 is adequate for oral fluids — the ≥9 threshold applies to discharge only</span></button></div></div>
</div>
<div class="q-card" data-id="q48">
  <div class="q-hdr"><span class="q-num">Q48</span><span class="diff diff-medium">medium</span><span class="q-type">Scenario</span></div>
  <div class="q-body"><p>During wound dressing of a healing surgical wound, the nurse notes it is granulating well with minimal exudate. Which dressing?</p><div class="opts"><button class="opt-btn" data-q="q48" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Antimicrobial dressing — all surgical wounds are at infection risk</span></button><button class="opt-btn" data-q="q48" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Foam dressing — for moderate to heavy exudate</span></button><button class="opt-btn" data-q="q48" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Hydrocolloid dressing — appropriate for granulating wounds with minimal exudate</span></button><button class="opt-btn" data-q="q48" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Non-adherent dressing — used for suture lines, not granulating tissue</span></button></div></div>
</div>
<div class="q-card" data-id="q49">
  <div class="q-hdr"><span class="q-num">Q49</span><span class="diff diff-hard">hard</span><span class="q-type">Scenario</span></div>
  <div class="q-body"><p>An ICD patient&#39;s water column has stopped swinging on day 2. SpO₂ is 94%, no respiratory distress. What does this mean and what should you do?</p><div class="opts"><button class="opt-btn" data-q="q49" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Lung has re-expanded — prepare for ICD removal</span></button><button class="opt-btn" data-q="q49" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Swinging stops when lung is fully expanded OR when tube is blocked/kinked. Check tube position and patency first, then alert doctor — do not assume re-expansion without clinical correlation and CXR.</span></button><button class="opt-btn" data-q="q49" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Air leak has resolved — document and monitor</span></button><button class="opt-btn" data-q="q49" data-val="D"><span class="opt-letter">D</span><span class="opt-text">The drain bottle water level is too high — lower it by 1 cm and reassess</span></button></div></div>
</div>
<div class="q-card" data-id="q50">
  <div class="q-hdr"><span class="q-num">Q50</span><span class="diff diff-hard">hard</span><span class="q-type">Scenario</span></div>
  <div class="q-body"><p>A patient has a pleural biopsy during bronchoscopy. Post-procedure at 75 minutes: Aldrete Score 9, gag reflex intact, SpO₂ 95% room air. The patient develops increasing breathlessness and the nurse notes reduced breath sounds on the right. What is the priority action?</p><div class="opts"><button class="opt-btn" data-q="q50" data-val="A"><span class="opt-letter">A</span><span class="opt-text">This is expected post-bronchoscopy breathlessness — administer oxygen and reassess in 30 minutes</span></button><button class="opt-btn" data-q="q50" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Pneumothorax post-biopsy — alert doctor IMMEDIATELY. This is a post-bronchoscopy biopsy complication. Do not wait. Erect CXR is needed urgently. Prepare ICD tray as a precaution.</span></button><button class="opt-btn" data-q="q50" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Increase oxygen flow and recheck SpO₂ in 5 minutes before alerting doctor</span></button><button class="opt-btn" data-q="q50" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Administer bronchodilator nebulisation — this may be bronchospasm post-procedure</span></button></div></div>
</div>`,

<div class="q-card" data-id="q11">
  <div class="q-hdr"><span class="q-num">Q11</span><span class="diff diff-hard">hard</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>A pharmacist dispenses Seretide 250 instead of Seretide 125. This is an example of:</p><div class="opts"><button class="opt-btn" data-q="q11" data-val="A"><span class="opt-letter">A</span><span class="opt-text">A near-miss — no harm reached the patient</span></button><button class="opt-btn" data-q="q11" data-val="B"><span class="opt-letter">B</span><span class="opt-text">A LASA wrong-strength error — strength substitution without prescriber approval is a dispensing error</span></button><button class="opt-btn" data-q="q11" data-val="C"><span class="opt-letter">C</span><span class="opt-text">An acceptable therapeutic substitution — both contain fluticasone/salmeterol</span></button><button class="opt-btn" data-q="q11" data-val="D"><span class="opt-letter">D</span><span class="opt-text">A correct clinical decision — higher dose provides better control</span></button></div></div>
</div>
<div class="q-card" data-id="q12">
  <div class="q-hdr"><span class="q-num">Q12</span><span class="diff diff-hard">hard</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>A patient on Symbicort MART uses the inhaler as both maintenance and reliever. The pharmacist&#39;s counselling must include:</p><div class="opts"><button class="opt-btn" data-q="q12" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Use only as reliever — do not use regularly</span></button><button class="opt-btn" data-q="q12" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Use regularly morning and evening; use additional puffs for relief as prescribed — document total daily puffs taken</span></button><button class="opt-btn" data-q="q12" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Switch to a separate reliever inhaler — MART therapy is for hospital use only</span></button><button class="opt-btn" data-q="q12" data-val="D"><span class="opt-letter">D</span><span class="opt-text">MART therapy only works if used twice daily; as-needed use is not evidence-based</span></button></div></div>
</div>
<div class="q-card" data-id="q13">
  <div class="q-hdr"><span class="q-num">Q13</span><span class="diff diff-medium">medium</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>WHO 5 Rights of medication verification must be checked:</p><div class="opts"><button class="opt-btn" data-q="q13" data-val="A"><span class="opt-letter">A</span><span class="opt-text">At the start of each shift for all dispensing staff</span></button><button class="opt-btn" data-q="q13" data-val="B"><span class="opt-letter">B</span><span class="opt-text">For all new prescriptions only — repeat prescriptions are already verified</span></button><button class="opt-btn" data-q="q13" data-val="C"><span class="opt-letter">C</span><span class="opt-text">ALOUD before every single dispensing episode — never a silent mental check</span></button><button class="opt-btn" data-q="q13" data-val="D"><span class="opt-letter">D</span><span class="opt-text">For Schedule H and H1 drugs only</span></button></div></div>
</div>
<div class="q-card" data-id="q14">
  <div class="q-hdr"><span class="q-num">Q14</span><span class="diff diff-hard">hard</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>A patient on triple therapy (ICS/LABA + LAMA) asks the pharmacist which inhaler to use first. Correct sequence:</p><div class="opts"><button class="opt-btn" data-q="q14" data-val="A"><span class="opt-letter">A</span><span class="opt-text">ICS/LABA first — then LAMA to lock in bronchodilation</span></button><button class="opt-btn" data-q="q14" data-val="B"><span class="opt-letter">B</span><span class="opt-text">LAMA first — then ICS/LABA; this minimises anticholinergic effect on ICS absorption</span></button><button class="opt-btn" data-q="q14" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Any order — there is no pharmacokinetic reason to sequence inhalers</span></button><button class="opt-btn" data-q="q14" data-val="D"><span class="opt-letter">D</span><span class="opt-text">ICS first — reduces airway inflammation before bronchodilators</span></button></div></div>
</div>
<div class="q-card" data-id="q15">
  <div class="q-hdr"><span class="q-num">Q15</span><span class="diff diff-medium">medium</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>The most common mistake when counselling Tiotropium Handihaler patients:</p><div class="opts"><button class="opt-btn" data-q="q15" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Forgetting to tell them to rinse mouth after use</span></button><button class="opt-btn" data-q="q15" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Not warning about photosensitivity</span></button><button class="opt-btn" data-q="q15" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Patient swallows the capsule instead of loading it in the device</span></button><button class="opt-btn" data-q="q15" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Instructing patients to take it twice daily instead of once daily</span></button></div></div>
</div>
<div class="q-card" data-id="q16">
  <div class="q-hdr"><span class="q-num">Q16</span><span class="diff diff-easy">easy</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>V-A category drugs in pulmonology include (select all that apply — choose the complete list):</p><div class="opts"><button class="opt-btn" data-q="q16" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Adrenaline, salbutamol MDI, IV hydrocortisone, IV aminophylline</span></button><button class="opt-btn" data-q="q16" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Adrenaline and salbutamol only</span></button><button class="opt-btn" data-q="q16" data-val="C"><span class="opt-letter">C</span><span class="opt-text">All NLEM drugs in the pulmonology formulary</span></button><button class="opt-btn" data-q="q16" data-val="D"><span class="opt-letter">D</span><span class="opt-text">HADs only — adrenaline and methotrexate</span></button></div></div>
</div>
<div class="q-card" data-id="q17">
  <div class="q-hdr"><span class="q-num">Q17</span><span class="diff diff-easy">easy</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>Minimum preferred shelf life of drugs received from a supplier is:</p><div class="opts"><button class="opt-btn" data-q="q17" data-val="A"><span class="opt-letter">A</span><span class="opt-text">6 months — drugs with less than 6 months are rejected</span></button><button class="opt-btn" data-q="q17" data-val="B"><span class="opt-letter">B</span><span class="opt-text">12 months from receipt date</span></button><button class="opt-btn" data-q="q17" data-val="C"><span class="opt-letter">C</span><span class="opt-text">18 months from receipt date (preferred); reject if less than 6 months</span></button><button class="opt-btn" data-q="q17" data-val="D"><span class="opt-letter">D</span><span class="opt-text">No minimum — expiry date is checked at dispensing only</span></button></div></div>
</div>
<div class="q-card" data-id="q18">
  <div class="q-hdr"><span class="q-num">Q18</span><span class="diff diff-easy">easy</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>The Form ADR-1 patient detail section must contain:</p><div class="opts"><button class="opt-btn" data-q="q18" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Patient name, MRN, drug, and reaction description</span></button><button class="opt-btn" data-q="q18" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Age, sex (NOT name/MRN — anonymised), drug suspected, reaction, causality</span></button><button class="opt-btn" data-q="q18" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Full patient demographics including address for follow-up</span></button><button class="opt-btn" data-q="q18" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Only the drug name and reaction — patient details are confidential</span></button></div></div>
</div>
<div class="q-card" data-id="q19">
  <div class="q-hdr"><span class="q-num">Q19</span><span class="diff diff-medium">medium</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>An actual medication error that reached the patient requires:</p><div class="opts"><button class="opt-btn" data-q="q19" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Report to the pharmacist-in-charge only — internal review</span></button><button class="opt-btn" data-q="q19" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Immediately inform the physician + document in Medication Error AND Incident Register + RCA within 72 hours</span></button><button class="opt-btn" data-q="q19" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Document in Medication Error Register within 24 hours — physician informed only if patient is symptomatic</span></button><button class="opt-btn" data-q="q19" data-val="D"><span class="opt-letter">D</span><span class="opt-text">File an anonymous report — blame-free culture means no named reporting</span></button></div></div>
</div>
<div class="q-card" data-id="q20">
  <div class="q-hdr"><span class="q-num">Q20</span><span class="diff diff-medium">medium</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>ICS counselling: &#39;Take morning and evening even if feeling well.&#39; Why is this important?</p><div class="opts"><button class="opt-btn" data-q="q20" data-val="A"><span class="opt-letter">A</span><span class="opt-text">ICS acts as a rescue inhaler if taken regularly</span></button><button class="opt-btn" data-q="q20" data-val="B"><span class="opt-letter">B</span><span class="opt-text">ICS controls underlying airway inflammation — symptoms improve before inflammation is controlled; stopping causes relapse</span></button><button class="opt-btn" data-q="q20" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Twice daily timing ensures 12-hour bronchodilation coverage</span></button><button class="opt-btn" data-q="q20" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Morning dosing prevents exercise-induced bronchospasm</span></button></div></div>
</div>
<div class="q-card" data-id="q21">
  <div class="q-hdr"><span class="q-num">Q21</span><span class="diff diff-hard">hard</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>A patient on high-dose ICS for 2 years develops easy bruising and central obesity. This is most likely:</p><div class="opts"><button class="opt-btn" data-q="q21" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Cushing&#39;s syndrome from systemic corticosteroid absorption — ICS at high dose long-term causes adrenal suppression; this is an ADR that must be reported to PvPI</span></button><button class="opt-btn" data-q="q21" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Expected cosmetic side effect — ICS is safe at all doses</span></button><button class="opt-btn" data-q="q21" data-val="C"><span class="opt-letter">C</span><span class="opt-text">The patient is also taking oral steroids — this must be from oral rather than inhaled steroids</span></button><button class="opt-btn" data-q="q21" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Unrelated to ICS — ICS has only local effects in the airway</span></button></div></div>
</div>
<div class="q-card" data-id="q22">
  <div class="q-hdr"><span class="q-num">Q22</span><span class="diff diff-easy">easy</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>Empty MDI canisters must:</p><div class="opts"><button class="opt-btn" data-q="q22" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Be placed in the yellow pharmaceutical waste bag</span></button><button class="opt-btn" data-q="q22" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Never be crushed or punctured (pressurised — explosion risk); actuate completely to empty; separate from cytotoxic waste</span></button><button class="opt-btn" data-q="q22" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Be returned to the manufacturer for safe disposal</span></button><button class="opt-btn" data-q="q22" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Be placed in the sharps container — metal pressurised containers</span></button></div></div>
</div>
<div class="q-card" data-id="q23">
  <div class="q-hdr"><span class="q-num">Q23</span><span class="diff diff-hard">hard</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>A new patient prescribed pirfenidone for IPF asks why she needs a sunscreen. The correct explanation:</p><div class="opts"><button class="opt-btn" data-q="q23" data-val="A"><span class="opt-letter">A</span><span class="opt-text">IPF patients are immunocompromised and susceptible to UV damage</span></button><button class="opt-btn" data-q="q23" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Pirfenidone causes photosensitivity — severe rash on sun-exposed areas; SPF50+ sunscreen daily is mandatory, not optional</span></button><button class="opt-btn" data-q="q23" data-val="C"><span class="opt-letter">C</span><span class="opt-text">All antifibrotic drugs cause photosensitivity — this is a class effect</span></button><button class="opt-btn" data-q="q23" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Sunscreen prevents interaction between UV light and pirfenidone molecules in the skin</span></button></div></div>
</div>
<div class="q-card" data-id="q24">
  <div class="q-hdr"><span class="q-num">Q24</span><span class="diff diff-medium">medium</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>Non-NLEM drug prescriptions require approval from:</p><div class="opts"><button class="opt-btn" data-q="q24" data-val="A"><span class="opt-letter">A</span><span class="opt-text">The senior pharmacist only</span></button><button class="opt-btn" data-q="q24" data-val="B"><span class="opt-letter">B</span><span class="opt-text">The prescribing specialist — no additional approval needed for specialist prescriptions</span></button><button class="opt-btn" data-q="q24" data-val="C"><span class="opt-letter">C</span><span class="opt-text">The P&amp;T Committee or Medical Director before dispensing</span></button><button class="opt-btn" data-q="q24" data-val="D"><span class="opt-letter">D</span><span class="opt-text">The HOD of the prescribing department</span></button></div></div>
</div>
<div class="q-card" data-id="q25">
  <div class="q-hdr"><span class="q-num">Q25</span><span class="diff diff-hard">hard</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>A pharmacist receives an expired opioid (morphine) that must be disposed of. The correct process is:</p><div class="opts"><button class="opt-btn" data-q="q25" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Dispose in yellow pharmaceutical waste bag — incineration by licensed CBMW facility</span></button><button class="opt-btn" data-q="q25" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Crush and flush down the sink — prevents diversion of controlled substance</span></button><button class="opt-btn" data-q="q25" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Surrender to the Central Bureau of Narcotics (CBN) per NDPS Act — document in NDPS Disposal Register</span></button><button class="opt-btn" data-q="q25" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Return to the supplier — standard returns process for expired drugs applies</span></button></div></div>
</div>
<div class="sec-hdr">D · True or False</div>
<div class="q-card" data-id="q26">
  <div class="q-hdr"><span class="q-num">Q26</span><span class="diff diff-hard">hard</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>Beta-blockers must only be flagged to the prescriber when prescribed by a non-pulmonologist to an asthma patient.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q26" data-val="True">True</button>
    <button class="tf-btn" data-q="q26" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q27">
  <div class="q-hdr"><span class="q-num">Q27</span><span class="diff diff-medium">medium</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>Teach-back for inhaler technique is mandatory even for patients who have been using the same inhaler for years.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q27" data-val="True">True</button>
    <button class="tf-btn" data-q="q27" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q28">
  <div class="q-hdr"><span class="q-num">Q28</span><span class="diff diff-hard">hard</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>Generic substitution of theophylline is automatic in a hospital pharmacy setting — clinical equivalence between brands is assumed.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q28" data-val="True">True</button>
    <button class="tf-btn" data-q="q28" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q29">
  <div class="q-hdr"><span class="q-num">Q29</span><span class="diff diff-easy">easy</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>V-category (vital) drugs must never be out of stock, regardless of procurement delays.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q29" data-val="True">True</button>
    <button class="tf-btn" data-q="q29" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q30">
  <div class="q-hdr"><span class="q-num">Q30</span><span class="diff diff-easy">easy</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>A drug with 5 months remaining shelf life at receipt should be accepted if it is a V-category vital drug in shortage.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q30" data-val="True">True</button>
    <button class="tf-btn" data-q="q30" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q31">
  <div class="q-hdr"><span class="q-num">Q31</span><span class="diff diff-medium">medium</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>LABA can be prescribed alone in COPD patients — the restriction is only for asthma.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q31" data-val="True">True</button>
    <button class="tf-btn" data-q="q31" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q32">
  <div class="q-hdr"><span class="q-num">Q32</span><span class="diff diff-easy">easy</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>A known, well-documented side effect of a drug does not need to be reported to PvPI.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q32" data-val="True">True</button>
    <button class="tf-btn" data-q="q32" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q33">
  <div class="q-hdr"><span class="q-num">Q33</span><span class="diff diff-medium">medium</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>ADR Form ADR-1 must not include the patient&#39;s name or MRN — anonymisation is mandatory.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q33" data-val="True">True</button>
    <button class="tf-btn" data-q="q33" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q34">
  <div class="q-hdr"><span class="q-num">Q34</span><span class="diff diff-hard">hard</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>Rifampicin causes orange/red discolouration of urine, sweat, and tears — patients should be counselled that this is normal and not alarming.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q34" data-val="True">True</button>
    <button class="tf-btn" data-q="q34" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q35">
  <div class="q-hdr"><span class="q-num">Q35</span><span class="diff diff-medium">medium</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>A near-miss is less important to report than an actual error because no harm occurred.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q35" data-val="True">True</button>
    <button class="tf-btn" data-q="q35" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q36">
  <div class="q-hdr"><span class="q-num">Q36</span><span class="diff diff-easy">easy</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>Pirfenidone and nintedanib are both teratogenic — effective contraception is mandatory for females of childbearing age on either drug.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q36" data-val="True">True</button>
    <button class="tf-btn" data-q="q36" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q37">
  <div class="q-hdr"><span class="q-num">Q37</span><span class="diff diff-medium">medium</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>The emergency 72-hour stock of critical pulmonology drugs must be maintained even when main stock is low.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q37" data-val="True">True</button>
    <button class="tf-btn" data-q="q37" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q38">
  <div class="q-hdr"><span class="q-num">Q38</span><span class="diff diff-hard">hard</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>Dispensing interruptions (phone calls, visitors) are permitted in a pharmacy as long as the pharmacist notes their current step before breaking.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q38" data-val="True">True</button>
    <button class="tf-btn" data-q="q38" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q39">
  <div class="q-hdr"><span class="q-num">Q39</span><span class="diff diff-medium">medium</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>Isoniazid peripheral neuropathy risk is managed by co-prescribing Vitamin B12 (cyanocobalamin).</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q39" data-val="True">True</button>
    <button class="tf-btn" data-q="q39" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q40">
  <div class="q-hdr"><span class="q-num">Q40</span><span class="diff diff-easy">easy</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>Formulary drugs must be reviewed and approved by the P&amp;T Committee at least annually.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q40" data-val="True">True</button>
    <button class="tf-btn" data-q="q40" data-val="False">False</button>
  </div></div>
</div>
<div class="sec-hdr">F · Identify the error</div>
<div class="q-card" data-id="q41">
  <div class="q-hdr"><span class="q-num">Q41</span><span class="diff diff-hard">hard</span><span class="q-type">Identify the Error</span></div>
  <div class="q-body"><p>Pharmacist Letisa dispenses Foradil 12 mcg (formoterol LABA alone) for a new asthma patient as prescribed by a visiting cardiologist. She verifies the prescription is complete and signed, checks HIS for allergies (nil), and dispenses with counselling on technique.</p><div class="opts"><button class="opt-btn" data-q="q41" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Foradil was not available on the formulary — non-formulary drugs require P&amp;T approval</span></button><button class="opt-btn" data-q="q41" data-val="B"><span class="opt-letter">B</span><span class="opt-text">LABA alone in asthma is a PATIENT SAFETY VIOLATION — causes bronchospasm risk. Must contact prescriber regardless of who wrote the prescription.</span></button><button class="opt-btn" data-q="q41" data-val="C"><span class="opt-letter">C</span><span class="opt-text">She should have checked whether the cardiologist had rights to prescribe respiratory drugs</span></button><button class="opt-btn" data-q="q41" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Counselling technique without teach-back is the dispensing error</span></button></div></div>
</div>
<div class="q-card" data-id="q42">
  <div class="q-hdr"><span class="q-num">Q42</span><span class="diff diff-medium">medium</span><span class="q-type">Identify the Error</span></div>
  <div class="q-body"><p>A delivery arrives with a cold chain drug. The delivery person provides a printed temperature log showing 4°C throughout. Pharmacist Prahathisvari checks the drug against the PO, verifies the licence certificate, checks physical condition (intact seals, no discolouration), enters in GRN and Stock Received Register, and accepts stock.</p><div class="opts"><button class="opt-btn" data-q="q42" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Temperature log at 4°C is outside the 2–8°C cold chain range — the stock should be rejected</span></button><button class="opt-btn" data-q="q42" data-val="B"><span class="opt-letter">B</span><span class="opt-text">The drug licence certificate check was unnecessary — this is done at initial vendor qualification only</span></button><button class="opt-btn" data-q="q42" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Temperature should be verified using the cold chain logger inside the delivery package, not just the printed record provided by the delivery person</span></button><button class="opt-btn" data-q="q42" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Stock should not be entered in GRN until pharmacy HOD approves receipt</span></button></div></div>
</div>
<div class="q-card" data-id="q43">
  <div class="q-hdr"><span class="q-num">Q43</span><span class="diff diff-medium">medium</span><span class="q-type">Identify the Error</span></div>
  <div class="q-body"><p>A patient on high-dose ICS reports oral thrush (candidiasis). The pharmacist documents it as &#39;known/expected side effect — no report required&#39; and counsels the patient to rinse mouth more diligently.</p><div class="opts"><button class="opt-btn" data-q="q43" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Candidiasis from ICS is not reportable — it is in the product monograph</span></button><button class="opt-btn" data-q="q43" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Known ADRs still must be reported to PvPI — &#39;known side effect&#39; is not a reason to withhold reporting; frequency and severity data from reports drives regulatory action</span></button><button class="opt-btn" data-q="q43" data-val="C"><span class="opt-letter">C</span><span class="opt-text">The pharmacist should have referred to the doctor before counselling</span></button><button class="opt-btn" data-q="q43" data-val="D"><span class="opt-letter">D</span><span class="opt-text">The documentation language is incorrect — should be &#39;anticipated&#39; not &#39;known&#39;</span></button></div></div>
</div>
<div class="q-card" data-id="q44">
  <div class="q-hdr"><span class="q-num">Q44</span><span class="diff diff-hard">hard</span><span class="q-type">Identify the Error</span></div>
  <div class="q-body"><p>LASA shelf labelling in the pharmacy: budesonide MDI and dexamethasone tablets are on adjacent shelves. The pharmacist applies TALL-MAN lettering labels: buDESONide and dexaMETHasone. LASA warning stickers are applied to both.</p><div class="opts"><button class="opt-btn" data-q="q44" data-val="A"><span class="opt-letter">A</span><span class="opt-text">buDESONide is correctly labelled but dexaMETHasone should be dexAMETHAsone — the capitalisation pattern is wrong</span></button><button class="opt-btn" data-q="q44" data-val="B"><span class="opt-letter">B</span><span class="opt-text">LASA drugs should be on non-adjacent shelves — visual separation is the primary intervention, not just labelling</span></button><button class="opt-btn" data-q="q44" data-val="C"><span class="opt-letter">C</span><span class="opt-text">TALL-MAN lettering is for written prescriptions only — shelf labels should use colour-coded stickers instead</span></button><button class="opt-btn" data-q="q44" data-val="D"><span class="opt-letter">D</span><span class="opt-text">The pharmacist must also conduct a double-check for these two drugs at every dispensing episode</span></button></div></div>
</div>
<div class="q-card" data-id="q45">
  <div class="q-hdr"><span class="q-num">Q45</span><span class="diff diff-hard">hard</span><span class="q-type">Identify the Error</span></div>
  <div class="q-body"><p>A patient on warfarin for AF is started on clarithromycin by an ENT surgeon (prescribed separately). The MIP pharmacist dispenses both without flagging the DDI because: (a) warfarin was prescribed at MIP, (b) clarithromycin was from another doctor, and (c) the pharmacist &#39;felt it was the ENT&#39;s responsibility to check.&#39;</p><div class="opts"><button class="opt-btn" data-q="q45" data-val="A"><span class="opt-letter">A</span><span class="opt-text">The pharmacist is correct — DDI responsibility lies with the prescribers, not the dispensing pharmacist</span></button><button class="opt-btn" data-q="q45" data-val="B"><span class="opt-letter">B</span><span class="opt-text">The pharmacist is responsible for DDI screening at every dispensing episode regardless of who prescribed — clarithromycin inhibits warfarin metabolism → raised INR → bleeding risk. Pharmacist MUST flag to both prescribers.</span></button><button class="opt-btn" data-q="q45" data-val="C"><span class="opt-letter">C</span><span class="opt-text">This is only a DDI concern at high warfarin doses — standard INR monitoring will detect the change</span></button><button class="opt-btn" data-q="q45" data-val="D"><span class="opt-letter">D</span><span class="opt-text">The ENT surgeon is the responsible party — the MIP pharmacist dispensed the MIP drug correctly</span></button></div></div>
</div>
<div class="sec-hdr">G · Scenario</div>
<div class="q-card" data-id="q46">
  <div class="q-hdr"><span class="q-num">Q46</span><span class="diff diff-easy">easy</span><span class="q-type">Scenario</span></div>
  <div class="q-body"><p>A patient on anti-TB therapy (HRZE) returns after 2 weeks saying she has been having blurred vision and difficulty reading since starting treatment. What is the most likely cause and immediate action?</p><div class="opts"><button class="opt-btn" data-q="q46" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Isoniazid peripheral neuropathy — add pyridoxine B6</span></button><button class="opt-btn" data-q="q46" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Ethambutol optic neuritis — STOP ethambutol immediately, inform prescribing doctor urgently, refer to ophthalmology. Visual changes from ethambutol can be permanent if drug is not stopped promptly.</span></button><button class="opt-btn" data-q="q46" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Expected vision changes from rifampicin — orange tint is common and resolves</span></button><button class="opt-btn" data-q="q46" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Pyrazinamide uric acid elevation affecting eye pressure — get uric acid level checked</span></button></div></div>
</div>
<div class="q-card" data-id="q47">
  <div class="q-hdr"><span class="q-num">Q47</span><span class="diff diff-medium">medium</span><span class="q-type">Scenario</span></div>
  <div class="q-body"><p>The pharmacy system alerts that salbutamol MDI stock has dropped to 5 units — below the MSL. It is a Thursday evening and the supplier cannot deliver until Monday. What is the correct action?</p><div class="opts"><button class="opt-btn" data-q="q47" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Limit dispensing to one inhaler per patient until stock is replenished</span></button><button class="opt-btn" data-q="q47" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Salbutamol MDI is V-A category (vital + high value) — access the 72-hour emergency stock immediately. Notify prescribers of temporary shortage. Initiate urgent procurement. Document in Stockout Register.</span></button><button class="opt-btn" data-q="q47" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Dispense the remaining 5 units on a first-come basis — stockouts in the supply chain are unforeseeable</span></button><button class="opt-btn" data-q="q47" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Contact alternate approved vendors for emergency supply — do not touch emergency stock unless main stock is fully depleted</span></button></div></div>
</div>
<div class="q-card" data-id="q48">
  <div class="q-hdr"><span class="q-num">Q48</span><span class="diff diff-medium">medium</span><span class="q-type">Scenario</span></div>
  <div class="q-body"><p>A patient on dupilumab (biologic for severe asthma) reports injection site redness and mild swelling after the 3rd dose. The pharmacist classifies it as &#39;probable ADR&#39; on the WHO-UMC scale. What is the correct reporting timeline?</p><div class="opts"><button class="opt-btn" data-q="q48" data-val="A"><span class="opt-letter">A</span><span class="opt-text">90 days — non-serious ADR reporting window</span></button><button class="opt-btn" data-q="q48" data-val="B"><span class="opt-letter">B</span><span class="opt-text">15 days — serious ADR window applies to all biologicals</span></button><button class="opt-btn" data-q="q48" data-val="C"><span class="opt-letter">C</span><span class="opt-text">7 days — expedited report is required for any ADR to a new drug/biological regardless of severity</span></button><button class="opt-btn" data-q="q48" data-val="D"><span class="opt-letter">D</span><span class="opt-text">No reporting required — injection site reactions are listed in the product monograph</span></button></div></div>
</div>
<div class="q-card" data-id="q49">
  <div class="q-hdr"><span class="q-num">Q49</span><span class="diff diff-hard">hard</span><span class="q-type">Scenario</span></div>
  <div class="q-body"><p>A pharmacy audit reveals that methotrexate waste (empty vials, used syringes) has been disposed of in the regular yellow pharmaceutical waste bags by two staff members who were unaware of the cytotoxic protocol. What is the correct immediate action?</p><div class="opts"><button class="opt-btn" data-q="q49" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Retrieve the yellow bags and re-segregate into purple cytotoxic containers — then retrain staff</span></button><button class="opt-btn" data-q="q49" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Report the incident to the quality team, quarantine the affected waste bags, contact the licensed cytotoxic waste handler for proper disposal, retrain ALL pharmacy staff on waste segregation, document in Incident Register</span></button><button class="opt-btn" data-q="q49" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Send the yellow bags to the CBMW facility with a note explaining the error</span></button><button class="opt-btn" data-q="q49" data-val="D"><span class="opt-letter">D</span><span class="opt-text">No action needed — methotrexate vials are empty so the cytotoxic risk is minimal</span></button></div></div>
</div>
<div class="q-card" data-id="q50">
  <div class="q-hdr"><span class="q-num">Q50</span><span class="diff diff-hard">hard</span><span class="q-type">Scenario</span></div>
  <div class="q-body"><p>A Tamil-speaking patient, previously on Seretide 250 DPI, is switched to Trimbow (ICS/LABA/LAMA triple combination MDI) for COPD. She demonstrates her Seretide technique (which is correct for DPI) and is dispensed the Trimbow without additional technique counselling because &#39;she already knows how to use an inhaler.&#39; What are the errors?</p><div class="opts"><button class="opt-btn" data-q="q50" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Only one error: wrong assumption — DPI and MDI techniques are different; coordinated press-and-breathe is needed for MDI vs forceful rapid inhale for DPI</span></button><button class="opt-btn" data-q="q50" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Multiple errors: (1) DPI and MDI technique are fundamentally different — she must be counselled on MDI technique from scratch; (2) Triple therapy sequence counselling was not given; (3) New LAMA component means new side effects (dry mouth, urinary retention) were not counselled; (4) Tamil language counselling was not provided</span></button><button class="opt-btn" data-q="q50" data-val="C"><span class="opt-letter">C</span><span class="opt-text">No error — the patient has used an inhaler for years and device changes are minor</span></button><button class="opt-btn" data-q="q50" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Only error is language — the technique is transferable between devices</span></button></div></div>
</div>`,
  reception: `<div class="sec-hdr">A · Fill in the blanks</div>

</div>

  <div class="q-hdr"><span class="q-num">Q3</span><span class="diff diff-medium">medium</span><span class="q-type">Fill in the blank</span></div>

</div>

  <div class="q-hdr"><span class="q-num">Q4</span><span class="diff diff-easy">easy</span><span class="q-type">Fill in the blank</span></div>
  <div class="q-body"><p>Telephone must be answered within __ rings. Every call must be logged with: date, time, __________, purpose, and outcome.</p><div class="fib-wrap"><input type="text" class="fib-box" data-q="q4" data-bi="0" placeholder="..." autocomplete="off"><input type="text" class="fib-box" data-q="q4" data-bi="1" placeholder="..." autocomplete="off"><input type="text" class="fib-box" data-q="q4" data-bi="2" placeholder="..." autocomplete="off"><input type="text" class="fib-box" data-q="q4" data-bi="3" placeholder="..." autocomplete="off"><input type="text" class="fib-box" data-q="q4" data-bi="4" placeholder="..." autocomplete="off"><input type="text" class="fib-box" data-q="q4" data-bi="5" placeholder="..." autocomplete="off"></div></div>
</div>

  <div class="q-hdr"><span class="q-num">Q5</span><span class="diff diff-easy">easy</span><span class="q-type">Fill in the blank</span></div>
  <div class="q-body"><p>Before PFT, bronchodilator must be withheld for __ to __ hours if prescribed. Patient must be sent an SMS confirmation __ day prior.</p><div class="fib-wrap"><input type="text" class="fib-box" data-q="q5" data-bi="0" placeholder="..." autocomplete="off"><input type="text" class="fib-box" data-q="q5" data-bi="1" placeholder="..." autocomplete="off"><input type="text" class="fib-box" data-q="q5" data-bi="2" placeholder="..." autocomplete="off"></div></div>
</div>

  <div class="q-body">
    <p>Match each reception situation (Column A) to the correct action (Column B).</p>

    </div><div class="match-row">
      <div class="match-a">2 · Clinical complaint — patient upset about treatment outcome</div>
      <select class="match-sel" data-q="q6" data-ri="1"><option value="" disabled selected>Choose...</option><option value="A">A</option><option value="B">B</option><option value="C">C</option><option value="D">D</option><option value="E">E</option></select>
    </div><div class="match-row">
      <div class="match-a">3 · Elderly wheelchair patient — 20 patients ahead in general queue</div>
      <select class="match-sel" data-q="q6" data-ri="2"><option value="" disabled selected>Choose...</option><option value="A">A</option><option value="B">B</option><option value="C">C</option><option value="D">D</option><option value="E">E</option></select>
