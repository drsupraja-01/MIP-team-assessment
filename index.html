    </div></div>
      <div class="match-col-b"><div class="match-b-item"><span class="match-letter">A</span> A · Validate on NHA portal before service — visual card check alone is not sufficient</div><div class="match-b-item"><span class="match-letter">B</span> B · Retain original prescription; register in narcotic register; guide patient to pharmacy</div><div class="match-b-item"><span class="match-letter">C</span> C · Do NOT register first — alert Charge Nurse immediately, provide wheelchair, register as emergency after clinical attention</div><div class="match-b-item"><span class="match-letter">D</span> D · Priority queue mandatory — RPwD Act 2016 is not optional</div><div class="match-b-item"><span class="match-letter">E</span> E · Escalate to HOD/Charge Nurse within 15 minutes; log in Grievance Register; provide reference number</div></div>
    </div>
  </div>
</div>
<div class="sec-hdr">C · MCQ</div>
<div class="q-card" data-id="q11">
  <div class="q-hdr"><span class="q-num">Q11</span><span class="diff diff-hard">hard</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>A return patient&#39;s record shows a documented penicillin allergy. Before passing the file to the doctor&#39;s room, the receptionist must:</p><div class="opts"><button class="opt-btn" data-q="q11" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Note the allergy on the appointment register</span></button><button class="opt-btn" data-q="q11" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Ensure red allergy sticker is visible on OPD file cover AND allergy is flagged in HIS — both are mandatory before handover</span></button><button class="opt-btn" data-q="q11" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Verbally inform the doctor at handover — a sticker is optional if the doctor is alerted</span></button><button class="opt-btn" data-q="q11" data-val="D"><span class="opt-letter">D</span><span class="opt-text">No action needed — HIS will alert the prescribing doctor automatically</span></button></div></div>
</div>
<div class="q-card" data-id="q12">
  <div class="q-hdr"><span class="q-num">Q12</span><span class="diff diff-hard">hard</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>A receptionist independently grants a 30% fee waiver for an elderly patient who cannot afford the full consultation. This is:</p><div class="opts"><button class="opt-btn" data-q="q12" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Acceptable — showing patient compassion within reasonable limits</span></button><button class="opt-btn" data-q="q12" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Correct if the amount is under ₹500</span></button><button class="opt-btn" data-q="q12" data-val="C"><span class="opt-letter">C</span><span class="opt-text">A policy violation — waiver requires HOD or Medical Superintendent written/HIS-documented approval; the receptionist has no authority to grant waivers</span></button><button class="opt-btn" data-q="q12" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Acceptable for BPL card holders without additional approval</span></button></div></div>
</div>
<div class="q-card" data-id="q13">
  <div class="q-hdr"><span class="q-num">Q13</span><span class="diff diff-medium">medium</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>Duplicate patient check must run in HIS:</p><div class="opts"><button class="opt-btn" data-q="q13" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Only when the patient says they have visited before</span></button><button class="opt-btn" data-q="q13" data-val="B"><span class="opt-letter">B</span><span class="opt-text">For all new registrations — regardless of whether the patient volunteers prior visit history</span></button><button class="opt-btn" data-q="q13" data-val="C"><span class="opt-letter">C</span><span class="opt-text">For patients with common names only — unique names create unique MRNs automatically</span></button><button class="opt-btn" data-q="q13" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Only for new patients — return patients are retrieved by name without duplicate check</span></button></div></div>
</div>
<div class="q-card" data-id="q14">
  <div class="q-hdr"><span class="q-num">Q14</span><span class="diff diff-hard">hard</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>A doctor signs a prescription but forgets to include the patient&#39;s date of birth. The receptionist should:</p><div class="opts"><button class="opt-btn" data-q="q14" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Fill in the DOB from HIS to avoid inconveniencing the patient</span></button><button class="opt-btn" data-q="q14" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Return the prescription to the doctor to complete — a mandatory field is missing; process with incomplete prescription is a compliance risk</span></button><button class="opt-btn" data-q="q14" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Write &#39;DOB not required&#39; on the prescription and proceed</span></button><button class="opt-btn" data-q="q14" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Accept the prescription — DOB is only required for controlled substances</span></button></div></div>
</div>
<div class="q-card" data-id="q15">
  <div class="q-hdr"><span class="q-num">Q15</span><span class="diff diff-medium">medium</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>OPD records for adult patients must be retained for a minimum of:</p><div class="opts"><button class="opt-btn" data-q="q15" data-val="A"><span class="opt-letter">A</span><span class="opt-text">1 year</span></button><button class="opt-btn" data-q="q15" data-val="B"><span class="opt-letter">B</span><span class="opt-text">2 years</span></button><button class="opt-btn" data-q="q15" data-val="C"><span class="opt-letter">C</span><span class="opt-text">3 years — paediatric records must be retained for 5 years</span></button><button class="opt-btn" data-q="q15" data-val="D"><span class="opt-letter">D</span><span class="opt-text">5 years for all patients</span></button></div></div>
</div>
<div class="q-card" data-id="q16">
  <div class="q-hdr"><span class="q-num">Q16</span><span class="diff diff-easy">easy</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>A patient complaint at the reception desk — the receptionist must:</p><div class="opts"><button class="opt-btn" data-q="q16" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Defend the hospital&#39;s position and explain why the patient may be mistaken</span></button><button class="opt-btn" data-q="q16" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Listen without interrupting, acknowledge the concern, log in Grievance Register with reference number, escalate clinical complaints to HOD within 15 minutes</span></button><button class="opt-btn" data-q="q16" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Ask the patient to put the complaint in writing before any action is taken</span></button><button class="opt-btn" data-q="q16" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Refer the patient to the billing department if the complaint is financial</span></button></div></div>
</div>
<div class="q-card" data-id="q17">
  <div class="q-hdr"><span class="q-num">Q17</span><span class="diff diff-easy">easy</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>Emergency patient identification at reception includes observing for:</p><div class="opts"><button class="opt-btn" data-q="q17" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Patient requesting a wheelchair or expressing urgency verbally</span></button><button class="opt-btn" data-q="q17" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Cyanosis, accessory muscle use, and inability to speak in full sentences — these are clinical signs of respiratory distress</span></button><button class="opt-btn" data-q="q17" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Patient appearing pale or sweating</span></button><button class="opt-btn" data-q="q17" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Any patient who bypasses the registration queue</span></button></div></div>
</div>
<div class="q-card" data-id="q18">
  <div class="q-hdr"><span class="q-num">Q18</span><span class="diff diff-easy">easy</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>Reception desk disinfection frequency is:</p><div class="opts"><button class="opt-btn" data-q="q18" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Once at the start of shift</span></button><button class="opt-btn" data-q="q18" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Every 2 hours with 1% sodium hypochlorite or approved disinfectant</span></button><button class="opt-btn" data-q="q18" data-val="C"><span class="opt-letter">C</span><span class="opt-text">After each patient contact only</span></button><button class="opt-btn" data-q="q18" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Daily deep clean — no intraday disinfection required</span></button></div></div>
</div>
<div class="q-card" data-id="q19">
  <div class="q-hdr"><span class="q-num">Q19</span><span class="diff diff-medium">medium</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>Waiting area temperature must be maintained at:</p><div class="opts"><button class="opt-btn" data-q="q19" data-val="A"><span class="opt-letter">A</span><span class="opt-text">18–20°C for clinical environments</span></button><button class="opt-btn" data-q="q19" data-val="B"><span class="opt-letter">B</span><span class="opt-text">22–26°C — comfortable for respiratory patients who are sensitive to cold air</span></button><button class="opt-btn" data-q="q19" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Below 20°C to reduce microbial growth</span></button><button class="opt-btn" data-q="q19" data-val="D"><span class="opt-letter">D</span><span class="opt-text">No specific standard — comfort is subjective</span></button></div></div>
</div>
<div class="q-card" data-id="q20">
  <div class="q-hdr"><span class="q-num">Q20</span><span class="diff diff-medium">medium</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>End-of-shift handover: cash discrepancy is found. Correct action:</p><div class="opts"><button class="opt-btn" data-q="q20" data-val="A"><span class="opt-letter">A</span><span class="opt-text">The outgoing receptionist carries the discrepancy to the next day</span></button><button class="opt-btn" data-q="q20" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Cash reconciliation is done jointly by outgoing and incoming staff — discrepancy reported to supervisor immediately at shift end, not carried forward</span></button><button class="opt-btn" data-q="q20" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Deduct from petty cash fund to balance and document</span></button><button class="opt-btn" data-q="q20" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Report discrepancy to the billing department the next morning</span></button></div></div>
</div>
<div class="q-card" data-id="q21">
  <div class="q-hdr"><span class="q-num">Q21</span><span class="diff diff-hard">hard</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>A patient report is ready to be handed out. The patient&#39;s family member (not the patient) requests the report directly. The receptionist should:</p><div class="opts"><button class="opt-btn" data-q="q21" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Hand over to family — they likely accompanied the patient</span></button><button class="opt-btn" data-q="q21" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Reports must never be given directly to any person — patient or family — without doctor review first. Guide family to speak to the treating doctor.</span></button><button class="opt-btn" data-q="q21" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Require written patient consent before handing to family member</span></button><button class="opt-btn" data-q="q21" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Give to family if patient is a minor or elderly</span></button></div></div>
</div>
<div class="q-card" data-id="q22">
  <div class="q-hdr"><span class="q-num">Q22</span><span class="diff diff-easy">easy</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>Before nebulisation walk-in, the receptionist must confirm:</p><div class="opts"><button class="opt-btn" data-q="q22" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Prescription only — no allergy check is needed at reception level</span></button><button class="opt-btn" data-q="q22" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Written prescription, then check for known drug allergies (especially salbutamol/ipratropium), obtain signed consent, ensure nurse is available — patient must not be sent to nebulisation room alone</span></button><button class="opt-btn" data-q="q22" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Patient&#39;s vitals before sending to nebulisation nurse</span></button><button class="opt-btn" data-q="q22" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Doctor&#39;s phone authorisation if prescription was issued at another facility</span></button></div></div>
</div>
<div class="q-card" data-id="q23">
  <div class="q-hdr"><span class="q-num">Q23</span><span class="diff diff-hard">hard</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>A patient calls to book an appointment. The HIS shows the preferred doctor is unavailable that day. The receptionist must:</p><div class="opts"><button class="opt-btn" data-q="q23" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Book with any available doctor — the patient can choose at the desk</span></button><button class="opt-btn" data-q="q23" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Verify doctor availability in HIS BEFORE confirming with patient; offer alternatives (next available slot for preferred doctor OR another doctor); confirm final booking in HIS, then send SMS — never book outside HIS</span></button><button class="opt-btn" data-q="q23" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Offer the appointment tentatively and confirm via WhatsApp when the doctor confirms</span></button><button class="opt-btn" data-q="q23" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Ask the patient to call back after the doctor&#39;s schedule is confirmed</span></button></div></div>
</div>
<div class="q-card" data-id="q24">
  <div class="q-hdr"><span class="q-num">Q24</span><span class="diff diff-medium">medium</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>Toilet inspection adjacent to OPD must be logged every:</p><div class="opts"><button class="opt-btn" data-q="q24" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Hour</span></button><button class="opt-btn" data-q="q24" data-val="B"><span class="opt-letter">B</span><span class="opt-text">2 hours</span></button><button class="opt-btn" data-q="q24" data-val="C"><span class="opt-letter">C</span><span class="opt-text">4 hours</span></button><button class="opt-btn" data-q="q24" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Shift — once in morning, once in afternoon</span></button></div></div>
</div>
<div class="q-card" data-id="q25">
  <div class="q-hdr"><span class="q-num">Q25</span><span class="diff diff-hard">hard</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>A patient arrives at 11 AM for a PFT appointment. The receptionist checks HIS — the patient is on Tiotropium (LAMA), last taken this morning at 7 AM. The PFT requires LAMA withheld 24 hours. What is the correct action?</p><div class="opts"><button class="opt-btn" data-q="q25" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Proceed — 4 hours is sufficient for LAMA bronchodilator washout before PFT</span></button><button class="opt-btn" data-q="q25" data-val="B"><span class="opt-letter">B</span><span class="opt-text">The PFT cannot proceed today — LAMA must be withheld 24 hours; patient did not receive pre-test instructions (a reception failure). Reschedule, issue PFT instruction sheet in regional language, and confirm via SMS.</span></button><button class="opt-btn" data-q="q25" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Ask the RT team whether to proceed — it is a clinical decision</span></button><button class="opt-btn" data-q="q25" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Proceed without BD withholding but mark the prescription as &#39;BD taken&#39; for RT to factor in interpretation</span></button></div></div>
</div>
<div class="sec-hdr">D · True or False</div>
<div class="q-card" data-id="q26">
  <div class="q-hdr"><span class="q-num">Q26</span><span class="diff diff-medium">medium</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>A patient can wait while the receptionist finishes a personal call if it will take less than 1 minute.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q26" data-val="True">True</button>
    <button class="tf-btn" data-q="q26" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q27">
  <div class="q-hdr"><span class="q-num">Q27</span><span class="diff diff-easy">easy</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>UPI and card payments must be entered in HIS and a receipt issued — only cash transactions require receipts.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q27" data-val="True">True</button>
    <button class="tf-btn" data-q="q27" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q28">
  <div class="q-hdr"><span class="q-num">Q28</span><span class="diff diff-medium">medium</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>Walk-in patients should be given priority over scheduled patients when the doctor has an unexpected gap in the schedule.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q28" data-val="True">True</button>
    <button class="tf-btn" data-q="q28" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q29">
  <div class="q-hdr"><span class="q-num">Q29</span><span class="diff diff-easy">easy</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>Investigation reports must not be handed to patients directly — they must be reviewed by the doctor first.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q29" data-val="True">True</button>
    <button class="tf-btn" data-q="q29" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q30">
  <div class="q-hdr"><span class="q-num">Q30</span><span class="diff diff-easy">easy</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>OPD files should use colour-coding: Red folder = allergy alert, Blue folder = insurance patient.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q30" data-val="True">True</button>
    <button class="tf-btn" data-q="q30" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q31">
  <div class="q-hdr"><span class="q-num">Q31</span><span class="diff diff-medium">medium</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>A patient who complains loudly in the waiting area should be asked to leave and return when calmer before their complaint is logged.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q31" data-val="True">True</button>
    <button class="tf-btn" data-q="q31" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q32">
  <div class="q-hdr"><span class="q-num">Q32</span><span class="diff diff-easy">easy</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>A wheelchair must be accessible within 10 metres of the reception counter at all times.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q32" data-val="True">True</button>
    <button class="tf-btn" data-q="q32" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q33">
  <div class="q-hdr"><span class="q-num">Q33</span><span class="diff diff-medium">medium</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>Incoming reception staff can begin their shift without a formal handover if the outgoing receptionist has left notes.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q33" data-val="True">True</button>
    <button class="tf-btn" data-q="q33" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q34">
  <div class="q-hdr"><span class="q-num">Q34</span><span class="diff diff-easy">easy</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>Hand sanitiser at the reception counter must be checked and refilled twice daily.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q34" data-val="True">True</button>
    <button class="tf-btn" data-q="q34" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q35">
  <div class="q-hdr"><span class="q-num">Q35</span><span class="diff diff-hard">hard</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>A receptionist may add missing information to a prescription (such as patient weight or age) from HIS records to speed up the process.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q35" data-val="True">True</button>
    <button class="tf-btn" data-q="q35" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q36">
  <div class="q-hdr"><span class="q-num">Q36</span><span class="diff diff-medium">medium</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>The emergency call bell/intercom to the nursing station must be tested daily.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q36" data-val="True">True</button>
    <button class="tf-btn" data-q="q36" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q37">
  <div class="q-hdr"><span class="q-num">Q37</span><span class="diff diff-easy">easy</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>Pens at the reception desk should be wiped with an alcohol wipe between each patient use.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q37" data-val="True">True</button>
    <button class="tf-btn" data-q="q37" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q38">
  <div class="q-hdr"><span class="q-num">Q38</span><span class="diff diff-medium">medium</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>PFT pre-test instruction sheet must be provided in written form only — verbal instructions are optional.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q38" data-val="True">True</button>
    <button class="tf-btn" data-q="q38" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q39">
  <div class="q-hdr"><span class="q-num">Q39</span><span class="diff diff-hard">hard</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>A patient&#39;s ABHA (Ayushman Bharat Health Account) ID must be created by the receptionist if the patient does not have one.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q39" data-val="True">True</button>
    <button class="tf-btn" data-q="q39" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q40">
  <div class="q-hdr"><span class="q-num">Q40</span><span class="diff diff-medium">medium</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>Post-nebulisation monitoring for at least 15 minutes by a nurse or technician is non-negotiable.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q40" data-val="True">True</button>
    <button class="tf-btn" data-q="q40" data-val="False">False</button>
  </div></div>
</div>
<div class="sec-hdr">F · Identify the error</div>
<div class="q-card" data-id="q41">
  <div class="q-hdr"><span class="q-num">Q41</span><span class="diff diff-hard">hard</span><span class="q-type">Identify the Error</span></div>
  <div class="q-body"><p>Receptionist Suganya registers a new patient: greets within 20 seconds ✓, runs duplicate check ✓, collects name, age, DOB, address, phone ✓, starts data entry in HIS, then asks patient to sign the consent form.</p><div class="opts"><button class="opt-btn" data-q="q41" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Greeting was within 20 seconds but should be within 30 seconds — the standard is not met</span></button><button class="opt-btn" data-q="q41" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Consent form must be signed BEFORE data entry begins — patient data captured without consent is improperly obtained</span></button><button class="opt-btn" data-q="q41" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Duplicate check should only run after consent is signed</span></button><button class="opt-btn" data-q="q41" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Phone number collection is optional for registration — only mandatory for appointment reminders</span></button></div></div>
</div>
<div class="q-card" data-id="q42">
  <div class="q-hdr"><span class="q-num">Q42</span><span class="diff diff-medium">medium</span><span class="q-type">Identify the Error</span></div>
  <div class="q-body"><p>A patient at the counter reports cyanosis around lips and cannot speak more than two words. Deepak asks the patient to wait briefly while he finishes the current registration, then calls the nurse.</p><div class="opts"><button class="opt-btn" data-q="q42" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Deepak should have sent the patient directly to the doctor&#39;s room — bypassing nursing</span></button><button class="opt-btn" data-q="q42" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Cyanosis and inability to speak in full sentences = respiratory emergency. Registration STOPS immediately. Alert Charge Nurse NOW. Provide wheelchair. Registration happens AFTER clinical attention.</span></button><button class="opt-btn" data-q="q42" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Deepak should have called for help without leaving the counter</span></button><button class="opt-btn" data-q="q42" data-val="D"><span class="opt-letter">D</span><span class="opt-text">The correct response was reasonable — finishing registration takes only 30 seconds</span></button></div></div>
</div>
<div class="q-card" data-id="q43">
  <div class="q-hdr"><span class="q-num">Q43</span><span class="diff diff-medium">medium</span><span class="q-type">Identify the Error</span></div>
  <div class="q-body"><p>At end of shift, Sridhar completes all pending HIS entries, reconciles cash (finding a ₹200 discrepancy which he decides to resolve next morning), locks physical files, briefs incoming staff verbally, and signs the handover register.</p><div class="opts"><button class="opt-btn" data-q="q43" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Physical files should be locked in HIS, not physically — digital locking is the standard</span></button><button class="opt-btn" data-q="q43" data-val="B"><span class="opt-letter">B</span><span class="opt-text">₹200 cash discrepancy must be reported to supervisor at shift end, not carried to next morning — joint reconciliation is mandatory and pending items are highlighted in red</span></button><button class="opt-btn" data-q="q43" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Verbal briefing is not sufficient — all handover must be in written SBAR format</span></button><button class="opt-btn" data-q="q43" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Signing the handover register without the incoming staff countersigning is the error</span></button></div></div>
</div>
<div class="q-card" data-id="q44">
  <div class="q-hdr"><span class="q-num">Q44</span><span class="diff diff-hard">hard</span><span class="q-type">Identify the Error</span></div>
  <div class="q-body"><p>A patient arrives for walk-in nebulisation with a prescription for salbutamol 2.5 mg nebulisation. Suganya checks the prescription (valid, signed) ✓, registers in the nebulisation log ✓, sends the patient to the nebulisation room. The nurse is in another room but available on call.</p><div class="opts"><button class="opt-btn" data-q="q44" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Salbutamol dose is insufficient — standard dose is 5 mg</span></button><button class="opt-btn" data-q="q44" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Allergy check for salbutamol/ipratropium was not performed, and consent was not obtained before sending the patient — both are mandatory before nebulisation. Also, nurse must be physically available in or near the room — &#39;on call&#39; is not sufficient.</span></button><button class="opt-btn" data-q="q44" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Patient should not be sent to nebulisation without doctor being physically present</span></button><button class="opt-btn" data-q="q44" data-val="D"><span class="opt-letter">D</span><span class="opt-text">The nebulisation log entry is incomplete without the patient&#39;s allergy status documented</span></button></div></div>
</div>
<div class="q-card" data-id="q45">
  <div class="q-hdr"><span class="q-num">Q45</span><span class="diff diff-hard">hard</span><span class="q-type">Identify the Error</span></div>
  <div class="q-body"><p>A TPA patient presents for consultation. Sridhar verifies the insurance card visually (valid expiry, hospital name printed) ✓, stamps &#39;TPA&#39; on the OPD file ✓, tells the patient the co-pay will be confirmed after consultation (as he is unsure), and sends patient to the doctor. The empanelment was not checked on the portal and the card was not scanned in HIS.</p><div class="opts"><button class="opt-btn" data-q="q45" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Co-pay communication after consultation is acceptable — co-pay varies by procedure</span></button><button class="opt-btn" data-q="q45" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Two errors: (1) Hospital empanelment must be verified on TPA portal BEFORE service; (2) Card must be scanned in HIS before patient sees doctor. Sending patient without these steps risks non-payment and patient confusion about financial liability.</span></button><button class="opt-btn" data-q="q45" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Visual card check was sufficient — portal validation is only for PMJAY, not private TPA</span></button><button class="opt-btn" data-q="q45" data-val="D"><span class="opt-letter">D</span><span class="opt-text">The file stamp &#39;TPA&#39; is not a standard HIS entry — this is the primary error</span></button></div></div>
</div>
<div class="sec-hdr">G · Scenario</div>
<div class="q-card" data-id="q46">
  <div class="q-hdr"><span class="q-num">Q46</span><span class="diff diff-easy">easy</span><span class="q-type">Scenario</span></div>
  <div class="q-body"><p>A patient calls at 9 AM to ask why his test report from yesterday hasn&#39;t been uploaded. He is raising his voice. How should the receptionist respond?</p><div class="opts"><button class="opt-btn" data-q="q46" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Tell the patient reports take 24–48 hours and ask him to call back later</span></button><button class="opt-btn" data-q="q46" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Listen without interrupting, acknowledge: &#39;I understand your concern and I will look into this immediately.&#39; Check HIS for report status, escalate to lab if not uploaded, call patient back with update within agreed time. Log the complaint with reference number.</span></button><button class="opt-btn" data-q="q46" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Transfer the call to the lab department immediately</span></button><button class="opt-btn" data-q="q46" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Ask the patient to come in person — report status cannot be confirmed over phone</span></button></div></div>
</div>
<div class="q-card" data-id="q47">
  <div class="q-hdr"><span class="q-num">Q47</span><span class="diff diff-medium">medium</span><span class="q-type">Scenario</span></div>
  <div class="q-body"><p>A patient returns with a PFT report and spirometry results. They ask the receptionist what the results mean. The receptionist should:</p><div class="opts"><button class="opt-btn" data-q="q47" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Explain that FEV1/FVC ratio below 0.7 means COPD — basic patient education</span></button><button class="opt-btn" data-q="q47" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Reports must not be interpreted by reception staff — guide the patient to wait for the doctor&#39;s consultation. Do not attach the report to the file until the doctor has reviewed it.</span></button><button class="opt-btn" data-q="q47" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Attach the report to the OPD file and inform the patient the doctor will explain</span></button><button class="opt-btn" data-q="q47" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Ask a nurse to explain the basic results</span></button></div></div>
</div>
<div class="q-card" data-id="q48">
  <div class="q-hdr"><span class="q-num">Q48</span><span class="diff diff-medium">medium</span><span class="q-type">Scenario</span></div>
  <div class="q-body"><p>Doctor calls in sick at 8:55 AM. 12 patients are scheduled from 9 AM. What must the receptionist do?</p><div class="opts"><button class="opt-btn" data-q="q48" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Display &#39;Doctor unavailable&#39; on the board and let patients decide whether to wait</span></button><button class="opt-btn" data-q="q48" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Update HIS by 8 AM (already missed — update immediately), contact all 12 patients by SMS/phone, arrange a substitute doctor with HOD, update board with substitute details. Patients already arrived: inform personally, offer alternatives (wait for substitute or reschedule).</span></button><button class="opt-btn" data-q="q48" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Redirect all patients to another doctor without informing them of the change</span></button><button class="opt-btn" data-q="q48" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Allow scheduled patients to wait — doctor may recover and come in by 10 AM</span></button></div></div>
</div>
<div class="q-card" data-id="q49">
  <div class="q-hdr"><span class="q-num">Q49</span><span class="diff diff-hard">hard</span><span class="q-type">Scenario</span></div>
  <div class="q-body"><p>During a busy OPD, a patient pays ₹800 cash for consultation. The receptionist is distracted by a phone call and accepts the money without counting it visibly in front of the patient. At end-of-shift reconciliation there is a ₹200 shortfall. The patient has left. What should have been done differently and what should happen now?</p><div class="opts"><button class="opt-btn" data-q="q49" data-val="A"><span class="opt-letter">A</span><span class="opt-text">The shortfall should be absorbed from petty cash — it is a small amount</span></button><button class="opt-btn" data-q="q49" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Cash should always be counted visibly in front of the patient at time of payment — this is why. Now: report shortfall to supervisor at shift end, document in discrepancy log, do not carry forward. The loss may be unrecoverable but the process must be documented.</span></button><button class="opt-btn" data-q="q49" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Review CCTV footage to confirm whether the patient paid the correct amount</span></button><button class="opt-btn" data-q="q49" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Contact the patient for the balance — the HIS has their phone number</span></button></div></div>
</div>
<div class="q-card" data-id="q50">
  <div class="q-hdr"><span class="q-num">Q50</span><span class="diff diff-hard">hard</span><span class="q-type">Scenario</span></div>
  <div class="q-body"><p>A 14-year-old asthmatic child arrives with her grandmother for a PFT. Grandmother says the child took her Seretide inhaler this morning. The doctor&#39;s PFT request does not specify BD withhold. The receptionist issued the PFT appointment slot without giving pre-test instructions. How many errors are present?</p><div class="opts"><button class="opt-btn" data-q="q50" data-val="A"><span class="opt-letter">A</span><span class="opt-text">One error — BD was not withheld</span></button><button class="opt-btn" data-q="q50" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Two errors — BD not withheld and no pre-test instructions given</span></button><button class="opt-btn" data-q="q50" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Three errors: (1) Pre-test instructions were not given at booking — this is a reception SOP failure; (2) Seretide contains LABA (salmeterol) — LABA must be withheld 12 hours before BD spirometry; (3) PFT records for paediatric patients must be retained ≥5 years — the receptionist must ensure paediatric file coding is applied</span></button><button class="opt-btn" data-q="q50" data-val="D"><span class="opt-letter">D</span><span class="opt-text">One error — the doctor&#39;s request should have specified BD withhold; the receptionist had no way to know</span></button></div></div>
</div>`,

  <div class="q-body"><p>For Abhyangam, oil must be warmed to __ to __°C and tested on the therapist&#39;s __________. The session must not be done within __ hour of aerobic exercise.</p><div class="fib-wrap"><input type="text" class="fib-box" data-q="q4" data-bi="0" placeholder="..." autocomplete="off"><input type="text" class="fib-box" data-q="q4" data-bi="1" placeholder="..." autocomplete="off"><input type="text" class="fib-box" data-q="q4" data-bi="2" placeholder="..." autocomplete="off"><input type="text" class="fib-box" data-q="q4" data-bi="3" placeholder="..." autocomplete="off"><input type="text" class="fib-box" data-q="q4" data-bi="4" placeholder="..." autocomplete="off"><input type="text" class="fib-box" data-q="q4" data-bi="5" placeholder="..." autocomplete="off"><input type="text" class="fib-box" data-q="q4" data-bi="6" placeholder="..." autocomplete="off"><input type="text" class="fib-box" data-q="q4" data-bi="7" placeholder="..." autocomplete="off"></div></div>

  <div class="q-body"><p>GAD-7 and PHQ-9 are administered at programme __________, week __, and programme __. A PHQ-9 score of ≥__ requires documented referral to a psychiatrist.</p><div class="fib-wrap"><input type="text" class="fib-box" data-q="q5" data-bi="0" placeholder="..." autocomplete="off"><input type="text" class="fib-box" data-q="q5" data-bi="1" placeholder="..." autocomplete="off"><input type="text" class="fib-box" data-q="q5" data-bi="2" placeholder="..." autocomplete="off"><input type="text" class="fib-box" data-q="q5" data-bi="3" placeholder="..." autocomplete="off"><input type="text" class="fib-box" data-q="q5" data-bi="4" placeholder="..." autocomplete="off"><input type="text" class="fib-box" data-q="q5" data-bi="5" placeholder="..." autocomplete="off"><input type="text" class="fib-box" data-q="q5" data-bi="6" placeholder="..." autocomplete="off"><input type="text" class="fib-box" data-q="q5" data-bi="7" placeholder="..." autocomplete="off"></div></div>

  <div class="q-body">

<div class="sec-hdr">C · MCQ</div>
<div class="q-card" data-id="q11">
  <div class="q-hdr"><span class="q-num">Q11</span><span class="diff diff-hard">hard</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>Which posture assessment error misses the most clinically relevant finding in COPD patients?</p><div class="opts"><button class="opt-btn" data-q="q11" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Assessing posture while the patient is aware they are being observed</span></button><button class="opt-btn" data-q="q11" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Assessing from lateral view only — missing scoliosis (anterior view) and scapular winging (posterior view)</span></button><button class="opt-btn" data-q="q11" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Not measuring chest expansion during posture assessment</span></button><button class="opt-btn" data-q="q11" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Assessing in a clinic chair rather than standing</span></button></div></div>
</div>
<div class="q-card" data-id="q12">
  <div class="q-hdr"><span class="q-num">Q12</span><span class="diff diff-hard">hard</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>Paradoxical breathing in a COPD patient means:</p><div class="opts"><button class="opt-btn" data-q="q12" data-val="A"><span class="opt-letter">A</span><span class="opt-text">The patient alternates between chest and diaphragmatic breathing unpredictably</span></button><button class="opt-btn" data-q="q12" data-val="B"><span class="opt-letter">B</span><span class="opt-text">The chest wall moves inward during inhalation — indicates significant diaphragm dysfunction or dynamic hyperinflation</span></button><button class="opt-btn" data-q="q12" data-val="C"><span class="opt-letter">C</span><span class="opt-text">The I:E ratio is reversed — exhalation is shorter than inhalation</span></button><button class="opt-btn" data-q="q12" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Breathing rate paradoxically slows during exercise</span></button></div></div>
</div>
<div class="q-card" data-id="q13">
  <div class="q-hdr"><span class="q-num">Q13</span><span class="diff diff-medium">medium</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>Sessions 1–8 of aerobic training use interval protocol (1:2 exercise:rest ratio). From session 9 onwards the protocol changes to:</p><div class="opts"><button class="opt-btn" data-q="q13" data-val="A"><span class="opt-letter">A</span><span class="opt-text">2:1 exercise:rest ratio (more exercise than rest)</span></button><button class="opt-btn" data-q="q13" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Continuous training at target Borg 4–6/10 for 20–30 minutes</span></button><button class="opt-btn" data-q="q13" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Circuit training alternating between upper and lower limb exercises</span></button><button class="opt-btn" data-q="q13" data-val="D"><span class="opt-letter">D</span><span class="opt-text">High-intensity interval training (HIIT) at 80–90% peak work rate</span></button></div></div>
</div>
<div class="q-card" data-id="q14">
  <div class="q-hdr"><span class="q-num">Q14</span><span class="diff diff-hard">hard</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>When progressing aerobic training intensity, the correct principle is:</p><div class="opts"><button class="opt-btn" data-q="q14" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Increase intensity (speed/wattage) first, then duration when intensity is achieved</span></button><button class="opt-btn" data-q="q14" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Increase duration before intensity — add 5 minutes per week before increasing speed or wattage</span></button><button class="opt-btn" data-q="q14" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Increase both duration and intensity simultaneously for maximum training stimulus</span></button><button class="opt-btn" data-q="q14" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Intensity is fixed from the assessment — only duration progresses over the 25 sessions</span></button></div></div>
</div>
<div class="q-card" data-id="q15">
  <div class="q-hdr"><span class="q-num">Q15</span><span class="diff diff-medium">medium</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>Seated warm-up is used in sessions 1–5. The transition to standing warm-up (session 6+) requires:</p><div class="opts"><button class="opt-btn" data-q="q15" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Physiotherapist&#39;s clinical judgement — no fixed rule</span></button><button class="opt-btn" data-q="q15" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Patient completing 5 consecutive sessions without SpO₂ &lt;90% during seated warm-up</span></button><button class="opt-btn" data-q="q15" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Automatic progression at session 6 — seated warm-up is only for the first 5 sessions regardless of patient status</span></button><button class="opt-btn" data-q="q15" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Doctor&#39;s written clearance to progress from seated to standing exercise</span></button></div></div>
</div>
<div class="q-card" data-id="q16">
  <div class="q-hdr"><span class="q-num">Q16</span><span class="diff diff-easy">easy</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>DVT screening must be performed before every Abhyangam session because:</p><div class="opts"><button class="opt-btn" data-q="q16" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Abhyangam uses heat which can cause vasodilation and hypotension</span></button><button class="opt-btn" data-q="q16" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Deep massage over a DVT can dislodge a thrombus causing pulmonary embolism — this is a patient safety requirement</span></button><button class="opt-btn" data-q="q16" data-val="C"><span class="opt-letter">C</span><span class="opt-text">DVT is a contraindication to all massage therapy — patients with DVT risk must be excluded from IPR</span></button><button class="opt-btn" data-q="q16" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Insurance documentation requires DVT screening before all physical therapy procedures</span></button></div></div>
</div>
<div class="q-card" data-id="q17">
  <div class="q-hdr"><span class="q-num">Q17</span><span class="diff diff-easy">easy</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>Nasya is contraindicated in:</p><div class="opts"><button class="opt-btn" data-q="q17" data-val="A"><span class="opt-letter">A</span><span class="opt-text">COPD with FEV1 below 50% predicted</span></button><button class="opt-btn" data-q="q17" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Acute nasal infection, nasal polyps, recent nasal surgery, pregnancy</span></button><button class="opt-btn" data-q="q17" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Patients on ICS — oil may interfere with drug deposition</span></button><button class="opt-btn" data-q="q17" data-val="D"><span class="opt-letter">D</span><span class="opt-text">All patients with OSA — supine position is required which worsens OSA</span></button></div></div>
</div>
<div class="q-card" data-id="q18">
  <div class="q-hdr"><span class="q-num">Q18</span><span class="diff diff-easy">easy</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>Contrast hydrotherapy protocol: hot phase temperature is __ to __°C for __ minutes, cold phase __ to __°C for __ minute. Number of cycles: __. End on:</p><div class="opts"><button class="opt-btn" data-q="q18" data-val="A"><span class="opt-letter">A</span><span class="opt-text">38–40°C for 5 min, 10–15°C for 2 min, 3 cycles, end on hot</span></button><button class="opt-btn" data-q="q18" data-val="B"><span class="opt-letter">B</span><span class="opt-text">40–42°C for 3 min, 15–18°C for 1 min, 3 cycles, end on cold</span></button><button class="opt-btn" data-q="q18" data-val="C"><span class="opt-letter">C</span><span class="opt-text">40–42°C for 5 min, 18–22°C for 2 min, 5 cycles, end on cold</span></button><button class="opt-btn" data-q="q18" data-val="D"><span class="opt-letter">D</span><span class="opt-text">36–38°C for 3 min, 20–25°C for 1 min, 3 cycles, end on hot</span></button></div></div>
</div>
<div class="q-card" data-id="q19">
  <div class="q-hdr"><span class="q-num">Q19</span><span class="diff diff-medium">medium</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>The CBT cognitive restructuring technique applied in the IPR psychology sessions challenges thoughts like:</p><div class="opts"><button class="opt-btn" data-q="q19" data-val="A"><span class="opt-letter">A</span><span class="opt-text">&#39;I am going to suffocate&#39; → &#39;I am breathless but I have managed this before and I know what to do&#39;</span></button><button class="opt-btn" data-q="q19" data-val="B"><span class="opt-letter">B</span><span class="opt-text">&#39;My disease will get worse&#39; → &#39;Many people live well with COPD for decades&#39;</span></button><button class="opt-btn" data-q="q19" data-val="C"><span class="opt-letter">C</span><span class="opt-text">&#39;Exercise makes me breathless&#39; → &#39;Breathlessness during exercise is normal and not dangerous&#39;</span></button><button class="opt-btn" data-q="q19" data-val="D"><span class="opt-letter">D</span><span class="opt-text">&#39;I cannot work anymore&#39; → &#39;I can learn new ways to manage energy and return to modified work&#39;</span></button></div></div>
</div>
<div class="q-card" data-id="q20">
  <div class="q-hdr"><span class="q-num">Q20</span><span class="diff diff-medium">medium</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>ACT (Acceptance and Commitment Therapy) elements in the IPR psychology programme are most appropriate for:</p><div class="opts"><button class="opt-btn" data-q="q20" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Patients with mild anxiety and good disease insight</span></button><button class="opt-btn" data-q="q20" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Patients early in their disease journey — before dyspnoea catastrophising develops</span></button><button class="opt-btn" data-q="q20" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Patients with severe or terminal disease — ACT focuses on values-based living with illness acceptance</span></button><button class="opt-btn" data-q="q20" data-val="D"><span class="opt-letter">D</span><span class="opt-text">All IPR patients — ACT is the primary psychological modality at MIP</span></button></div></div>
</div>
<div class="q-card" data-id="q21">
  <div class="q-hdr"><span class="q-num">Q21</span><span class="diff diff-hard">hard</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>A patient&#39;s 6MWT shows SpO₂ nadir of 86% during walking. The correct exercise prescription is:</p><div class="opts"><button class="opt-btn" data-q="q21" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Exclude from PR — SpO₂ below 88% during exercise is an absolute contraindication to IPR</span></button><button class="opt-btn" data-q="q21" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Prescribe supplemental O₂ during exercise to maintain SpO₂ ≥90%, with O₂ cylinder in the PT gym; continue PR with O₂ support</span></button><button class="opt-btn" data-q="q21" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Reduce exercise intensity to 40% peak work rate so SpO₂ stays above 90%</span></button><button class="opt-btn" data-q="q21" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Proceed with standard 60–80% prescription — SpO₂ 86% at 6MWT nadir is acceptable</span></button></div></div>
</div>
<div class="q-card" data-id="q22">
  <div class="q-hdr"><span class="q-num">Q22</span><span class="diff diff-medium">medium</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>Ujjayi pranayama builds inspiratory muscle endurance because:</p><div class="opts"><button class="opt-btn" data-q="q22" data-val="A"><span class="opt-letter">A</span><span class="opt-text">The forced exhalation pattern increases expiratory muscle strength</span></button><button class="opt-btn" data-q="q22" data-val="B"><span class="opt-letter">B</span><span class="opt-text">The constricted throat creates resistance breathing — the inspiratory muscles work against added resistance, building endurance over sessions</span></button><button class="opt-btn" data-q="q22" data-val="C"><span class="opt-letter">C</span><span class="opt-text">The extended breath retention increases diaphragm excursion depth</span></button><button class="opt-btn" data-q="q22" data-val="D"><span class="opt-letter">D</span><span class="opt-text">The humming vibration stimulates the vagus nerve, reducing respiratory muscle tension</span></button></div></div>
</div>
<div class="q-card" data-id="q23">
  <div class="q-hdr"><span class="q-num">Q23</span><span class="diff diff-hard">hard</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>The pacing framework taught in psychology sessions — Plan, Prioritise, Position, Pause — is MOST relevant for which patient?</p><div class="opts"><button class="opt-btn" data-q="q23" data-val="A"><span class="opt-letter">A</span><span class="opt-text">A patient with severe anxiety who catastrophises breathlessness during exercise</span></button><button class="opt-btn" data-q="q23" data-val="B"><span class="opt-letter">B</span><span class="opt-text">A patient with GOLD B COPD who struggles to complete daily activities (cooking, bathing) due to exertional breathlessness — pacing helps maintain function without avoidance</span></button><button class="opt-btn" data-q="q23" data-val="C"><span class="opt-letter">C</span><span class="opt-text">A patient with IPF preparing for lung transplant — pacing is part of peri-operative rehabilitation</span></button><button class="opt-btn" data-q="q23" data-val="D"><span class="opt-letter">D</span><span class="opt-text">A patient with PHQ-9 18 who has withdrawn from all social activity</span></button></div></div>
</div>
<div class="q-card" data-id="q24">
  <div class="q-hdr"><span class="q-num">Q24</span><span class="diff diff-medium">medium</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>Podi Kizhi bolus temperature is checked on:</p><div class="opts"><button class="opt-btn" data-q="q24" data-val="A"><span class="opt-letter">A</span><span class="opt-text">A thermometer — exact temperature reading is required</span></button><button class="opt-btn" data-q="q24" data-val="B"><span class="opt-letter">B</span><span class="opt-text">The therapist&#39;s forearm before every application to the patient — not just once at the start of the session</span></button><button class="opt-btn" data-q="q24" data-val="C"><span class="opt-letter">C</span><span class="opt-text">The patient&#39;s skin — the reaction guides temperature safety</span></button><button class="opt-btn" data-q="q24" data-val="D"><span class="opt-letter">D</span><span class="opt-text">The back of the therapist&#39;s hand — most sensitive area for heat perception</span></button></div></div>
</div>
<div class="q-card" data-id="q25">
  <div class="q-hdr"><span class="q-num">Q25</span><span class="diff diff-hard">hard</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>A COPD patient scores PHQ-9 = 9 at baseline (mild depression) and GAD-7 = 14 at baseline (moderate anxiety). By week 4, PHQ-9 = 6 (improving) and GAD-7 = 16 (worsening anxiety). The patient reports they are avoiding exercise sessions due to fear of breathlessness. The psychologist&#39;s priority action is:</p><div class="opts"><button class="opt-btn" data-q="q25" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Refer to psychiatrist — GAD-7 14+ always requires psychiatric referral</span></button><button class="opt-btn" data-q="q25" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Reduce exercise frequency to reduce anxiety triggers — fewer sessions equals less fear</span></button><button class="opt-btn" data-q="q25" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Apply the Dyspnoea Catastrophising Scale to quantify breathlessness catastrophising; intensify CBT cognitive restructuring targeting the avoidance-deconditioning cycle; coordinate with PT to reintroduce exercise with graded exposure. Psychiatrist referral not yet triggered — PHQ-9 must be ≥15 for documented referral.</span></button><button class="opt-btn" data-q="q25" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Discharge from psychology sessions — the patient is refusing to engage with exercise and further sessions are futile</span></button></div></div>
</div>
<div class="sec-hdr">D · True or False</div>
<div class="q-card" data-id="q26">
  <div class="q-hdr"><span class="q-num">Q26</span><span class="diff diff-medium">medium</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>Full physiotherapy assessment can be completed during the first exercise session — assessment and treatment can run simultaneously for efficiency.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q26" data-val="True">True</button>
    <button class="tf-btn" data-q="q26" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q27">
  <div class="q-hdr"><span class="q-num">Q27</span><span class="diff diff-easy">easy</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>The IPR programme has a total of 36 sessions across all modalities over approximately 12–18 weeks.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q27" data-val="True">True</button>
    <button class="tf-btn" data-q="q27" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q28">
  <div class="q-hdr"><span class="q-num">Q28</span><span class="diff diff-hard">hard</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>Stopping criteria for aerobic exercise include: Borg &gt;7/10, SpO₂ &lt;88%, chest pain, or arrhythmia — any one of these is sufficient to stop the session.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q28" data-val="True">True</button>
    <button class="tf-btn" data-q="q28" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q29">
  <div class="q-hdr"><span class="q-num">Q29</span><span class="diff diff-easy">easy</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>Abhyangam should be scheduled within 30 minutes of aerobic exercise to enhance circulation effects.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q29" data-val="True">True</button>
    <button class="tf-btn" data-q="q29" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q30">
  <div class="q-hdr"><span class="q-num">Q30</span><span class="diff diff-medium">medium</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>Nasya oil must be warmed to body temperature before administration and tested on the therapist&#39;s wrist.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q30" data-val="True">True</button>
    <button class="tf-btn" data-q="q30" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q31">
  <div class="q-hdr"><span class="q-num">Q31</span><span class="diff diff-hard">hard</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>Steam inhalation with eucalyptus additives is safe for all asthma patients — eucalyptus is a bronchodilator.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q31" data-val="True">True</button>
    <button class="tf-btn" data-q="q31" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q32">
  <div class="q-hdr"><span class="q-num">Q32</span><span class="diff diff-easy">easy</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>Mud used for mud therapy must be from a certified, sterile source — random soil or garden mud is not acceptable.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q32" data-val="True">True</button>
    <button class="tf-btn" data-q="q32" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q33">
  <div class="q-hdr"><span class="q-num">Q33</span><span class="diff diff-medium">medium</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>The IPQ-R (Illness Perceptions Questionnaire) measures the patient&#39;s beliefs about the timeline, consequences, and controllability of their respiratory disease.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q33" data-val="True">True</button>
    <button class="tf-btn" data-q="q33" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q34">
  <div class="q-hdr"><span class="q-num">Q34</span><span class="diff diff-medium">medium</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>Balasana (child&#39;s pose) is excluded from the MIP pulmonary yoga programme because it compresses the thorax.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q34" data-val="True">True</button>
    <button class="tf-btn" data-q="q34" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q35">
  <div class="q-hdr"><span class="q-num">Q35</span><span class="diff diff-hard">hard</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>Reassessment of IPR progress is built into the programme at sessions 12 and 24 — reassessment cannot be done at any other time.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q35" data-val="True">True</button>
    <button class="tf-btn" data-q="q35" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q36">
  <div class="q-hdr"><span class="q-num">Q36</span><span class="diff diff-easy">easy</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>Progressive Muscle Relaxation (PMR) is a 15-minute guided session used in the anxiety management component of IPR psychology.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q36" data-val="True">True</button>
    <button class="tf-btn" data-q="q36" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q37">
  <div class="q-hdr"><span class="q-num">Q37</span><span class="diff diff-medium">medium</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>The oil temperature for Abhyangam is checked once at the start of the session — if correct, no further checks are needed.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q37" data-val="True">True</button>
    <button class="tf-btn" data-q="q37" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q38">
  <div class="q-hdr"><span class="q-num">Q38</span><span class="diff diff-hard">hard</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>The MCID (Minimal Clinically Important Difference) for 6MWT in pulmonary rehabilitation is ≥30 metres.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q38" data-val="True">True</button>
    <button class="tf-btn" data-q="q38" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q39">
  <div class="q-hdr"><span class="q-num">Q39</span><span class="diff diff-medium">medium</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>Forward-lean seated (tripod) position is evidence-based for immediate breathlessness relief — Cochrane reviewed.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q39" data-val="True">True</button>
    <button class="tf-btn" data-q="q39" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q40">
  <div class="q-hdr"><span class="q-num">Q40</span><span class="diff diff-easy">easy</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>Contrast hydrotherapy always ends on the cold phase — ending on hot defeats the reactive vasodilation effect.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q40" data-val="True">True</button>
    <button class="tf-btn" data-q="q40" data-val="False">False</button>
  </div></div>
</div>
<div class="sec-hdr">F · Identify the error</div>
<div class="q-card" data-id="q41">
  <div class="q-hdr"><span class="q-num">Q41</span><span class="diff diff-hard">hard</span><span class="q-type">Identify the Error</span></div>
  <div class="q-body"><p>Session 7 aerobic training: patient on cycle ergometer at 40W. SpO₂ 91%, HR 108 bpm, Borg 5/10. The physio notes these values and progresses the session to 45W (intensity increase) because the patient tolerates well.</p><div class="opts"><button class="opt-btn" data-q="q41" data-val="A"><span class="opt-letter">A</span><span class="opt-text">SpO₂ 91% is below the minimum 92% required during aerobic exercise</span></button><button class="opt-btn" data-q="q41" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Intensity should not be increased in session 7 — sessions 1–8 are interval training at fixed intensity; intensity is only progressed from session 9 onwards. Duration is increased first, not intensity.</span></button><button class="opt-btn" data-q="q41" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Borg 5/10 is too high for aerobic training — target is 3–4/10</span></button><button class="opt-btn" data-q="q41" data-val="D"><span class="opt-letter">D</span><span class="opt-text">HR 108 bpm exceeds the aerobic training target and the session should have been stopped</span></button></div></div>
</div>
<div class="q-card" data-id="q42">
  <div class="q-hdr"><span class="q-num">Q42</span><span class="diff diff-medium">medium</span><span class="q-type">Identify the Error</span></div>
  <div class="q-body"><p>Before Abhyangam, the therapist screens the patient: no open wounds ✓, no acute dermatitis ✓, last exercise 45 minutes ago ✓, asks about DVT and patient says no calf pain ✓. The therapist proceeds with the full body massage.</p><div class="opts"><button class="opt-btn" data-q="q42" data-val="A"><span class="opt-letter">A</span><span class="opt-text">DVT screening must include a physical examination of the calves, not just verbal questioning — ask specifically about swelling and hospitalisation history, and visually inspect lower limbs; if any suspicion, no lower limb massage and alert doctor</span></button><button class="opt-btn" data-q="q42" data-val="B"><span class="opt-letter">B</span><span class="opt-text">45 minutes post-exercise is sufficient wait — 1-hour rule applies only to high-intensity exercise</span></button><button class="opt-btn" data-q="q42" data-val="C"><span class="opt-letter">C</span><span class="opt-text">DVT verbal screening is adequate — physical inspection is the doctor&#39;s responsibility</span></button><button class="opt-btn" data-q="q42" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Nothing is wrong — the therapist followed the correct protocol</span></button></div></div>
</div>
<div class="q-card" data-id="q43">
  <div class="q-hdr"><span class="q-num">Q43</span><span class="diff diff-medium">medium</span><span class="q-type">Identify the Error</span></div>
  <div class="q-body"><p>Psychology session 6 (mid-programme): the psychologist notes the patient has PHQ-9 = 12. She reduces session structure to &#39;supportive chat&#39; as the patient seems to be coping. No functional outcome tools are used.</p><div class="opts"><button class="opt-btn" data-q="q43" data-val="A"><span class="opt-letter">A</span><span class="opt-text">PHQ-9 12 requires immediate psychiatrist referral</span></button><button class="opt-btn" data-q="q43" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Two errors: (1) Structured CBT elements must continue regardless of apparent coping — subjective appearance is not a clinical measure; (2) Functional outcome tools (DCS, IPQ-R) must be used to demonstrate psychological improvement — &#39;supportive chat&#39; without structure is not IPR psychology</span></button><button class="opt-btn" data-q="q43" data-val="C"><span class="opt-letter">C</span><span class="opt-text">PHQ-9 should be repeated immediately — weekly monitoring is required</span></button><button class="opt-btn" data-q="q43" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Nothing is wrong — the psychologist adapted to patient needs</span></button></div></div>
</div>
<div class="q-card" data-id="q44">
  <div class="q-hdr"><span class="q-num">Q44</span><span class="diff diff-hard">hard</span><span class="q-type">Identify the Error</span></div>
  <div class="q-body"><p>On a Monday, a patient has both physiotherapy (session 12) AND naturopathy (hydrotherapy + steam) scheduled. The physio completes the full 45-minute aerobic session (Borg 6, SpO₂ 90%) at 10 AM. At 10:30 AM, the naturopath does contrast hydrotherapy followed by steam inhalation with eucalyptus. No communication between teams.</p><div class="opts"><button class="opt-btn" data-q="q44" data-val="A"><span class="opt-letter">A</span><span class="opt-text">The sessions are adequately spaced — 30 minutes is sufficient between physiotherapy and naturopathy</span></button><button class="opt-btn" data-q="q44" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Multiple errors: (1) No coordination between PT and naturopathy teams — total exercise load was not managed; (2) Steam with eucalyptus in a patient not previously tested for bronchospasm with additives is a risk; (3) The sequence (vigorous aerobic → immediate hydrotherapy) violates the principle of cumulative load management for deconditioned respiratory patients</span></button><button class="opt-btn" data-q="q44" data-val="C"><span class="opt-letter">C</span><span class="opt-text">The error was scheduling both on the same day — they should always be on separate days</span></button><button class="opt-btn" data-q="q44" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Eucalyptus steam is safe — it is a natural bronchodilator, not a trigger</span></button></div></div>
</div>
<div class="q-card" data-id="q45">
  <div class="q-hdr"><span class="q-num">Q45</span><span class="diff diff-hard">hard</span><span class="q-type">Identify the Error</span></div>
  <div class="q-body"><p>A physiotherapist documents: &#39;Patient declined posture correction for kyphosis — patient preference respected. No further action.&#39; The psychology sessions have identified the same patient scores DCS (Dyspnoea Catastrophising Scale) high and consistently avoids exercise due to fear of breathlessness.</p><div class="opts"><button class="opt-btn" data-q="q45" data-val="A"><span class="opt-letter">A</span><span class="opt-text">The physio was correct — patient autonomy must be respected</span></button><button class="opt-btn" data-q="q45" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Two linked errors: (1) Kyphosis education was not provided before the patient declined — the patient must understand the breathing impact before making an informed decision; (2) High DCS score + exercise avoidance is the exact profile requiring coordinated PT + psychology intervention. These two teams must communicate. Neither can manage this patient in isolation.</span></button><button class="opt-btn" data-q="q45" data-val="C"><span class="opt-letter">C</span><span class="opt-text">The DCS score is the psychology team&#39;s responsibility — physio has fulfilled their duty</span></button><button class="opt-btn" data-q="q45" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Document only is correct — forcing posture correction is inappropriate</span></button></div></div>
</div>
<div class="sec-hdr">G · Scenario</div>
<div class="q-card" data-id="q46">
  <div class="q-hdr"><span class="q-num">Q46</span><span class="diff diff-easy">easy</span><span class="q-type">Scenario</span></div>
  <div class="q-body"><p>During the second Nasya session, a patient reports a headache and nasal discharge after the oil instillation. The Ayurveda therapist should:</p><div class="opts"><button class="opt-btn" data-q="q46" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Continue — mild headache and nasal discharge are expected effects of Nasya</span></button><button class="opt-btn" data-q="q46" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Stop the session, document symptoms, inform the treating physician — unexpected adverse effects during any Ayurveda procedure require clinical review before the next session</span></button><button class="opt-btn" data-q="q46" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Reduce the number of drops to 1 per nostril and complete the session</span></button><button class="opt-btn" data-q="q46" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Apply cold compress to the forehead and resume after 10 minutes</span></button></div></div>
</div>
<div class="q-card" data-id="q47">
  <div class="q-hdr"><span class="q-num">Q47</span><span class="diff diff-medium">medium</span><span class="q-type">Scenario</span></div>
  <div class="q-body"><p>A COPD patient completes session 8 (last interval session) with Borg 4/10 and SpO₂ 93% consistently. For session 9, the physiotherapist plans continuous training. What intensity should be prescribed?</p><div class="opts"><button class="opt-btn" data-q="q47" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Same intensity as session 8 — no change at transition from interval to continuous</span></button><button class="opt-btn" data-q="q47" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Reduce intensity by 20% at transition to continuous — the sustained effort requires lower starting intensity than interval peaks</span></button><button class="opt-btn" data-q="q47" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Progress duration to 20–25 minutes continuous at same Borg target (4–6/10) at the intensity already tolerated during interval work — then increase duration progressively (5 min/week) before increasing intensity</span></button><button class="opt-btn" data-q="q47" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Increase intensity to 85% peak work rate — continuous training allows higher sustained load than interval</span></button></div></div>
</div>
<div class="q-card" data-id="q48">
  <div class="q-hdr"><span class="q-num">Q48</span><span class="diff diff-medium">medium</span><span class="q-type">Scenario</span></div>
  <div class="q-body"><p>A patient in week 6 of IPR says: &#39;Every time I exercise I feel like I&#39;m going to collapse — I know something bad is going to happen.&#39; This represents:</p><div class="opts"><button class="opt-btn" data-q="q48" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Accurate health anxiety — the patient may have undiagnosed cardiac arrhythmia</span></button><button class="opt-btn" data-q="q48" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Dyspnoea catastrophising — this thought pattern drives avoidance and must be addressed with CBT cognitive restructuring. Challenge: &#39;You have completed 15 sessions without collapse. Let us look at what actually happens.&#39;</span></button><button class="opt-btn" data-q="q48" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Appropriate caution — patients with COPD should be cautious about exercise intensity</span></button><button class="opt-btn" data-q="q48" data-val="D"><span class="opt-letter">D</span><span class="opt-text">A contraindication to further exercise — patient consent has been withdrawn</span></button></div></div>
</div>
<div class="q-card" data-id="q49">
  <div class="q-hdr"><span class="q-num">Q49</span><span class="diff diff-hard">hard</span><span class="q-type">Scenario</span></div>
  <div class="q-body"><p>At session 16 of physiotherapy, the physiotherapist re-assesses (scheduled reassessment at session 12 and 24). 6MWT improves 28 metres from baseline. CAT score improves from 22 to 18 (improvement of 4). Are these clinically significant improvements?</p><div class="opts"><button class="opt-btn" data-q="q49" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Yes — both exceed MCID thresholds</span></button><button class="opt-btn" data-q="q49" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Partial — 6MWT improvement of 28 m is just below the MCID of 30 m (not yet clinically significant); CAT improvement of 4 meets MCID (≥2). Mixed picture — review exercise prescription and discuss with patient. Do not discharge.</span></button><button class="opt-btn" data-q="q49" data-val="C"><span class="opt-letter">C</span><span class="opt-text">No — neither meets MCID; discharge patient from PR</span></button><button class="opt-btn" data-q="q49" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Yes — 28 m is within measurement error of 30 m and both parameters are improving</span></button></div></div>
</div>
<div class="q-card" data-id="q50">
  <div class="q-hdr"><span class="q-num">Q50</span><span class="diff diff-hard">hard</span><span class="q-type">Scenario</span></div>
