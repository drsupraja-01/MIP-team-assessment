<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIP Staff Assessment — Exam 2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0f1f38;--navy2:#1a3055;
  --rt:#0C447C;--rt-bg:#eff6ff;--rt-dot:#378ADD;
  --nu:#633806;--nu-bg:#fffbeb;--nu-dot:#BA7517;
  --ph:#085041;--ph-bg:#f0fdf6;--ph-dot:#1D9E75;
  --rc:#712B13;--rc-bg:#fff5f0;--rc-dot:#D85A30;
  --pt:#3C3489;--pt-bg:#f3f0fe;--pt-dot:#7F77DD;
  --dr:#d4920a;--dr-bg:#111;--dr-dot:#d4920a;
  --surface:#f8f7f4;--card:#fff;--border:#e8e5df;
  --text:#1a1814;--sub:#6b6560;--accent:#0f1f38;
  --radius:14px;--shadow:0 2px 12px rgba(15,31,56,.08);
}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--text);min-height:100vh}

/* ── LOGIN SCREEN ── */
#login-screen{position:fixed;inset:0;background:var(--navy);display:flex;align-items:center;justify-content:center;z-index:1000;flex-direction:column;gap:2rem;padding:2rem}
.login-logo{font-family:'DM Serif Display',serif;font-size:2rem;color:#fff;letter-spacing:-.02em;text-align:center}
.login-logo span{color:var(--dr);font-style:italic}
.login-box{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:2.5rem;width:100%;max-width:420px;backdrop-filter:blur(10px)}
.login-box h2{font-family:'DM Serif Display',serif;font-size:1.5rem;color:#fff;margin-bottom:.4rem}
.login-box p{font-size:.9rem;color:rgba(255,255,255,.5);margin-bottom:2rem}
.form-group{margin-bottom:1.2rem}
.form-group label{display:block;font-size:.8rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:.5rem}
.form-group input,.form-group select{width:100%;padding:.8rem 1rem;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:.95rem;color:#fff;outline:none;transition:.2s}
.form-group input::placeholder{color:rgba(255,255,255,.3)}
.form-group input:focus,.form-group select:focus{border-color:rgba(255,255,255,.4);background:rgba(255,255,255,.12)}
.form-group select option{background:#1a1a2e;color:#fff}
.login-btn{width:100%;padding:.9rem;background:#d4920a;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:600;color:#0f1f38;cursor:pointer;transition:.2s;margin-top:.5rem}
.login-btn:hover{background:#e6a50c;transform:translateY(-1px)}
#login-error{color:#ff6b6b;font-size:.85rem;margin-top:.8rem;display:none;text-align:center}

/* ── MAIN WRAPPER ── */
#main-wrap{display:none;min-height:100vh;flex-direction:column}
#main-wrap.active{display:flex}

/* ── HEADER ── */
.main-hdr{background:var(--navy);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,.3)}
.hdr-left{display:flex;align-items:center;gap:1rem}
.hdr-logo{font-family:'DM Serif Display',serif;font-size:1.25rem;color:#fff}
.hdr-logo em{color:var(--dr);font-style:italic}
.hdr-pill{font-size:.75rem;padding:.25rem .75rem;border-radius:20px;font-weight:600;background:rgba(255,255,255,.1);color:rgba(255,255,255,.7)}
.hdr-right{display:flex;align-items:center;gap:1rem}
.staff-name-hdr{font-size:.85rem;color:rgba(255,255,255,.6)}
.staff-name-hdr strong{color:#fff}
.progress-hdr{font-family:'JetBrains Mono',monospace;font-size:.8rem;color:rgba(255,255,255,.5)}
.progress-hdr span{color:#d4920a;font-weight:600}

/* ── PROGRESS BAR ── */
.prog-bar-wrap{height:3px;background:rgba(255,255,255,.1);position:sticky;top:64px;z-index:99}
.prog-bar{height:100%;background:linear-gradient(90deg,#d4920a,#f0c040);width:0%;transition:width .4s ease}

/* ── BODY ── */
.exam-body{flex:1;display:grid;grid-template-columns:220px 1fr;max-width:1200px;margin:0 auto;width:100%;padding:2rem 1.5rem;gap:2rem}

/* ── SIDEBAR NAV ── */
.sidebar{position:sticky;top:84px;align-self:start;max-height:calc(100vh - 100px);overflow-y:auto}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.unit-meta{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem;box-shadow:var(--shadow)}
.unit-name{font-family:'DM Serif Display',serif;font-size:1.1rem;color:var(--accent);margin-bottom:.2rem}
.unit-sub{font-size:.75rem;color:var(--sub)}
.unit-pass{display:inline-block;margin-top:.6rem;font-size:.75rem;font-weight:600;padding:.2rem .7rem;border-radius:12px;background:#f0fdf4;color:#166534}
.nav-list{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.nav-item{display:flex;align-items:center;gap:.75rem;padding:.75rem 1rem;cursor:pointer;font-size:.82rem;color:var(--sub);border-bottom:1px solid var(--border);transition:.15s;text-decoration:none}
.nav-item:last-child{border-bottom:none}
.nav-item:hover{background:#f5f4f1;color:var(--text)}
.nav-item.active{background:var(--accent);color:#fff}
.nav-count{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:.75rem;opacity:.6}
.nav-check{width:16px;height:16px;border-radius:50%;background:var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.6rem;color:transparent;transition:.3s}
.nav-item.done .nav-check{background:#22c55e;color:#fff}

/* ── QUESTIONS AREA ── */
.questions-area{min-width:0}
.sec-hdr{font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--sub);padding:.5rem 0;margin:1.5rem 0 .75rem;border-bottom:2px solid var(--border)}
.sec-hdr:first-child{margin-top:0}

/* ── QUESTION CARD ── */
.q-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:1rem;overflow:hidden;transition:border-color .2s;box-shadow:var(--shadow)}
.q-card.answered{border-color:#22c55e2a;background:#f0fdf4}
.q-hdr{display:flex;align-items:center;gap:.5rem;padding:.75rem 1.25rem;background:#f9f8f5;border-bottom:1px solid var(--border)}
.q-num{font-family:'JetBrains Mono',monospace;font-size:.8rem;font-weight:500;color:var(--sub)}
.q-type{font-size:.7rem;font-weight:600;padding:.15rem .6rem;border-radius:8px;background:var(--border);color:var(--sub);margin-left:auto}
.diff{font-size:.68rem;font-weight:700;padding:.15rem .5rem;border-radius:6px}
.diff-easy{background:#dcfce7;color:#15803d}
.diff-medium{background:#fef9c3;color:#854d0e}
.diff-hard{background:#fee2e2;color:#991b1b}
.q-body{padding:1.25rem}
.q-body p{font-size:.95rem;line-height:1.65;color:var(--text);margin-bottom:1rem}
.q-body p:last-child{margin-bottom:0}

/* ── FIB ── */
.fib-wrap{display:flex;flex-wrap:wrap;gap:.6rem;margin-top:.75rem}
.fib-box{padding:.55rem .8rem;border:2px solid var(--border);border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:.9rem;width:160px;outline:none;transition:.2s;background:#f9f8f5}
.fib-box:focus{border-color:var(--accent);background:#fff}
.fib-box.filled{border-color:#22c55e;background:#f0fdf4}

/* ── MATCH ── */
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-top:.75rem}
.match-row{display:flex;align-items:flex-start;gap:.75rem;padding:.6rem 0;border-bottom:1px solid #f0eee8}
.match-row:last-child{border-bottom:none}
.match-a{font-size:.88rem;flex:1;line-height:1.5;color:var(--text)}
.match-sel{padding:.4rem .7rem;border:2px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:600;background:#f9f8f5;outline:none;cursor:pointer;transition:.2s;min-width:90px}
.match-sel:focus{border-color:var(--accent)}
.match-sel.chosen{border-color:#22c55e;background:#f0fdf4;color:#15803d}
.match-col-b{background:#f5f4f1;border-radius:10px;padding:1rem}
.match-b-item{display:flex;gap:.6rem;font-size:.85rem;line-height:1.5;margin-bottom:.6rem;color:var(--sub)}
.match-b-item:last-child{margin-bottom:0}
.match-letter{font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--accent);flex-shrink:0;min-width:1.2rem}

/* ── MCQ / OPTIONS ── */
.opts{display:flex;flex-direction:column;gap:.5rem;margin-top:.75rem}
.opt-btn{display:flex;align-items:flex-start;gap:.75rem;padding:.75rem 1rem;border:2px solid var(--border);border-radius:10px;background:#f9f8f5;cursor:pointer;text-align:left;font-family:'DM Sans',sans-serif;font-size:.9rem;transition:.15s;width:100%}
.opt-btn:hover{border-color:#c4b5a0;background:#f0ede6}
.opt-btn.selected{border-color:var(--accent);background:#f0f4ff}
.opt-letter{font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--accent);min-width:1.4rem;font-size:.85rem;flex-shrink:0;padding-top:.05rem}
.opt-text{line-height:1.5;color:var(--text)}

/* ── TRUE / FALSE ── */
.tf-wrap{display:flex;gap:.75rem;margin-top:.75rem}
.tf-btn{flex:1;padding:.75rem;border:2px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:600;cursor:pointer;transition:.15s;background:#f9f8f5}
.tf-btn[data-val="True"]:hover,.tf-btn[data-val="True"].selected{border-color:#22c55e;background:#f0fdf4;color:#15803d}
.tf-btn[data-val="False"]:hover,.tf-btn[data-val="False"].selected{border-color:#ef4444;background:#fef2f2;color:#991b1b}

/* ── SUBMIT SECTION ── */
.submit-area{padding:2rem;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-top:2rem;box-shadow:var(--shadow);text-align:center}
.submit-status{font-size:.9rem;color:var(--sub);margin-bottom:1.25rem}
.submit-status strong{color:var(--text)}
.submit-btn{padding:1rem 3rem;background:#0f1f38;border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:600;color:#fff;cursor:not-allowed;opacity:.4;transition:.2s}
.submit-btn.ready{opacity:1;cursor:pointer;background:linear-gradient(135deg,#0f1f38,#1a3a5c)}
.submit-btn.ready:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(15,31,56,.3)}
.submit-btn.submitting{opacity:.7;cursor:wait}

/* ── RESULT SCREEN ── */
#result-screen{display:none;position:fixed;inset:0;background:var(--navy);z-index:2000;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center}
#result-screen.active{display:flex}
.result-icon{font-size:4rem;margin-bottom:1rem}
.result-title{font-family:'DM Serif Display',serif;font-size:2.5rem;color:#fff;margin-bottom:.5rem}
.result-score{font-family:'JetBrains Mono',monospace;font-size:3.5rem;font-weight:500;color:#d4920a;margin:1rem 0}
.result-pass{font-size:1.1rem;font-weight:600;padding:.4rem 1.5rem;border-radius:20px;margin-bottom:1.5rem;display:inline-block}
.result-pass.pass{background:#22c55e22;color:#4ade80;border:1px solid #22c55e44}
.result-pass.fail{background:#ef444422;color:#f87171;border:1px solid #ef444444}
.result-msg{font-size:.95rem;color:rgba(255,255,255,.5);max-width:440px;line-height:1.7}

/* ── UNIT COLOUR THEMING ── */
body.unit-rt .main-hdr{background:var(--rt)}
body.unit-rt .prog-bar{background:linear-gradient(90deg,var(--rt),#6bb3f0)}
body.unit-rt .nav-item.active{background:var(--rt)}
body.unit-rt .opt-btn.selected{border-color:var(--rt);background:#eff6ff}
body.unit-rt .opt-letter{color:var(--rt)}
body.unit-rt .fib-box:focus{border-color:var(--rt)}

body.unit-nursing .main-hdr{background:var(--nu)}
body.unit-nursing .prog-bar{background:linear-gradient(90deg,var(--nu),#e0a050)}
body.unit-nursing .nav-item.active{background:var(--nu)}
body.unit-nursing .opt-btn.selected{border-color:var(--nu);background:#fffbeb}
body.unit-nursing .opt-letter{color:var(--nu)}

body.unit-pharmacy .main-hdr{background:var(--ph)}
body.unit-pharmacy .prog-bar{background:linear-gradient(90deg,var(--ph),#4dba8a)}
body.unit-pharmacy .nav-item.active{background:var(--ph)}
body.unit-pharmacy .opt-btn.selected{border-color:var(--ph);background:#f0fdf6}
body.unit-pharmacy .opt-letter{color:var(--ph)}

body.unit-reception .main-hdr{background:var(--rc)}
body.unit-reception .prog-bar{background:linear-gradient(90deg,var(--rc),#e08070)}
body.unit-reception .nav-item.active{background:var(--rc)}
body.unit-reception .opt-btn.selected{border-color:var(--rc);background:#fff5f0}
body.unit-reception .opt-letter{color:var(--rc)}

body.unit-physio .main-hdr{background:var(--pt)}
body.unit-physio .prog-bar{background:linear-gradient(90deg,var(--pt),#a09aee)}
body.unit-physio .nav-item.active{background:var(--pt)}
body.unit-physio .opt-btn.selected{border-color:var(--pt);background:#f3f0fe}
body.unit-physio .opt-letter{color:var(--pt)}

body.unit-doctor .main-hdr{background:#1a1a1a;border-bottom:2px solid var(--dr)}
body.unit-doctor .prog-bar{background:linear-gradient(90deg,var(--dr),#f0c040)}
body.unit-doctor .nav-item.active{background:var(--dr);color:#0f1f38}
body.unit-doctor .opt-btn.selected{border-color:var(--dr);background:#fffbeb}
body.unit-doctor .opt-letter{color:var(--dr)}

@media(max-width:768px){
  .exam-body{grid-template-columns:1fr}
  .sidebar{position:relative;top:auto;max-height:none}
  .match-grid{grid-template-columns:1fr}
}
</style>
</head>

</div>

// ── LOGIN ─────────────────────────────────────────────────────────
function doLogin(){
  const name = document.getElementById('inp-name').value.trim();
  const id = document.getElementById('inp-id').value.trim().toUpperCase();
  const err = document.getElementById('login-error');
  
  if(!name || !id){err.style.display='block';err.textContent='Please enter both your name and Staff ID.';return;}
  
  const record = STAFF_REGISTRY[id];
  if(!record){err.style.display='block';err.textContent='Staff ID not found. Please check and try again.';return;}
  
  // Fuzzy name match — first name or full name, case-insensitive
  const inputName = name.toLowerCase().replace(/[^a-z\s]/g,'');
  const regName = record.name.toLowerCase().replace(/[^a-z\s]/g,'');
  const inputFirst = inputName.split(' ')[0];
  const regFirst = regName.split(' ')[0];
  
  if(!regName.includes(inputFirst) && !inputName.includes(regFirst)){
    err.style.display='block';
    err.textContent='Name does not match records for that Staff ID. Please check.';
    return;
  }
  
  currentStaff = {id, name:record.name, unit:record.unit};
  currentUnit = record.unit;
  err.style.display='none';
  initExam();
}

// Allow Enter key on login
document.addEventListener('DOMContentLoaded', () => {
  ['inp-name','inp-id'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if(e.key === 'Enter') doLogin();
    });
  });
});

// ── INIT EXAM ─────────────────────────────────────────────────────
function initExam(){
  const meta = UNIT_META[currentUnit];
  
  // Apply unit theme
  document.body.className = meta.cssClass;
  
  // Hide login, show main
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('main-wrap').classList.add('active');
  
  // Header
  document.getElementById('hdr-unit-pill').textContent = meta.label;
  document.getElementById('hdr-staff').innerHTML = `<strong>${currentStaff.name}</strong> &nbsp;·&nbsp; ${currentStaff.id}`;
  
  // Sidebar
  document.getElementById('sb-unit-name').textContent = meta.label;
  document.getElementById('sb-unit-sub').textContent = meta.sub;
  document.getElementById('sb-pass').textContent = `Pass: ${meta.pass} / 50`;
  
  // Build nav
  const nav = document.getElementById('nav-list');
  const navSections = currentUnit === 'doctor' ? DOCTOR_NAV : SECTION_NAV;
  nav.innerHTML = navSections.map(s => `
    <a class="nav-item" href="#${s.id}" id="nav-${s.id}">

}

// ── WIRE ALL INPUTS ───────────────────────────────────────────────
function wireAll(){
  // FIB
  document.querySelectorAll('.fib-box').forEach(inp => {
    inp.addEventListener('input', () => {
      const q = inp.dataset.q;
      const bi = parseInt(inp.dataset.bi);
      if(!answers[q]) answers[q] = [];
      if(!Array.isArray(answers[q])) answers[q] = [];
      answers[q][bi] = inp.value.trim();
      inp.classList.toggle('filled', inp.value.trim().length >= 1);
      checkFibComplete(q);
      updateProgress();
    });
  });
  
  // Match dropdowns
  document.querySelectorAll('.match-sel').forEach(sel => {
    sel.addEventListener('change', () => {
      const q = sel.dataset.q;
      const ri = parseInt(sel.dataset.ri);
      if(!answers[q]) answers[q] = [];
      answers[q][ri] = sel.value;
      sel.classList.toggle('chosen', !!sel.value);
      checkMatchComplete(q);
      updateProgress();
    });
  });
  
  // MCQ / Error / Scenario
  document.querySelectorAll('.opt-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const q = btn.dataset.q;
      document.querySelectorAll(`.opt-btn[data-q="${q}"]`).forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      answers[q] = btn.dataset.val;
      markAnswered(q);
      updateProgress();
    });
  });
  
  // True/False
  document.querySelectorAll('.tf-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const q = btn.dataset.q;
      document.querySelectorAll(`.tf-btn[data-q="${q}"]`).forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      answers[q] = btn.dataset.val;
      markAnswered(q);
      updateProgress();
    });
  });
  
  // Nav highlight on scroll
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if(e.isIntersecting){
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        const secEl = e.target.closest('[id^="sec-"]');
        if(secEl) document.getElementById(`nav-${secEl.id}`)?.classList.add('active');
      }
    });
  }, {threshold:.2});
  document.querySelectorAll('.sec-hdr').forEach(el => observer.observe(el));
}

function checkFibComplete(q){
  const boxes = document.querySelectorAll(`.fib-box[data-q="${q}"]`);
  const vals = Array.from(boxes).map(b => b.value.trim());
  if(vals.every(v => v.length >= 1)){
    answers[q] = vals;
    markAnswered(q);
  }
}

function checkMatchComplete(q){
  const sels = document.querySelectorAll(`.match-sel[data-q="${q}"]`);
  const vals = Array.from(sels).map(s => s.value);
  if(vals.every(v => !!v)){
    answers[q] = vals;
    markAnswered(q);
  }
}

function markAnswered(q){
  const card = document.querySelector(`.q-card[data-id="${q}"]`);
  if(card) card.classList.add('answered');
}

// ── PROGRESS ──────────────────────────────────────────────────────
function countAnswered(){
  let count = 0;
  const key = ANS[currentUnit];
  for(const q of Object.keys(key)){
    if(isAnswered(q)) count++;
  }
  return count;
}

function isAnswered(q){
  const v = answers[q];
  if(!v) return false;
  if(Array.isArray(v)) return v.every(x => x && x.length >= 1);
  return v.length > 0;
}

function updateProgress(){
  const done = countAnswered();
  const total = Object.keys(ANS[currentUnit]).length;
  document.getElementById('hdr-progress').textContent = done;
  document.getElementById('prog-bar').style.width = (done/total*100)+'%';
  
  const btn = document.getElementById('submit-btn');
  const status = document.getElementById('submit-status');
  
  if(done === total && !submitted){
    btn.classList.add('ready');
    btn.disabled = false;
    status.innerHTML = `All <strong>${total} questions answered</strong>. Ready to submit.`;
  } else if(!submitted){
    btn.classList.remove('ready');
    btn.disabled = true;
    status.innerHTML = `<strong>${done}</strong> of <strong>${total}</strong> questions answered. Complete all to submit.`;
  }
  
  // Update nav section done status
  const navSections = currentUnit === 'doctor' ? DOCTOR_NAV : SECTION_NAV;
  navSections.forEach(sec => {
    const done_count = sec.qs.filter(q => isAnswered(q)).length;
    const navEl = document.getElementById(`nav-${sec.id}`);
    if(navEl) navEl.classList.toggle('done', done_count === sec.count);
  });
}

// ── SCORING ───────────────────────────────────────────────────────
function scoreAnswers(){
  const key = ANS[currentUnit];
  let score = 0;
  const detail = {};
  
  for(const [q, correct] of Object.entries(key)){
    const given = answers[q];
    let isCorrect = false;
    
    if(q === 'q6'){
      // Match: check all 5 dropdown selections form the correct answer string
      // Correct is like "1→D · 2→E · ..."
      // Given is array of letters ['D','E','B','A','C']
      if(Array.isArray(given) && given.length === 5){
        const correctLetters = correct.match(/→([A-E])/g).map(m => m[1]);
        isCorrect = given.every((v,i) => v === correctLetters[i]);
      }
    } else if(Array.isArray(given)){
      // FIB: pipe-separated correct answers
      const parts = correct.split('|').map(p => p.trim().toLowerCase());
      const givenParts = given.map(g => g ? g.trim().toLowerCase() : '');
      // Allow partial match within each part (substring)
      isCorrect = parts.every((p,i) => {
        const g = givenParts[i] || '';
        return g.length >= 2 && (g.includes(p) || p.includes(g));
      });
    } else {
      // MCQ / TF / Error / Scenario
      isCorrect = (given || '').trim().toLowerCase() === correct.trim().toLowerCase();
    }
    
    detail[q] = isCorrect;
    if(isCorrect) score++;
  }
  
  return {score, detail};
}

// ── SUBMIT ────────────────────────────────────────────────────────
async function doSubmit(){
  if(submitted) return;
  submitted = true;
  
  const btn = document.getElementById('submit-btn');
  btn.classList.add('submitting');
  btn.textContent = 'Submitting...';
  btn.disabled = true;
  
  const {score, detail} = scoreAnswers();
  const meta = UNIT_META[currentUnit];
  const passed = score >= meta.pass;
  const now = new Date().toISOString();
  
  // Build flat answer map for sheet
  const flatAnswers = {};
  const key = ANS[currentUnit];
  for(const q of Object.keys(key)){
    const v = answers[q];
    if(Array.isArray(v)) flatAnswers[q] = v.join('|');
    else flatAnswers[q] = v || '';
  }
  
  const payload = {
    timestamp: now,
    exam: EXAM_NUMBER,
    staff_id: currentStaff.id,
    staff_name: currentStaff.name,
    unit: currentUnit,
    score: score,
    total: 50,
    pass_mark: meta.pass,
    passed: passed,
    answers: JSON.stringify(flatAnswers),
    detail: JSON.stringify(detail),
  };
  
  // Submit to Apps Script
  try {
    const form = new FormData();
    for(const [k,v] of Object.entries(payload)) form.append(k, v);
    await fetch(APPS_SCRIPT_URL, {method:'POST', body: form, mode:'no-cors'});
  } catch(e) {
    console.warn('Submit failed:', e);
  }
  
  // Show result
  showResult(score, meta.pass, passed, currentStaff.name);
}

function showResult(score, pass, passed, name){
  const rs = document.getElementById('result-screen');
  document.getElementById('res-icon').textContent = passed ? '🎉' : '📋';
  document.getElementById('res-title').textContent = passed ? 'Well done!' : 'Assessment Complete';
  document.getElementById('res-score').textContent = `${score} / 50`;
  const passEl = document.getElementById('res-pass');
  passEl.textContent = passed ? `PASSED (pass mark: ${pass})` : `NOT YET (pass mark: ${pass})`;
  passEl.className = 'result-pass ' + (passed ? 'pass' : 'fail');
  document.getElementById('res-msg').textContent = passed
    ? `Excellent work, ${name.split(' ')[0]}. Your result has been recorded.`
    : `Your result has been recorded. Your team lead will review your performance and discuss next steps.`;
  rs.classList.add('active');
}

  <div class="q-body"><p>In Pursed-Lip Breathing, the inhale-to-exhale ratio is __________. The patient inhales through the __________ for 2 counts and exhales through pursed lips for 4 counts.</p><div class="fib-wrap"><input type="text" class="fib-box" data-q="q5" data-bi="0" placeholder="..." autocomplete="off"><input type="text" class="fib-box" data-q="q5" data-bi="1" placeholder="..." autocomplete="off"><input type="text" class="fib-box" data-q="q5" data-bi="2" placeholder="..." autocomplete="off"><input type="text" class="fib-box" data-q="q5" data-bi="3" placeholder="..." autocomplete="off"><input type="text" class="fib-box" data-q="q5" data-bi="4" placeholder="..." autocomplete="off"><input type="text" class="fib-box" data-q="q5" data-bi="5" placeholder="..." autocomplete="off"><input type="text" class="fib-box" data-q="q5" data-bi="6" placeholder="..." autocomplete="off"><input type="text" class="fib-box" data-q="q5" data-bi="7" placeholder="..." autocomplete="off"><input type="text" class="fib-box" data-q="q5" data-bi="8" placeholder="..." autocomplete="off"><input type="text" class="fib-box" data-q="q5" data-bi="9" placeholder="..." autocomplete="off"></div></div>
</div>
<div class="sec-hdr">B · Match the correct answer</div>
<div class="q-card" data-id="q6">
  <div class="q-hdr"><span class="q-num">Q6 — Q10</span><span class="q-type">Match (5 marks)</span></div>
  <div class="q-body">
    <p>Match each RT situation or finding (Column A) to the correct action or interpretation (Column B).</p>
    <div class="match-grid">
      <div class="match-col-a"><div class="match-row">
      <div class="match-a">1 · Brush cytology specimen — cells drying on glass</div>
      <select class="match-sel" data-q="q6" data-ri="0"><option value="" disabled selected>Choose...</option><option value="A">A</option><option value="B">B</option><option value="C">C</option><option value="D">D</option><option value="E">E</option></select>
    </div><div class="match-row">
      <div class="match-a">2 · CPAP humidifier filled with tap water</div>
      <select class="match-sel" data-q="q6" data-ri="1"><option value="" disabled selected>Choose...</option><option value="A">A</option><option value="B">B</option><option value="C">C</option><option value="D">D</option><option value="E">E</option></select>
    </div><div class="match-row">
      <div class="match-a">3 · SPT allergen vial temperature log shows 10°C for 2 hours</div>
      <select class="match-sel" data-q="q6" data-ri="2"><option value="" disabled selected>Choose...</option><option value="A">A</option><option value="B">B</option><option value="C">C</option><option value="D">D</option><option value="E">E</option></select>
    </div><div class="match-row">
      <div class="match-a">4 · Lignocaine cumulative dose reaches 6 mg/kg during bronchoscopy</div>
      <select class="match-sel" data-q="q6" data-ri="3"><option value="" disabled selected>Choose...</option><option value="A">A</option><option value="B">B</option><option value="C">C</option><option value="D">D</option><option value="E">E</option></select>
    </div><div class="match-row">
      <div class="match-a">5 · ACBT huff phase replaced by vigorous coughing</div>
      <select class="match-sel" data-q="q6" data-ri="4"><option value="" disabled selected>Choose...</option><option value="A">A</option><option value="B">B</option><option value="C">C</option><option value="D">D</option><option value="E">E</option></select>
    </div></div>
      <div class="match-col-b"><div class="match-b-item"><span class="match-letter">A</span> A · Alert the doctor — approaching 8 mg/kg toxicity limit</div><div class="match-b-item"><span class="match-letter">B</span> B · Quarantine vials immediately — do not use until pharmacy/consultant review</div><div class="match-b-item"><span class="match-letter">C</span> C · Risk of airway collapse — huff with open glottis is the correct technique</div><div class="match-b-item"><span class="match-letter">D</span> D · Immerse brush in CytoLyt within 5 seconds of withdrawal — cells degrade rapidly</div><div class="match-b-item"><span class="match-letter">E</span> E · Drain and refill with distilled water only — tap water causes mineral scale and bacterial growth</div></div>
    </div>
  </div>
</div>
<div class="sec-hdr">C · MCQ (select one best answer)</div>
<div class="q-card" data-id="q11">
  <div class="q-hdr"><span class="q-num">Q11</span><span class="diff diff-hard">hard</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>DLCO is low and KCO (DLCO/VA) is also low. Spirometry shows obstruction. The most likely diagnosis is:</p><div class="opts"><button class="opt-btn" data-q="q11" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Restricted lung volume only</span></button><button class="opt-btn" data-q="q11" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Emphysema — loss of alveolar surface area reduces both DLCO and KCO</span></button><button class="opt-btn" data-q="q11" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Pulmonary hypertension</span></button><button class="opt-btn" data-q="q11" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Pleural effusion</span></button></div></div>
</div>
<div class="q-card" data-id="q12">
  <div class="q-hdr"><span class="q-num">Q12</span><span class="diff diff-hard">hard</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>Body plethysmography panting rate drifts to 3 Hz. The correct action is:</p><div class="opts"><button class="opt-btn" data-q="q12" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Accept — faster panting improves precision</span></button><button class="opt-btn" data-q="q12" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Slow patient down to ~1 Hz using the metronome — panting &gt;2 Hz gives artifactually elevated TGV</span></button><button class="opt-btn" data-q="q12" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Increase the panting rate further to 4 Hz for better averaging</span></button><button class="opt-btn" data-q="q12" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Accept if the Vtg CV is &lt;10%</span></button></div></div>
</div>
<div class="q-card" data-id="q13">
  <div class="q-hdr"><span class="q-num">Q13</span><span class="diff diff-hard">hard</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>AOS report: R5 elevated, R5–R20 normal, X5 normal. What pattern does this suggest?</p><div class="opts"><button class="opt-btn" data-q="q13" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Small airway disease — the classic peripheral pattern</span></button><button class="opt-btn" data-q="q13" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Large airway obstruction — R5 elevated without R5–R20 difference suggests central airway involvement</span></button><button class="opt-btn" data-q="q13" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Normal — R5 elevation alone is within biological variation</span></button><button class="opt-btn" data-q="q13" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Equipment calibration failure — repeat the test</span></button></div></div>
</div>
<div class="q-card" data-id="q14">
  <div class="q-hdr"><span class="q-num">Q14</span><span class="diff diff-medium">medium</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>A patient on no ICS has a FeNO of 42 ppb. The correct interpretation is:</p><div class="opts"><button class="opt-btn" data-q="q14" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Low — below the 50 ppb threshold</span></button><button class="opt-btn" data-q="q14" data-val="B"><span class="opt-letter">B</span><span class="opt-text">High — 42 ppb without ICS suppression indicates significant eosinophilic inflammation</span></button><button class="opt-btn" data-q="q14" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Intermediate — 25–50 ppb range; clinical context required before acting</span></button><button class="opt-btn" data-q="q14" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Invalid — FeNO cannot be interpreted without knowing FEV1</span></button></div></div>
</div>
<div class="q-card" data-id="q15">
  <div class="q-hdr"><span class="q-num">Q15</span><span class="diff diff-medium">medium</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>The Schiller spirometry 3L syringe reads 2.88 L during daily calibration. The RT should:</p><div class="opts"><button class="opt-btn" data-q="q15" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Accept — within ±5% tolerance</span></button><button class="opt-btn" data-q="q15" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Log and proceed with a note on each report</span></button><button class="opt-btn" data-q="q15" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Clean the flow sensor and repeat; if still outside 2.895–3.105 L range, suspend all testing</span></button><button class="opt-btn" data-q="q15" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Accept for morning patients and recheck at noon</span></button></div></div>
</div>
<div class="q-card" data-id="q16">
  <div class="q-hdr"><span class="q-num">Q16</span><span class="diff diff-easy">easy</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>The Skin Prick Test is positive when the mean wheal diameter is:</p><div class="opts"><button class="opt-btn" data-q="q16" data-val="A"><span class="opt-letter">A</span><span class="opt-text">≥5 mm greater than the negative control</span></button><button class="opt-btn" data-q="q16" data-val="B"><span class="opt-letter">B</span><span class="opt-text">≥3 mm greater than the negative control AND ≥50% of the positive control wheal</span></button><button class="opt-btn" data-q="q16" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Any wheal visible to the naked eye</span></button><button class="opt-btn" data-q="q16" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Equal to the positive control wheal</span></button></div></div>
</div>
<div class="q-card" data-id="q17">
  <div class="q-hdr"><span class="q-num">Q17</span><span class="diff diff-easy">easy</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>Allergen extracts for SPT must be stored at:</p><div class="opts"><button class="opt-btn" data-q="q17" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Room temperature — 18–25°C</span></button><button class="opt-btn" data-q="q17" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Frozen at −20°C</span></button><button class="opt-btn" data-q="q17" data-val="C"><span class="opt-letter">C</span><span class="opt-text">2–8°C in a dedicated allergen refrigerator with twice-daily temperature logging</span></button><button class="opt-btn" data-q="q17" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Below 15°C — any cool location is acceptable</span></button></div></div>
</div>
<div class="q-card" data-id="q18">
  <div class="q-hdr"><span class="q-num">Q18</span><span class="diff diff-easy">easy</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>The maximum topical lignocaine dose during bronchoscopy is:</p><div class="opts"><button class="opt-btn" data-q="q18" data-val="A"><span class="opt-letter">A</span><span class="opt-text">4 mg/kg</span></button><button class="opt-btn" data-q="q18" data-val="B"><span class="opt-letter">B</span><span class="opt-text">6 mg/kg</span></button><button class="opt-btn" data-q="q18" data-val="C"><span class="opt-letter">C</span><span class="opt-text">8 mg/kg — tracked cumulatively in real time by the RT</span></button><button class="opt-btn" data-q="q18" data-val="D"><span class="opt-letter">D</span><span class="opt-text">10 mg/kg for nasal instillation only</span></button></div></div>
</div>
<div class="q-card" data-id="q19">
  <div class="q-hdr"><span class="q-num">Q19</span><span class="diff diff-easy">easy</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>CPAP adherence is defined as ≥4 hours per night on at least what percentage of nights at 30 days?</p><div class="opts"><button class="opt-btn" data-q="q19" data-val="A"><span class="opt-letter">A</span><span class="opt-text">50%</span></button><button class="opt-btn" data-q="q19" data-val="B"><span class="opt-letter">B</span><span class="opt-text">60%</span></button><button class="opt-btn" data-q="q19" data-val="C"><span class="opt-letter">C</span><span class="opt-text">70% of nights</span></button><button class="opt-btn" data-q="q19" data-val="D"><span class="opt-letter">D</span><span class="opt-text">80%</span></button></div></div>
</div>
<div class="q-card" data-id="q20">
  <div class="q-hdr"><span class="q-num">Q20</span><span class="diff diff-medium">medium</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>A patient starting CPAP complains of aerophagia (air swallowing). The RT&#39;s first step is:</p><div class="opts"><button class="opt-btn" data-q="q20" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Stop CPAP — aerophagia means the device is unsuitable for this patient</span></button><button class="opt-btn" data-q="q20" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Lower pressure if auto-CPAP; consider switching to BiPAP if persistent</span></button><button class="opt-btn" data-q="q20" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Increase CPAP pressure — aerophagia indicates undertreated OSA</span></button><button class="opt-btn" data-q="q20" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Change mask to full-face — nasal masks cause aerophagia</span></button></div></div>
</div>
<div class="q-card" data-id="q21">
  <div class="q-hdr"><span class="q-num">Q21</span><span class="diff diff-medium">medium</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>The ACBT Forced Expiration Technique (FET/Huff) works by:</p><div class="opts"><button class="opt-btn" data-q="q21" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Compressing the airway to expel secretions through brute force like coughing</span></button><button class="opt-btn" data-q="q21" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Using a closed glottis to generate maximum expiratory pressure</span></button><button class="opt-btn" data-q="q21" data-val="C"><span class="opt-letter">C</span><span class="opt-text">A medium-volume huff with open glottis — prevents airway collapse while mobilising secretions</span></button><button class="opt-btn" data-q="q21" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Rapid short exhalations repeated 20 times per cycle</span></button></div></div>
</div>
<div class="q-card" data-id="q22">
  <div class="q-hdr"><span class="q-num">Q22</span><span class="diff diff-medium">medium</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>Incentive spirometry target volume after thoracic surgery is set at:</p><div class="opts"><button class="opt-btn" data-q="q22" data-val="A"><span class="opt-letter">A</span><span class="opt-text">50% of pre-operative VC</span></button><button class="opt-btn" data-q="q22" data-val="B"><span class="opt-letter">B</span><span class="opt-text">75% of pre-operative VC if available</span></button><button class="opt-btn" data-q="q22" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Maximum achievable volume — no specific target needed</span></button><button class="opt-btn" data-q="q22" data-val="D"><span class="opt-letter">D</span><span class="opt-text">100% of predicted FVC based on height and age</span></button></div></div>
</div>
<div class="q-card" data-id="q23">
  <div class="q-hdr"><span class="q-num">Q23</span><span class="diff diff-hard">hard</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>The first aliquot of BAL should be sent for:</p><div class="opts"><button class="opt-btn" data-q="q23" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Cytology — it is the most cellular portion</span></button><button class="opt-btn" data-q="q23" data-val="B"><span class="opt-letter">B</span><span class="opt-text">TB/CBNAAT — most likely to contain organisms</span></button><button class="opt-btn" data-q="q23" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Microbiology — it has the highest yield for bacterial culture</span></button><button class="opt-btn" data-q="q23" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Flow cytometry — needed for lymphoma workup</span></button></div></div>
</div>
<div class="q-card" data-id="q24">
  <div class="q-hdr"><span class="q-num">Q24</span><span class="diff diff-medium">medium</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>EEG electrode impedance for Level 1 PSG must be below:</p><div class="opts"><button class="opt-btn" data-q="q24" data-val="A"><span class="opt-letter">A</span><span class="opt-text">10 kΩ</span></button><button class="opt-btn" data-q="q24" data-val="B"><span class="opt-letter">B</span><span class="opt-text">5 kΩ — any electrode above this must be re-prepped before lights-out</span></button><button class="opt-btn" data-q="q24" data-val="C"><span class="opt-letter">C</span><span class="opt-text">2 kΩ</span></button><button class="opt-btn" data-q="q24" data-val="D"><span class="opt-letter">D</span><span class="opt-text">No standard — just minimise impedance as much as possible</span></button></div></div>
</div>
<div class="q-card" data-id="q25">
  <div class="q-hdr"><span class="q-num">Q25</span><span class="diff diff-hard">hard</span><span class="q-type">MCQ</span></div>
  <div class="q-body"><p>A patient&#39;s Level 3 HSAT shows AHI of 18 (moderate OSA). The supine AHI is 32 and non-supine AHI is 7. Auto-CPAP is prescribed. The RT notices the body position sensor was not attached during the study. The most important clinical consequence is:</p><div class="opts"><button class="opt-btn" data-q="q25" data-val="A"><span class="opt-letter">A</span><span class="opt-text">The AHI is still valid — body position does not affect AHI scoring</span></button><button class="opt-btn" data-q="q25" data-val="B"><span class="opt-letter">B</span><span class="opt-text">The study must be repeated — without a position sensor, AHI cannot be staged</span></button><button class="opt-btn" data-q="q25" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Positional OSA cannot be identified — patient may have been managed with CPAP when positional therapy alone might suffice, or supine severity may have been underestimated</span></button><button class="opt-btn" data-q="q25" data-val="D"><span class="opt-letter">D</span><span class="opt-text">The study is invalid because missing sensors always invalidate HSAT</span></button></div></div>
</div>
<div class="sec-hdr">D · True or False</div>
<div class="q-card" data-id="q26">
  <div class="q-hdr"><span class="q-num">Q26</span><span class="diff diff-medium">medium</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>A patient&#39;s spirometry BD response shows FEV1 increase of 13% and 210 mL. This meets ATS/ERS criteria for significant BD response.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q26" data-val="True">True</button>
    <button class="tf-btn" data-q="q26" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q27">
  <div class="q-hdr"><span class="q-num">Q27</span><span class="diff diff-hard">hard</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>In AOS, a COV of R5 below 10% confirms that the cheeks were adequately supported during the recording.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q27" data-val="True">True</button>
    <button class="tf-btn" data-q="q27" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q28">
  <div class="q-hdr"><span class="q-num">Q28</span><span class="diff diff-medium">medium</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>Haemoglobin must be recorded at every DLCO visit — anaemia reduces DLCO by approximately 7% per g/dL below normal.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q28" data-val="True">True</button>
    <button class="tf-btn" data-q="q28" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q29">
  <div class="q-hdr"><span class="q-num">Q29</span><span class="diff diff-easy">easy</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>A single-use lancet can be used for two adjacent allergen sites if wiped clean with alcohol between applications.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q29" data-val="True">True</button>
    <button class="tf-btn" data-q="q29" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q30">
  <div class="q-hdr"><span class="q-num">Q30</span><span class="diff diff-easy">easy</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>The anaphylaxis kit must be verified and signed off before the first patient of every SPT session.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q30" data-val="True">True</button>
    <button class="tf-btn" data-q="q30" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q31">
  <div class="q-hdr"><span class="q-num">Q31</span><span class="diff diff-medium">medium</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>Microbiology BAL specimens can be refrigerated at 4°C for up to 4 hours before dispatch without affecting yield.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q31" data-val="True">True</button>
    <button class="tf-btn" data-q="q31" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q32">
  <div class="q-hdr"><span class="q-num">Q32</span><span class="diff diff-easy">easy</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>The RT must be physically present in the bronchoscopy procedure room throughout — not on standby outside.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q32" data-val="True">True</button>
    <button class="tf-btn" data-q="q32" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q33">
  <div class="q-hdr"><span class="q-num">Q33</span><span class="diff diff-medium">medium</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>A nasal pillow mask is preferred for a patient requiring CPAP pressure of 14 cmH2O who is a mouth breather.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q33" data-val="True">True</button>
    <button class="tf-btn" data-q="q33" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q34">
  <div class="q-hdr"><span class="q-num">Q34</span><span class="diff diff-easy">easy</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>CPAP humidifier water must be drained and refilled with distilled water daily.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q34" data-val="True">True</button>
    <button class="tf-btn" data-q="q34" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q35">
  <div class="q-hdr"><span class="q-num">Q35</span><span class="diff diff-medium">medium</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>Diaphragmatic breathing should be taught seated first, then progressed to supine and standing.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q35" data-val="True">True</button>
    <button class="tf-btn" data-q="q35" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q36">
  <div class="q-hdr"><span class="q-num">Q36</span><span class="diff diff-hard">hard</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>FeNO of 28 ppb on high-dose ICS with documented good adherence is clinically insignificant and requires no action.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q36" data-val="True">True</button>
    <button class="tf-btn" data-q="q36" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q37">
  <div class="q-hdr"><span class="q-num">Q37</span><span class="diff diff-medium">medium</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>CPAP pressure accuracy must be verified quarterly using a manometer — within ±1 cmH2O at 5, 10, and 15 cmH2O settings.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q37" data-val="True">True</button>
    <button class="tf-btn" data-q="q37" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q38">
  <div class="q-hdr"><span class="q-num">Q38</span><span class="diff diff-easy">easy</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>The ACBT breathing control phase uses normal tidal breaths between active phases — not forced exhalations.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q38" data-val="True">True</button>
    <button class="tf-btn" data-q="q38" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q39">
  <div class="q-hdr"><span class="q-num">Q39</span><span class="diff diff-hard">hard</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>A DLCO manoeuvre with an inspired volume of 84% of VC is acceptable if the breath-hold time is perfect.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q39" data-val="True">True</button>
    <button class="tf-btn" data-q="q39" data-val="False">False</button>
  </div></div>
</div>
<div class="q-card" data-id="q40">
  <div class="q-hdr"><span class="q-num">Q40</span><span class="diff diff-medium">medium</span><span class="q-type">True / False</span></div>
  <div class="q-body"><p>Beta-blockers are a relative contraindication to SPT because they can reduce the efficacy of adrenaline used to treat anaphylaxis.</p>
  <div class="tf-wrap">
    <button class="tf-btn" data-q="q40" data-val="True">True</button>
    <button class="tf-btn" data-q="q40" data-val="False">False</button>
  </div></div>
</div>
<div class="sec-hdr">F · Identify the error (select the one deviation from SOP)</div>
<div class="q-card" data-id="q41">
  <div class="q-hdr"><span class="q-num">Q41</span><span class="diff diff-hard">hard</span><span class="q-type">Identify the Error</span></div>
  <div class="q-body"><p>Rajasundar performs daily calibration: 3L syringe reads 2.91L (pass). He then measures a patient&#39;s height at 164 cm — with shoes on. He enters the height, selects &#39;Indian/South Asian&#39; reference equations, screens contraindications (patient had cataract surgery 6 weeks ago — cleared), and seats the patient for 5 minutes before testing.</p><div class="opts"><button class="opt-btn" data-q="q41" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Height measured with shoes on — invalidates predicted FVC and FEV1</span></button><button class="opt-btn" data-q="q41" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Indian/South Asian reference equations are incorrect — GLI-Global must be used</span></button><button class="opt-btn" data-q="q41" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Cataract surgery 6 weeks ago is not yet cleared — the absolute contraindication is &lt;4 weeks only, so 6 weeks is actually safe</span></button><button class="opt-btn" data-q="q41" data-val="D"><span class="opt-letter">D</span><span class="opt-text">5-minute seated rest before spirometry is excessive — 2 minutes is the standard</span></button></div></div>
</div>
<div class="q-card" data-id="q42">
  <div class="q-hdr"><span class="q-num">Q42</span><span class="diff diff-hard">hard</span><span class="q-type">Identify the Error</span></div>
  <div class="q-body"><p>During bronchoscopy, Nandakumar sets up the SpO2 probe on the middle finger (patient has nail polish on index finger), tests suction and confirms negative pressure, prepares the BVM with a size 7.5 ET tube, tracks lignocaine at 4 mg/kg cumulative so far, and monitors HR, BP, and SpO2 every 5 minutes.</p><div class="opts"><button class="opt-btn" data-q="q42" data-val="A"><span class="opt-letter">A</span><span class="opt-text">SpO2 probe on middle finger instead of index finger is acceptable when nail polish is present</span></button><button class="opt-btn" data-q="q42" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Only one ET tube size is prepared — ET tubes (6.5, 7.0, AND 7.5) must all be available in the emergency airway kit</span></button><button class="opt-btn" data-q="q42" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Lignocaine tracking at 4 mg/kg is too late — it should be tracked from the first instillation</span></button><button class="opt-btn" data-q="q42" data-val="D"><span class="opt-letter">D</span><span class="opt-text">HR, BP, SpO2 every 5 minutes is insufficient — continuous monitoring is required during bronchoscopy</span></button></div></div>
</div>
<div class="q-card" data-id="q43">
  <div class="q-hdr"><span class="q-num">Q43</span><span class="diff diff-medium">medium</span><span class="q-type">Identify the Error</span></div>
  <div class="q-body"><p>Before SPT, Keshavarthini checks the anaphylaxis kit (adrenaline 1:1000 in date, O2 cylinder 120 bar, antihistamine in date), obtains written informed consent, notes the patient is on second-generation antihistamine which was stopped 5 days ago, marks allergen sites 1.5 cm apart, and places positive and negative controls at the ends of the forearm.</p><div class="opts"><button class="opt-btn" data-q="q43" data-val="A"><span class="opt-letter">A</span><span class="opt-text">O2 cylinder at 120 bar — minimum required is 150 bar for anaphylaxis kit</span></button><button class="opt-btn" data-q="q43" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Second-generation antihistamine stopped only 5 days ago — it must be withheld for 7 days before SPT</span></button><button class="opt-btn" data-q="q43" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Positive control placed at the end of the forearm — it should be in the centre</span></button><button class="opt-btn" data-q="q43" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Allergen sites 1.5 cm apart — minimum spacing is 3 cm to prevent wheal merging</span></button></div></div>
</div>
<div class="q-card" data-id="q44">
  <div class="q-hdr"><span class="q-num">Q44</span><span class="diff diff-medium">medium</span><span class="q-type">Identify the Error</span></div>
  <div class="q-body"><p>Rajasundar sets up a Level 3 HSAT: connects nasal pressure cannula with airtight connection, fits thoracic effort belt (can slide two fingers under), fits abdominal belt (snug, one finger only), tapes SpO2 probe to index finger, attaches body position sensor to thoracic belt, and teaches the patient to start the device at bedtime.</p><div class="opts"><button class="opt-btn" data-q="q44" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Nasal pressure cannula connection check is not required for Level 3 HSAT</span></button><button class="opt-btn" data-q="q44" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Thoracic effort belt too loose — only one finger should slide under both belts; two fingers indicates the belt is not snug enough to reliably detect effort</span></button><button class="opt-btn" data-q="q44" data-val="C"><span class="opt-letter">C</span><span class="opt-text">SpO2 probe taping is incorrect — the probe should be unsupported and allowed to move freely</span></button><button class="opt-btn" data-q="q44" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Body position sensor clipped to thoracic belt is incorrect — it must be placed on the abdominal belt</span></button></div></div>
</div>
<div class="q-card" data-id="q45">
  <div class="q-hdr"><span class="q-num">Q45</span><span class="diff diff-hard">hard</span><span class="q-type">Identify the Error</span></div>
  <div class="q-body"><p>A patient has combined PFT: Rajasundar performs AOS first (cheeks supported, COV 7% — acceptable), then FeNO (result: 22 ppb), then spirometry (3 good blows, best FVC 3.1L, best FEV1 2.4L — ratio 0.77). He reports the FEV1/FVC from the best values across blows. He concludes: no obstruction, low FeNO — low eosinophilic probability.</p><div class="opts"><button class="opt-btn" data-q="q45" data-val="A"><span class="opt-letter">A</span><span class="opt-text">AOS should always be done after spirometry — not before</span></button><button class="opt-btn" data-q="q45" data-val="B"><span class="opt-letter">B</span><span class="opt-text">FeNO of 22 ppb after AOS is acceptable — AOS does not affect FeNO</span></button><button class="opt-btn" data-q="q45" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Two errors: FeNO done after AOS is acceptable BUT FeNO done after spirometry would be invalid; however the key error here is that FEV1/FVC was calculated across different blows — it must come from the same single manoeuvre</span></button><button class="opt-btn" data-q="q45" data-val="D"><span class="opt-letter">D</span><span class="opt-text">The conclusion is correct — 22 ppb is in the low range and no further action needed</span></button></div></div>
</div>
<div class="sec-hdr">G · Scenario-based judgement</div>
<div class="q-card" data-id="q46">
  <div class="q-hdr"><span class="q-num">Q46</span><span class="diff diff-hard">hard</span><span class="q-type">Scenario</span></div>
  <div class="q-body"><p>A patient&#39;s AOS report shows: R5 7.2 cmH2O/L/s (elevated), R5-R20 4.1 cmH2O/L/s (elevated), X5 -1.8 cmH2O/L/s (negative), Fres 18 Hz (elevated). Spirometry from the same session is completely normal. The referring doctor calls asking you to repeat the AOS — &#39;spirometry is normal so AOS must be wrong.&#39; What do you do?</p><div class="opts"><button class="opt-btn" data-q="q46" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Agree and repeat — the doctor&#39;s clinical judgement takes precedence over RT interpretation</span></button><button class="opt-btn" data-q="q46" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Check if cheeks were confirmed supported and COV was acceptable; if technique was correct, explain that elevated R5-R20 with negative X5 is the definitive small airway disease pattern — AOS detects this years before spirometry changes; the result is clinically valid and should not be dismissed</span></button><button class="opt-btn" data-q="q46" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Repeat only if the patient is willing — AOS is uncomfortable and forcing a repeat is unethical</span></button><button class="opt-btn" data-q="q46" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Agree that spirometry is the gold standard and the AOS must be an artefact</span></button></div></div>
</div>
<div class="q-card" data-id="q47">
  <div class="q-hdr"><span class="q-num">Q47</span><span class="diff diff-easy">easy</span><span class="q-type">Scenario</span></div>
  <div class="q-body"><p>Fifteen minutes after a SPT session, a patient in the waiting area calls the RT over — their forearm is itching intensely and they have hives spreading up to their elbow. The RT notices the patient is breathing comfortably with no stridor. What is the immediate action?</p><div class="opts"><button class="opt-btn" data-q="q47" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Apply topical antihistamine cream to the forearm — local reactions are expected and managed locally</span></button><button class="opt-btn" data-q="q47" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Bring patient back to the procedure room immediately, alert the doctor, assess vitals and airway continuously — systemic reaction post-SPT can evolve rapidly to anaphylaxis; the anaphylaxis kit must be at bedside; the 30-minute observation window exists precisely for this</span></button><button class="opt-btn" data-q="q47" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Give oral antihistamine tablet and observe for another 30 minutes in the waiting area</span></button><button class="opt-btn" data-q="q47" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Reassure the patient — hives at 15 minutes are a late phase reaction and not dangerous</span></button></div></div>
</div>
<div class="q-card" data-id="q48">
  <div class="q-hdr"><span class="q-num">Q48</span><span class="diff diff-medium">medium</span><span class="q-type">Scenario</span></div>
  <div class="q-body"><p>A patient returns for their 4-week CPAP compliance download. The device shows: average use 5.1 hours/night, 74% of nights ≥4 hours, residual AHI 6.8. The patient reports sleeping much better. How do you proceed?</p><div class="opts"><button class="opt-btn" data-q="q48" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Congratulate and discharge — patient is comfortable and adherent</span></button><button class="opt-btn" data-q="q48" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Compliance is adequate (≥4h on ≥70% nights) but residual AHI of 6.8 is above the target of &lt;5 — this requires intervention: pressure adjustment, mask change, or escalation to BiPAP; report to doctor with full data</span></button><button class="opt-btn" data-q="q48" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Schedule a repeat full PSG — residual AHI can only be assessed in the sleep lab</span></button><button class="opt-btn" data-q="q48" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Increase CPAP pressure by 2 cmH2O without consulting the doctor — RT can adjust pressure independently for residual AHI</span></button></div></div>
</div>
<div class="q-card" data-id="q49">
  <div class="q-hdr"><span class="q-num">Q49</span><span class="diff diff-medium">medium</span><span class="q-type">Scenario</span></div>
  <div class="q-body"><p>You are teaching diaphragmatic breathing to a COPD patient. After 5 repetitions seated, the patient&#39;s abdomen moves inward on inhalation and outward on exhalation — the opposite of what is expected. What does this indicate and what do you do?</p><div class="opts"><button class="opt-btn" data-q="q49" data-val="A"><span class="opt-letter">A</span><span class="opt-text">This is normal in COPD — hyperinflated lungs reverse the diaphragmatic motion</span></button><button class="opt-btn" data-q="q49" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Paradoxical breathing pattern — indicates significant diaphragm dysfunction; document in HIS, inform the doctor, and adjust the teaching approach: move to supine first where gravity assists diaphragm movement and visual/tactile feedback is clearer</span></button><button class="opt-btn" data-q="q49" data-val="C"><span class="opt-letter">C</span><span class="opt-text">The patient is doing it correctly — diaphragm contraction pulls the abdomen inward</span></button><button class="opt-btn" data-q="q49" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Stop the session — paradoxical breathing during diaphragmatic training is a contraindication to continuing</span></button></div></div>
</div>
<div class="q-card" data-id="q50">
  <div class="q-hdr"><span class="q-num">Q50</span><span class="diff diff-hard">hard</span><span class="q-type">Scenario</span></div>
  <div class="q-body"><p>A patient is referred for spirometry and CPAP compliance download on the same visit. Rajasundar completes the compliance download first (residual AHI 4.2, good adherence), then performs spirometry. FeNO was ordered but not yet done. Just before FeNO, the patient mentions they had a coffee 45 minutes ago. Which of the following statements is correct?</p><div class="opts"><button class="opt-btn" data-q="q50" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Coffee has no effect on FeNO — only nitrate-containing foods matter</span></button><button class="opt-btn" data-q="q50" data-val="B"><span class="opt-letter">B</span><span class="opt-text">The coffee is a concern only if caffeinated — decaf has no FeNO effect</span></button><button class="opt-btn" data-q="q50" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Caffeine has no proven direct effect on FeNO measurement — however the spirometry was already done before FeNO, which means the FeNO result will be artificially lowered by the forced manoeuvres; this is the more critical protocol violation</span></button><button class="opt-btn" data-q="q50" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Both the coffee and the sequence are fine — spirometry does not affect FeNO if done more than 30 minutes before</span></button></div></div>
</div>`,

  <div class="q-body"><p>PPE doffing sequence (most contaminated last): __________ → goggles → gown → __________. N95 is mandatory for __________ and aerosol-generating procedures.</p><div class="fib-wrap"><input type="text" class="fib-box" data-q="q5" data-bi="0" placeholder="..." autocomplete="off"><input type="text" class="fib-box" data-q="q5" data-bi="1" placeholder="..." autocomplete="off"><input type="text" class="fib-box" data-q="q5" data-bi="2" placeholder="..." autocomplete="off"><input type="text" class="fib-box" data-q="q5" data-bi="3" placeholder="..." autocomplete="off"><input type="text" class="fib-box" data-q="q5" data-bi="4" placeholder="..." autocomplete="off"><input type="text" class="fib-box" data-q="q5" data-bi="5" placeholder="..." autocomplete="off"><input type="text" class="fib-box" data-q="q5" data-bi="6" placeholder="..." autocomplete="off"><input type="text" class="fib-box" data-q="q5" data-bi="7" placeholder="..." autocomplete="off"><input type="text" class="fib-box" data-q="q5" data-bi="8" placeholder="..." autocomplete="off"><input type="text" class="fib-box" data-q="q5" data-bi="9" placeholder="..." autocomplete="off"><input type="text" class="fib-box" data-q="q5" data-bi="10" placeholder="..." autocomplete="off"><input type="text" class="fib-box" data-q="q5" data-bi="11" placeholder="..." autocomplete="off"><input type="text" class="fib-box" data-q="q5" data-bi="12" placeholder="..." autocomplete="off"><input type="text" class="fib-box" data-q="q5" data-bi="13" placeholder="..." autocomplete="off"><input type="text" class="fib-box" data-q="q5" data-bi="14" placeholder="..." autocomplete="off"></div></div>
