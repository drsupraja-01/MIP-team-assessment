  <div class="q-body"><p>A 68-year-old COPD patient (post-exacerbation, referred within 4 weeks) is assessed: 6MWT = 240m with SpO₂ nadir 84%, GAD-7 = 11, PHQ-9 = 8, BMI = 17.2, MUAC low. She refuses hydrotherapy citing fear of cold water and refuses psychology sessions because &#39;I am not mad.&#39; How should the IPR team respond?</p><div class="opts"><button class="opt-btn" data-q="q50" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Respect all refusals — patient autonomy is paramount in rehabilitation</span></button><button class="opt-btn" data-q="q50" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Each refusal requires patient education first: (1) Hydrotherapy — explain warm chest pack and contrast protocol (not cold immersion), offer to start with warm chest pack only; (2) Psychology — reframe as &#39;breathing and coping skills, not mental illness&#39;; GAD-7 11 = moderate anxiety that is directly affecting her exercise tolerance. For nutrition: BMI 17.2 + low MUAC = urgent dietitian input. O2 must be available during sessions given SpO₂ nadir 84%. This is a complex, multidisciplinary patient requiring coordinated care plan.</span></button><button class="opt-btn" data-q="q50" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Discharge — a patient refusing two modalities cannot complete the full programme</span></button><button class="opt-btn" data-q="q50" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Proceed with physiotherapy and Ayurveda only — the patient has agreed to these</span></button></div></div>
</div>`,
  doctor: `<div class="sec-hdr">Pharmacy Oversight (Q1–Q10)</div>
<div class="q-card" data-id="q1">
  <div class="q-hdr"><span class="q-num">Q1</span><span class="diff diff-hard">hard</span><span class="q-type">identify_error</span></div>
  <div class="q-body"><p>A patient on Foradil 12 mcg (formoterol LABA monotherapy) for moderate persistent asthma presents for follow-up. She says her breathlessness has worsened over 3 weeks. She is using Foradil 4–6 times daily as relief. The pharmacist dispensed this without flagging. As the reviewing doctor:</p><div class="opts"><button class="opt-btn" data-q="q1" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Increase Foradil dose — patient is undertreated</span></button><button class="opt-btn" data-q="q1" data-val="B"><span class="opt-letter">B</span><span class="opt-text">LABA monotherapy in asthma is a PATIENT SAFETY VIOLATION — fatal bronchospasm risk. Stop Foradil immediately, start ICS/LABA combination. Report dispensing error. Assess current exacerbation severity.</span></button><button class="opt-btn" data-q="q1" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Add montelukast to the current Foradil — step-up approach</span></button><button class="opt-btn" data-q="q1" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Advise patient to use Foradil less frequently — overuse is the issue</span></button></div></div>
</div>
<div class="q-card" data-id="q2">
  <div class="q-hdr"><span class="q-num">Q2</span><span class="diff diff-hard">hard</span><span class="q-type">identify_error</span></div>
  <div class="q-body"><p>Your COPD patient on triple therapy (Trimbow MDI) returns with severe dry mouth and urinary hesitancy since starting treatment. Pharmacist documented &#39;counselled on technique and timing&#39; but no mention of LAMA side effects in the dispensing record.</p><div class="opts"><button class="opt-btn" data-q="q2" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Stop Trimbow — triple therapy is causing anticholinergic toxicity</span></button><button class="opt-btn" data-q="q2" data-val="B"><span class="opt-letter">B</span><span class="opt-text">These are LAMA anticholinergic side effects (tiotropium component) — expected but manageable. Patient should have been counselled on dry mouth and urinary retention at dispensing. Counsel now; consider dose timing adjustment. Pharmacist counselling documentation was incomplete.</span></button><button class="opt-btn" data-q="q2" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Switch to LABA/ICS without LAMA — remove the anticholinergic component</span></button><button class="opt-btn" data-q="q2" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Prescribe pilocarpine for dry mouth and tamsulosin for urinary hesitancy</span></button></div></div>
</div>
<div class="q-card" data-id="q3">
  <div class="q-hdr"><span class="q-num">Q3</span><span class="diff diff-hard">hard</span><span class="q-type">identify_error</span></div>
  <div class="q-body"><p>An IPF patient on pirfenidone 2403 mg/day develops severe nausea and anorexia at week 3. LFT shows ALT 3× ULN. Pharmacist had dispensed without documenting baseline LFT check or contraception counselling (patient is a 34-year-old woman).</p><div class="opts"><button class="opt-btn" data-q="q3" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Continue pirfenidone — GI side effects are expected and resolve</span></button><button class="opt-btn" data-q="q3" data-val="B"><span class="opt-letter">B</span><span class="opt-text">ALT 3× ULN requires dose reduction or temporary cessation per protocol. Baseline LFT should have been documented before first dispensing. Contraception counselling is mandatory (pirfenidone is teratogenic) and was not given — this must be addressed now. Document as pharmacovigilance event.</span></button><button class="opt-btn" data-q="q3" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Switch to nintedanib — better GI tolerance profile</span></button><button class="opt-btn" data-q="q3" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Stop pirfenidone permanently — hepatotoxicity is a contraindication to rechallenge</span></button></div></div>
</div>
<div class="q-card" data-id="q4">
  <div class="q-hdr"><span class="q-num">Q4</span><span class="diff diff-medium">medium</span><span class="q-type">governance</span></div>
  <div class="q-body"><p>The pharmacy runs out of IV hydrocortisone on a Thursday afternoon. The pharmacist notifies you. As the treating physician, what is your primary governance concern?</p><div class="opts"><button class="opt-btn" data-q="q4" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Prescribe oral prednisolone instead — equivalent efficacy</span></button><button class="opt-btn" data-q="q4" data-val="B"><span class="opt-letter">B</span><span class="opt-text">IV hydrocortisone is a V-A category drug (vital + high value) — it should NEVER be out of stock. The 72-hour emergency stock exists specifically for this scenario. Activate emergency stock immediately, demand root cause analysis from pharmacy lead, document in stockout register. This is a patient safety system failure.</span></button><button class="opt-btn" data-q="q4" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Use dexamethasone IV as alternative — equivalent anti-inflammatory potency</span></button><button class="opt-btn" data-q="q4" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Postpone all patients requiring IV steroids until stock arrives</span></button></div></div>
</div>
<div class="q-card" data-id="q5">
  <div class="q-hdr"><span class="q-num">Q5</span><span class="diff diff-hard">hard</span><span class="q-type">identify_error</span></div>
  <div class="q-body"><p>A patient on warfarin for pulmonary hypertension is prescribed clarithromycin for a chest infection. Two weeks later she presents with haematuria and INR of 5.8. The pharmacist dispensed the clarithromycin without flagging the DDI because &#39;both drugs were from different prescribers.&#39;</p><div class="opts"><button class="opt-btn" data-q="q5" data-val="A"><span class="opt-letter">A</span><span class="opt-text">The cardiologist prescribing warfarin was responsible for the DDI check</span></button><button class="opt-btn" data-q="q5" data-val="B"><span class="opt-letter">B</span><span class="opt-text">The dispensing pharmacist is responsible for DDI screening at EVERY dispensing episode regardless of prescriber. Clarithromycin inhibits CYP3A4 → warfarin metabolism impaired → INR elevation → bleeding. Both prescribers should have been alerted. This is a preventable serious adverse event — file ADR report to PvPI within 15 days.</span></button><button class="opt-btn" data-q="q5" data-val="C"><span class="opt-letter">C</span><span class="opt-text">INR 5.8 is manageable — reverse with Vitamin K and resume warfarin at lower dose</span></button><button class="opt-btn" data-q="q5" data-val="D"><span class="opt-letter">D</span><span class="opt-text">This DDI is not clinically significant enough to flag at dispensing</span></button></div></div>
</div>
<div class="q-card" data-id="q6">
  <div class="q-hdr"><span class="q-num">Q6</span><span class="diff diff-medium">medium</span><span class="q-type">sata</span></div>
  <div class="q-body"><p>Which of the following must trigger a PvPI ADR report from your clinic? (Select ALL that apply — answer is the complete set)</p><div class="opts"><button class="opt-btn" data-q="q6" data-val="A"><span class="opt-letter">A</span><span class="opt-text">A known ICS side effect (oral candidiasis) in a patient on budesonide</span></button><button class="opt-btn" data-q="q6" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Montelukast psychiatric effects (depression) in a child — CDSCO black box warning</span></button><button class="opt-btn" data-q="q6" data-val="C"><span class="opt-letter">C</span><span class="opt-text">An injection site reaction to dupilumab (new biological) — any severity</span></button><button class="opt-btn" data-q="q6" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Ethambutol-induced optic neuritis requiring drug cessation</span></button></div></div>
</div>
<div class="q-card" data-id="q7">
  <div class="q-hdr"><span class="q-num">Q7</span><span class="diff diff-medium">medium</span><span class="q-type">identify_error</span></div>
  <div class="q-body"><p>A TB patient on HRZE comes to you at week 8 saying she feels much better and wants to stop the &#39;expensive tablets.&#39; The pharmacist confirmed medications were dispensed correctly but did not document adherence counselling.</p><div class="opts"><button class="opt-btn" data-q="q7" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Allow the patient to stop — symptom resolution confirms adequate treatment</span></button><button class="opt-btn" data-q="q7" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Anti-TB drugs require minimum 6 months regardless of symptom resolution — stopping early causes drug resistance and MDR-TB. The pharmacist&#39;s undocumented adherence counselling is a compliance failure. Reinforce adherence today; document explicitly. If concerned about adherence, discuss DOTS.</span></button><button class="opt-btn" data-q="q7" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Switch to fewer drugs now that she is in the continuation phase</span></button><button class="opt-btn" data-q="q7" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Reduce to isoniazid only — maintenance monotherapy is standard</span></button></div></div>
</div>
<div class="q-card" data-id="q8">
  <div class="q-hdr"><span class="q-num">Q8</span><span class="diff diff-hard">hard</span><span class="q-type">4p_philosophy</span></div>
  <div class="q-body"><p>A COPD patient is started on triple therapy (ICS/LABA/LAMA) on their first OPD visit without any prior assessment of lifestyle, psychological state, or adherence to simpler therapy. In the context of MIP&#39;s 4P framework, what is the clinical governance concern?</p><div class="opts"><button class="opt-btn" data-q="q8" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Triple therapy is evidence-based first-line for GOLD E — no concern</span></button><button class="opt-btn" data-q="q8" data-val="B"><span class="opt-letter">B</span><span class="opt-text">P4 (Personalised therapy) must be the CULMINATION of the patient journey, not the starting point. Prescribing maximum pharmacological therapy without first completing P1 (preventing recurrence through education), P2 (predicting trajectory through assessment), and P3 (participative care — understanding the patient&#39;s psychology, adherence, and lifestyle) violates the 4P sequence. This patient needed a holistic assessment first.</span></button><button class="opt-btn" data-q="q8" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Triple therapy should be reserved for specialist centres only</span></button><button class="opt-btn" data-q="q8" data-val="D"><span class="opt-letter">D</span><span class="opt-text">The concern is cost — step-up therapy is the economically rational approach</span></button></div></div>
</div>
<div class="q-card" data-id="q9">
  <div class="q-hdr"><span class="q-num">Q9</span><span class="diff diff-medium">medium</span><span class="q-type">identify_error</span></div>
  <div class="q-body"><p>The pharmacy LASA shelf shows: seRETide 250 and seROFLo 250 on adjacent shelves without TALL-MAN lettering. A dispensing error occurs — patient receives Seroflo instead of Seretide for 3 weeks.</p><div class="opts"><button class="opt-btn" data-q="q9" data-val="A"><span class="opt-letter">A</span><span class="opt-text">The error is the pharmacist&#39;s — insufficient attention to drug names</span></button><button class="opt-btn" data-q="q9" data-val="B"><span class="opt-letter">B</span><span class="opt-text">System failure — LASA drugs require TALL-MAN lettering on shelf labels, physical separation where possible, and mandatory double-check at dispensing. The root cause is not individual error but absence of system safeguards. Conduct RCA within 72 hours, implement TALL-MAN labelling immediately, report as medication error.</span></button><button class="opt-btn" data-q="q9" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Seroflo and Seretide contain the same molecules — clinical impact is negligible</span></button><button class="opt-btn" data-q="q9" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Implement a verbal double-check policy — pharmacists must read drug names aloud before dispensing</span></button></div></div>
</div>
<div class="q-card" data-id="q10">
  <div class="q-hdr"><span class="q-num">Q10</span><span class="diff diff-hard">hard</span><span class="q-type">identify_error</span></div>
  <div class="q-body"><p>BOUNCER — A patient on theophylline SR 400 mg BD is started on ciprofloxacin 500 mg BD by you for a chest infection. Three days later she presents with palpitations, tremors, and nausea. The pharmacist dispensed the ciprofloxacin without flagging. Theophylline level is 24 mcg/mL (toxic range).</p><div class="opts"><button class="opt-btn" data-q="q10" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Stop ciprofloxacin — the antibiotic caused a hypersensitivity reaction</span></button><button class="opt-btn" data-q="q10" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Cipro inhibits CYP1A2 → theophylline clearance reduced → toxicity. As prescriber, YOU should also have recognised this DDI and either avoided ciprofloxacin or reduced theophylline dose. Pharmacist also failed to flag. Shared prescriber-pharmacist failure. Stop ciprofloxacin, hold theophylline, supportive care, recheck level at 24 hours, use alternative antibiotic (avoid fluoroquinolones).</span></button><button class="opt-btn" data-q="q10" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Reduce theophylline to 200 mg BD and continue ciprofloxacin</span></button><button class="opt-btn" data-q="q10" data-val="D"><span class="opt-letter">D</span><span class="opt-text">The level of 24 is borderline — monitor and reassess tomorrow</span></button></div></div>
</div>
<div class="sec-hdr">RT Oversight (Q11–Q20)</div>
<div class="q-card" data-id="q11">
  <div class="q-hdr"><span class="q-num">Q11</span><span class="diff diff-hard">hard</span><span class="q-type">identify_error</span></div>
  <div class="q-body"><p>RT report: FeNO 18 ppb, spirometry normal. RT concludes &#39;low eosinophilic probability — not type 2 asthma.&#39; You review and note the session sequence was: spirometry first, then FeNO.</p><div class="opts"><button class="opt-btn" data-q="q11" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Accept the report — 18 ppb is in the low range regardless of sequence</span></button><button class="opt-btn" data-q="q11" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Spirometry before FeNO reduces FeNO by 10–20% through bronchial washout. 18 ppb may be artificially low. Repeat FeNO on a separate day with correct sequence (FeNO always first). Do not base treatment decisions on this result.</span></button><button class="opt-btn" data-q="q11" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Order serum IgE instead — FeNO is an unreliable marker</span></button><button class="opt-btn" data-q="q11" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Accept the result — the low value confirms non-eosinophilic pattern regardless of sequence</span></button></div></div>
</div>
<div class="q-card" data-id="q12">
  <div class="q-hdr"><span class="q-num">Q12</span><span class="diff diff-hard">hard</span><span class="q-type">identify_error</span></div>
  <div class="q-body"><p>RT reports: DLCO 62% predicted, KCO normal, spirometry shows mild restriction. RT interpretation: &#39;ILD — recommend HRCT chest.&#39; You review the report.</p><div class="opts"><button class="opt-btn" data-q="q12" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Agree — DLCO below 70% with restriction indicates ILD</span></button><button class="opt-btn" data-q="q12" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Low DLCO + NORMAL KCO = reduced lung volume (restriction), NOT intrinsic alveolar transfer defect. KCO corrects for lung volume — if KCO is normal, the alveoli are functioning per unit volume. ILD typically shows low DLCO AND low KCO. RT interpretation is wrong. Correct the report and reconsider diagnosis.</span></button><button class="opt-btn" data-q="q12" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Order PET scan — DLCO alone cannot differentiate ILD from restriction</span></button><button class="opt-btn" data-q="q12" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Accept the interpretation — clinical suspicion of ILD warrants HRCT regardless</span></button></div></div>
</div>
<div class="q-card" data-id="q13">
  <div class="q-hdr"><span class="q-num">Q13</span><span class="diff diff-medium">medium</span><span class="q-type">identify_error</span></div>
  <div class="q-body"><p>AOS report: R5 elevated, R5–R20 elevated, X5 negative, Fres elevated. Spirometry on the same day: FEV1/FVC 0.76 (normal), FVC normal. RT flags: &#39;AOS abnormal — possible equipment artefact as spirometry is normal.&#39;</p><div class="opts"><button class="opt-btn" data-q="q13" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Agree with RT — normal spirometry makes AOS abnormality clinically irrelevant</span></button><button class="opt-btn" data-q="q13" data-val="B"><span class="opt-letter">B</span><span class="opt-text">AOS detects small airway disease years before spirometry deteriorates. Elevated R5-R20 with negative X5 is the classic peripheral (small) airway disease pattern. This is NOT artefact — it is a clinically meaningful early finding. Do not dismiss. This is exactly the value of AOS at MIP.</span></button><button class="opt-btn" data-q="q13" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Repeat both tests on a separate day to confirm</span></button><button class="opt-btn" data-q="q13" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Elevated R5-R20 with normal spirometry = upper airway obstruction — refer for ENT evaluation</span></button></div></div>
</div>
<div class="q-card" data-id="q14">
  <div class="q-hdr"><span class="q-num">Q14</span><span class="diff diff-hard">hard</span><span class="q-type">identify_error</span></div>
  <div class="q-body"><p>SPT session: RT Rajasundar has completed allergen skin prick test on 8 patients today. He is about to start the 9th patient when he notices the anaphylaxis kit adrenaline expired yesterday. He replaces it with a new vial from the medication room and continues.</p><div class="opts"><button class="opt-btn" data-q="q14" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Replacing with a new vial is the correct action — session can continue</span></button><button class="opt-btn" data-q="q14" data-val="B"><span class="opt-letter">B</span><span class="opt-text">The anaphylaxis kit must be checked and signed off BEFORE the first patient of every SPT session — not discovered mid-session. The kit check is a pre-session mandatory step. The fact that 8 patients were tested without a valid adrenaline in the kit is a serious safety failure that must be reported and investigated. Document as near-miss incident.</span></button><button class="opt-btn" data-q="q14" data-val="C"><span class="opt-letter">C</span><span class="opt-text">The session should have been stopped at the point of discovery</span></button><button class="opt-btn" data-q="q14" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Testing was safe — anaphylaxis risk is very low with standard allergen concentrations</span></button></div></div>
</div>
<div class="q-card" data-id="q15">
  <div class="q-hdr"><span class="q-num">Q15</span><span class="diff diff-medium">medium</span><span class="q-type">identify_error</span></div>
  <div class="q-body"><p>CPAP compliance download at 4 weeks: AHI on device 3.2 (excellent), usage 5.8 hours/night, 82% of nights ≥4 hours. Patient reports sleeping much better. RT marks: &#39;CPAP therapy successful — discharge from follow-up.&#39;</p><div class="opts"><button class="opt-btn" data-q="q15" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Agree — AHI &lt;5 and good compliance = treatment success</span></button><button class="opt-btn" data-q="q15" data-val="B"><span class="opt-letter">B</span><span class="opt-text">CPAP therapy is a long-term commitment — &#39;discharge from follow-up&#39; at 4 weeks is premature. Schedule 3-monthly compliance reviews, annual reassessment, and patient education on mask hygiene and device maintenance. Good 4-week data is a milestone, not a discharge criterion.</span></button><button class="opt-btn" data-q="q15" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Switch to auto-CPAP — fixed pressure devices need reassessment at 4 weeks</span></button><button class="opt-btn" data-q="q15" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Extend CPAP use to daytime naps — excellent compliance indicates good tolerance</span></button></div></div>
</div>
<div class="q-card" data-id="q16">
  <div class="q-hdr"><span class="q-num">Q16</span><span class="diff diff-medium">medium</span><span class="q-type">governance</span></div>
  <div class="q-body"><p>The PFT lab calibration log shows two consecutive days of borderline Schiller spirometry calibration (2.89L — just below the 2.895L lower limit). RT has been accepting results with a note &#39;borderline calibration.&#39; How do you respond?</p><div class="opts"><button class="opt-btn" data-q="q16" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Accept — borderline calibration is within clinical tolerance if results are consistent</span></button><button class="opt-btn" data-q="q16" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Suspend all spirometry testing immediately. Failed or borderline calibration = no patient testing. All reports from the past two days must be flagged as potentially unreliable. The flow sensor must be cleaned and recalibrated. If calibration still fails, refer for equipment service. Calibration cannot be a judgment call — it is binary: pass or suspend.</span></button><button class="opt-btn" data-q="q16" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Ask RT to add a disclaimer to reports from those days</span></button><button class="opt-btn" data-q="q16" data-val="D"><span class="opt-letter">D</span><span class="opt-text">The 2.89L value is close enough — ±0.005L is within rounding error</span></button></div></div>
</div>
<div class="q-card" data-id="q17">
  <div class="q-hdr"><span class="q-num">Q17</span><span class="diff diff-hard">hard</span><span class="q-type">identify_error</span></div>
  <div class="q-body"><p>During bronchoscopy of a TB-suspect, cumulative lignocaine is at 5.5 mg/kg. The patient begins to complain of palpitations. The RT documents: &#39;Patient anxious — reassured and continued.&#39;</p><div class="opts"><button class="opt-btn" data-q="q17" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Anxiety during bronchoscopy is common — RT managed appropriately</span></button><button class="opt-btn" data-q="q17" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Palpitations at 5.5 mg/kg lignocaine are a toxicity warning sign — not anxiety. STOP topical lignocaine immediately. Alert the bronchoscopist. Monitor ECG and SpO₂. At 6 mg/kg, you should alert; at 8 mg/kg, stop. RT failed to recognise toxicity signs and must track cumulative dose in real time. This is why RT has dedicated lignocaine tracking responsibility.</span></button><button class="opt-btn" data-q="q17" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Palpitations indicate the scope has reached the carina — a known vagal response</span></button><button class="opt-btn" data-q="q17" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Continue — 5.5 mg/kg is well below the 8 mg/kg maximum</span></button></div></div>
</div>
<div class="q-card" data-id="q18">
  <div class="q-hdr"><span class="q-num">Q18</span><span class="diff diff-hard">hard</span><span class="q-type">4p_philosophy</span></div>
  <div class="q-body"><p>A patient with high FeNO (62 ppb on no ICS) is started directly on high-dose ICS/LABA without spirometry, without AOS, without allergen panel (SPT). In the 4P framework, what is missing?</p><div class="opts"><button class="opt-btn" data-q="q18" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Nothing — FeNO 62 ppb establishes type 2 inflammation and drives treatment</span></button><button class="opt-btn" data-q="q18" data-val="B"><span class="opt-letter">B</span><span class="opt-text">P2 (Predictive) is incomplete — the full investigative profile (spirometry to quantify obstruction, AOS to detect early small airway disease, SPT to identify specific allergen triggers) shapes the trajectory prediction and personalised management. Starting therapy without this is P4 (Personalised) without P2, violating the 4P sequence. The patient may have a specific allergen trigger that changes management entirely.</span></button><button class="opt-btn" data-q="q18" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Only SPT is missing — spirometry and AOS are optional in high FeNO cases</span></button><button class="opt-btn" data-q="q18" data-val="D"><span class="opt-letter">D</span><span class="opt-text">The concern is cost — not every patient needs the full investigation battery</span></button></div></div>
</div>
<div class="q-card" data-id="q19">
  <div class="q-hdr"><span class="q-num">Q19</span><span class="diff diff-medium">medium</span><span class="q-type">identify_error</span></div>
  <div class="q-body"><p>Post-BAL bronchoscopy, RT reports total BAL return was 22% of instilled volume. The report is sent for cytology, culture, and CBNAAT.</p><div class="opts"><button class="opt-btn" data-q="q19" data-val="A"><span class="opt-letter">A</span><span class="opt-text">22% return is acceptable for bronchoscopy — yield varies by technique</span></button><button class="opt-btn" data-q="q19" data-val="B"><span class="opt-letter">B</span><span class="opt-text">BAL total return &lt;30% is inadequate — the specimen may not be representative of the target lobe. The inadequate return should have been flagged at the time of procedure. Cytology and culture results from &lt;30% return BAL must be interpreted with caution; clinical correlation is essential. Document inadequate return in the procedure note.</span></button><button class="opt-btn" data-q="q19" data-val="C"><span class="opt-letter">C</span><span class="opt-text">The return percentage does not affect diagnostic yield for CBNAAT</span></button><button class="opt-btn" data-q="q19" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Repeat bronchoscopy immediately — inadequate BAL always requires repeat procedure</span></button></div></div>
</div>
<div class="q-card" data-id="q20">
  <div class="q-hdr"><span class="q-num">Q20</span><span class="diff diff-hard">hard</span><span class="q-type">identify_error</span></div>
  <div class="q-body"><p>BOUNCER — RT Nandakumar performs a combined PFT: AOS (R5 elevated, R5–R20 elevated, X5 negative), then FeNO 31 ppb, then spirometry (FEV1/FVC 0.79, normal). You receive all three reports together. The patient is a 45-year-old non-smoker with chronic cough. What is your integrated clinical interpretation?</p><div class="opts"><button class="opt-btn" data-q="q20" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Normal spirometry excludes significant disease — discharge with reassurance</span></button><button class="opt-btn" data-q="q20" data-val="B"><span class="opt-letter">B</span><span class="opt-text">AOS showing R5–R20 elevation + negative X5 = early small airway disease. FeNO 31 ppb (intermediate — 25–50 ppb) indicates possible eosinophilic airway inflammation but FeNO was done AFTER AOS (acceptable) AND after spirometry — spirometry may have reduced FeNO by 10–20%. True FeNO may be higher (possibly &gt;50 ppb = high). Pattern suggests early type 2 small airway inflammation before spirometric obstruction — the exact scenario MIP&#39;s investigative model is designed to detect early. Review FeNO sequence; consider repeat FeNO first on a separate visit; assess for asthma or allergic bronchitis.</span></button><button class="opt-btn" data-q="q20" data-val="C"><span class="opt-letter">C</span><span class="opt-text">FeNO 31 is intermediate — start empirical ICS trial and reassess in 8 weeks</span></button><button class="opt-btn" data-q="q20" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Refer for HRCT — normal spirometry with AOS abnormality suggests fixed structural disease</span></button></div></div>
</div>
<div class="sec-hdr">Physio/IPR Oversight (Q21–Q30)</div>
<div class="q-card" data-id="q21">
  <div class="q-hdr"><span class="q-num">Q21</span><span class="diff diff-medium">medium</span><span class="q-type">identify_error</span></div>
  <div class="q-body"><p>A COPD patient in session 3 of IPR calls you concerned: after yesterday&#39;s physiotherapy (60 min aerobic) and naturopathy (contrast hydrotherapy + steam) on the same day, she had severe breathlessness that evening and didn&#39;t sleep. No coordination note in HIS from either team.</p><div class="opts"><button class="opt-btn" data-q="q21" data-val="A"><span class="opt-letter">A</span><span class="opt-text">This is expected exertion — COPD patients have variable next-day response</span></button><button class="opt-btn" data-q="q21" data-val="B"><span class="opt-letter">B</span><span class="opt-text">System failure — physiotherapy and naturopathy on the same day without load coordination caused cumulative over-exertion. Both teams must share a HIS care plan. Review current exercise prescription; reduce to one modality per session day for this patient initially. Mandate MDT coordination note for every patient in IPR.</span></button><button class="opt-btn" data-q="q21" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Stop naturopathy — contrast hydrotherapy is too aggressive for COPD</span></button><button class="opt-btn" data-q="q21" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Reduce aerobic session duration to 20 minutes going forward</span></button></div></div>
</div>
<div class="q-card" data-id="q22">
  <div class="q-hdr"><span class="q-num">Q22</span><span class="diff diff-hard">hard</span><span class="q-type">identify_error</span></div>
  <div class="q-body"><p>A physiotherapy note at session 16 reads: &#39;6MWT completed — 35 m improvement from baseline. Patient feels well.&#39; No SpO₂ monitoring documented during the 6MWT.</p><div class="opts"><button class="opt-btn" data-q="q22" data-val="A"><span class="opt-letter">A</span><span class="opt-text">6MWT improvement of 35 m exceeds MCID — this is a good result</span></button><button class="opt-btn" data-q="q22" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Continuous SpO₂ monitoring during 6MWT is mandatory — it is both a safety measure (desaturation detection) and an outcome measure (exercise SpO₂ nadir is part of exercise prescription for supplemental O2 titration). The 35 m improvement is meaningful but the test result is incomplete. SpO₂ data must be available before exercise prescription can be confirmed for the next phase.</span></button><button class="opt-btn" data-q="q22" data-val="C"><span class="opt-letter">C</span><span class="opt-text">SpO₂ is only required during 6MWT for ILD patients</span></button><button class="opt-btn" data-q="q22" data-val="D"><span class="opt-letter">D</span><span class="opt-text">35 m improvement is excellent — the test can be accepted as complete</span></button></div></div>
</div>
<div class="q-card" data-id="q23">
  <div class="q-hdr"><span class="q-num">Q23</span><span class="diff diff-hard">hard</span><span class="q-type">identify_error</span></div>
  <div class="q-body"><p>Psychology session report for week 6: &#39;Patient reports significant improvement in breathlessness perception. Sessions changed to supportive counselling — structured CBT deferred as patient is coping well.&#39; PHQ-9 at week 4 was 14. No DCS or IPQ-R documented.</p><div class="opts"><button class="opt-btn" data-q="q23" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Appropriate adaptation — psychological support should be flexible</span></button><button class="opt-btn" data-q="q23" data-val="B"><span class="opt-letter">B</span><span class="opt-text">PHQ-9 14 at week 4 is borderline (approaching the ≥15 psychiatric referral threshold) and requires structured tracking — not deferral of CBT. DCS and IPQ-R are the primary outcome tools in IPR psychology — their absence means psychological progress cannot be demonstrated. &#39;Supportive counselling&#39; without structure is not evidence-based IPR psychology. Reinstate structured sessions.</span></button><button class="opt-btn" data-q="q23" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Patient is clearly improving — psychological support is no longer needed</span></button><button class="opt-btn" data-q="q23" data-val="D"><span class="opt-letter">D</span><span class="opt-text">PHQ-9 should be repeated before modifying the psychological intervention</span></button></div></div>
</div>
<div class="q-card" data-id="q24">
  <div class="q-hdr"><span class="q-num">Q24</span><span class="diff diff-medium">medium</span><span class="q-type">governance</span></div>
  <div class="q-body"><p>A post-exacerbation COPD patient is referred to IPR 6 weeks after discharge. The physiotherapy team accepts the referral and starts programme. Is this correct?</p><div class="opts"><button class="opt-btn" data-q="q24" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Yes — post-exacerbation referral at any point is beneficial</span></button><button class="opt-btn" data-q="q24" data-val="B"><span class="opt-letter">B</span><span class="opt-text">The optimal post-exacerbation IPR window is WITHIN 4 WEEKS of discharge — this is when PR provides the greatest mortality benefit. At 6 weeks, the window is missed. The referral should have been made at discharge. As the treating physician, this is a missed clinical opportunity — document, educate team on referral timing, and still enrol as late PR is better than no PR.</span></button><button class="opt-btn" data-q="q24" data-val="C"><span class="opt-letter">C</span><span class="opt-text">6 weeks is within the acceptable window — guidelines allow up to 8 weeks</span></button><button class="opt-btn" data-q="q24" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Post-exacerbation IPR should start only after 3 months of stability</span></button></div></div>
</div>
<div class="q-card" data-id="q25">
  <div class="q-hdr"><span class="q-num">Q25</span><span class="diff diff-hard">hard</span><span class="q-type">identify_error</span></div>
  <div class="q-body"><p>During Abhyangam, the Ayurveda therapist reports the patient said &#39;my right calf has been tight and swollen since last week.&#39; The therapist completed the session including lower limb massage and documented &#39;no DVT concerns&#39; in the note.</p><div class="opts"><button class="opt-btn" data-q="q25" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Calf tightness is common in deconditioned COPD patients — Abhyangam helps</span></button><button class="opt-btn" data-q="q25" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Calf swelling + tightness = DVT until proven otherwise. Deep massage over a DVT can cause pulmonary embolism. Session should have been STOPPED immediately at that disclosure. The therapist&#39;s documentation &#39;no DVT concerns&#39; based on patient verbal report alone is clinically negligent. Refer for Doppler ultrasound immediately. This was a serious safety failure.</span></button><button class="opt-btn" data-q="q25" data-val="C"><span class="opt-letter">C</span><span class="opt-text">The patient should have disclosed this before the session — the therapist is not at fault</span></button><button class="opt-btn" data-q="q25" data-val="D"><span class="opt-letter">D</span><span class="opt-text">DVT in COPD is uncommon — the symptom is more likely musculoskeletal</span></button></div></div>
</div>
<div class="q-card" data-id="q26">
  <div class="q-hdr"><span class="q-num">Q26</span><span class="diff diff-hard">hard</span><span class="q-type">4p_philosophy</span></div>
  <div class="q-body"><p>A newly diagnosed moderate COPD patient (post-exacerbation, mMRC 2, CAT 18) is started on triple inhaler therapy and discharged without referral to IPR, psychology, or dietary counselling. In the 4P framework, which P was skipped?</p><div class="opts"><button class="opt-btn" data-q="q26" data-val="A"><span class="opt-letter">A</span><span class="opt-text">P1 — preventive care was not addressed</span></button><button class="opt-btn" data-q="q26" data-val="B"><span class="opt-letter">B</span><span class="opt-text">P3 — Participative care was entirely skipped. IPR, psychology, diet, and breathing exercises represent the participative dimension — integrated care that helps the patient reclaim health through active participation, not just passive pharmacological therapy. P4 (personalised medication) was addressed, but P3 was not. This inverts the 4P sequence.</span></button><button class="opt-btn" data-q="q26" data-val="C"><span class="opt-letter">C</span><span class="opt-text">P2 — predictive profiling was not completed</span></button><button class="opt-btn" data-q="q26" data-val="D"><span class="opt-letter">D</span><span class="opt-text">P4 — personalised therapy must come before participation</span></button></div></div>
</div>
<div class="q-card" data-id="q27">
  <div class="q-hdr"><span class="q-num">Q27</span><span class="diff diff-medium">medium</span><span class="q-type">identify_error</span></div>
  <div class="q-body"><p>A patient with severe COPD and PHQ-9 = 18 (severe depression) at baseline is enrolled in IPR. Psychology session notes at week 2: &#39;Patient expressed hopelessness. Continued supportive listening. No referral made as patient refused to see a psychiatrist.&#39;</p><div class="opts"><button class="opt-btn" data-q="q27" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Patient autonomy must be respected — if she refuses psychiatry, do not refer</span></button><button class="opt-btn" data-q="q27" data-val="B"><span class="opt-letter">B</span><span class="opt-text">PHQ-9 ≥15 = documented psychiatrist referral is a DUTY OF CARE OBLIGATION — not optional. The patient&#39;s refusal must be documented but the referral must still be made and the patient must understand the clinical reason. &#39;Hopelessness&#39; in context of PHQ-9 18 is a red flag for suicidality risk. This cannot be managed by supportive listening alone. Escalate to physician immediately.</span></button><button class="opt-btn" data-q="q27" data-val="C"><span class="opt-letter">C</span><span class="opt-text">IPR psychology can manage severe depression — psychiatric referral is a last resort</span></button><button class="opt-btn" data-q="q27" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Week 2 is too early to refer — give the programme time to work</span></button></div></div>
</div>
<div class="q-card" data-id="q28">
  <div class="q-hdr"><span class="q-num">Q28</span><span class="diff diff-medium">medium</span><span class="q-type">identify_error</span></div>
  <div class="q-body"><p>Podi Kizhi note: &#39;Bolus temperature checked on therapist&#39;s forearm before session start. Same boluses from yesterday&#39;s session used — patient preferred the same herbs.&#39; Both errors are present. Which is the more clinically significant?</p><div class="opts"><button class="opt-btn" data-q="q28" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Temperature check error — bolus temperature drops between applications and must be checked before every contact</span></button><button class="opt-btn" data-q="q28" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Reusing boluses is the more clinically significant error — herbal boluses are biological materials that become contaminated with skin bacteria and sweat when stored; reuse between patients and between days creates infection risk and cannot be corrected by temperature checking. Fresh boluses for every session is non-negotiable. Both errors require correction, but bolus reuse is the safety risk.</span></button><button class="opt-btn" data-q="q28" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Neither is clinically significant — Podi Kizhi is a low-risk therapy</span></button><button class="opt-btn" data-q="q28" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Both errors are equally significant — choose answer C</span></button></div></div>
</div>
<div class="q-card" data-id="q29">
  <div class="q-hdr"><span class="q-num">Q29</span><span class="diff diff-hard">hard</span><span class="q-type">governance</span></div>
  <div class="q-body"><p>IPR reassessment at session 24: 6MWT improves 22 m (below MCID of 30 m). CAT improves 1 point (below MCID of 2). Patient has been engaged and attended all sessions. What is the clinical and governance response?</p><div class="opts"><button class="opt-btn" data-q="q29" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Discharge — the patient has completed 24 sessions as planned</span></button><button class="opt-btn" data-q="q29" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Below MCID on both measures requires clinical review: reassess prescription adequacy (intensity, modalities), check for comorbid barriers (uncontrolled anxiety, nutritional deficit, exercise desaturation), consider CPET referral if not already done for accurate exercise prescription. Do not discharge based on session count alone — PR outcomes, not session completion, determine discharge. Discuss with patient and MDT.</span></button><button class="opt-btn" data-q="q29" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Extend the programme by 12 additional sessions automatically</span></button><button class="opt-btn" data-q="q29" data-val="D"><span class="opt-letter">D</span><span class="opt-text">The 6MWT is not a sensitive enough tool — use SGRQ instead</span></button></div></div>
</div>
<div class="q-card" data-id="q30">
  <div class="q-hdr"><span class="q-num">Q30</span><span class="diff diff-hard">hard</span><span class="q-type">identify_error</span></div>
  <div class="q-body"><p>BOUNCER — A post-COVID patient with persistent breathlessness (3 months), normal spirometry, normal DLCO, normal chest CT, normal echo, and normal 6MWT is referred to IPR by you. The physiotherapist declines the referral: &#39;Normal investigations — IPR is only for COPD and ILD.&#39;</p><div class="opts"><button class="opt-btn" data-q="q30" data-val="A"><span class="opt-letter">A</span><span class="opt-text">The physiotherapist is correct — IPR requires objective functional impairment</span></button><button class="opt-btn" data-q="q30" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Post-COVID respiratory impairment is an explicit IPR referral criterion. Normal structural investigations do not exclude functional deconditioning and dyspnoea from post-COVID — AOS, FeNO, and CPET (especially V&#39;E/VCO₂ slope and PETCO₂ pattern) may reveal abnormalities missed by spirometry alone. IPR addresses P3 participative recovery. The physiotherapist&#39;s narrow eligibility view is incorrect and must be corrected.</span></button><button class="opt-btn" data-q="q30" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Agree with physiotherapist — investigate further with cardiac MRI first</span></button><button class="opt-btn" data-q="q30" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Refer to psychiatry — post-COVID breathlessness with normal tests is functional</span></button></div></div>
</div>
<div class="sec-hdr">Nursing Oversight (Q31–Q40)</div>
<div class="q-card" data-id="q31">
  <div class="q-hdr"><span class="q-num">Q31</span><span class="diff diff-hard">hard</span><span class="q-type">identify_error</span></div>
  <div class="q-body"><p>A bronchoscopy biopsy specimen is sent to histopathology. The container label reads &#39;BAL — Right&#39; with no other information. The pathology report comes back &#39;specimen inadequate — unable to identify.&#39;</p><div class="opts"><button class="opt-btn" data-q="q31" data-val="A"><span class="opt-letter">A</span><span class="opt-text">The pathology lab should have requested more information before processing</span></button><button class="opt-btn" data-q="q31" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Every bronchoscopy specimen container must be labelled AT TIME OF COLLECTION with: patient name, MRN, date, lobe/segment (e.g., RLL posterior basal), specimen type (biopsy vs BAL vs brush), and RT initials. &#39;BAL — Right&#39; is inadequate for histopathology (which was sent biopsy, not BAL — a labelling type error also occurred). This is a specimen chain-of-custody failure with clinical consequences.</span></button><button class="opt-btn" data-q="q31" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Repeat bronchoscopy — inadequate specimen always requires repeat</span></button><button class="opt-btn" data-q="q31" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Request the pathologist to process what is available with a caveat on the report</span></button></div></div>
</div>
<div class="q-card" data-id="q32">
  <div class="q-hdr"><span class="q-num">Q32</span><span class="diff diff-hard">hard</span><span class="q-type">identify_error</span></div>
  <div class="q-body"><p>Post-bronchoscopy patient at 2.5 hours: Aldrete Score 9, gag reflex present, SpO₂ 96% room air. Nurse gives the patient water because &#39;the 2-hour NPO has passed and all signs are normal.&#39; Patient aspirates silently and develops aspiration pneumonia.</p><div class="opts"><button class="opt-btn" data-q="q32" data-val="A"><span class="opt-letter">A</span><span class="opt-text">2 hours NPO + good Aldrete score should have been sufficient</span></button><button class="opt-btn" data-q="q32" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Gag reflex test is mandatory before ANY oral intake — Aldrete score and NPO time are necessary but not sufficient alone. The gag reflex must be TESTED (touch posterior pharynx with swab and confirm response) before offering water. &#39;Gag reflex present&#39; must be an active finding, not an assumption. Silent aspiration after bronchoscopy is a documented risk.</span></button><button class="opt-btn" data-q="q32" data-val="C"><span class="opt-letter">C</span><span class="opt-text">The aspiration was unpredictable — no error occurred</span></button><button class="opt-btn" data-q="q32" data-val="D"><span class="opt-letter">D</span><span class="opt-text">The nurse should have asked the doctor before giving water</span></button></div></div>
</div>
<div class="q-card" data-id="q33">
  <div class="q-hdr"><span class="q-num">Q33</span><span class="diff diff-medium">medium</span><span class="q-type">identify_error</span></div>
  <div class="q-body"><p>An ICD patient is ambulant and accompanied to radiology by a porter. On return you see the ICD drain bottle on the patient&#39;s lap in the wheelchair. The nurse&#39;s note says &#39;patient mobilised to radiology — ICD intact.&#39;</p><div class="opts"><button class="opt-btn" data-q="q33" data-val="A"><span class="opt-letter">A</span><span class="opt-text">ICD mobilisation documentation is adequate</span></button><button class="opt-btn" data-q="q33" data-val="B"><span class="opt-letter">B</span><span class="opt-text">ICD drain bottle must ALWAYS be below the chest wall — placing on the patient&#39;s lap during wheelchair transport allows gravitational siphoning of pleural fluid back into the chest. This is a basic ICD management principle. The nursing note should document bottle position throughout transfer. Immediately check tube position and assess for complications.</span></button><button class="opt-btn" data-q="q33" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Brief elevation during transfer is clinically acceptable</span></button><button class="opt-btn" data-q="q33" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Clamp the ICD during transport to prevent backflow</span></button></div></div>
</div>
<div class="q-card" data-id="q34">
  <div class="q-hdr"><span class="q-num">Q34</span><span class="diff diff-medium">medium</span><span class="q-type">governance</span></div>
  <div class="q-body"><p>The nursing team consistently uses surgical masks during bronchoscopy of TB-suspect patients because &#39;the room is ventilated.&#39; As HOD, how do you respond?</p><div class="opts"><button class="opt-btn" data-q="q34" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Accept if ventilation is adequate — room ventilation reduces transmission risk</span></button><button class="opt-btn" data-q="q34" data-val="B"><span class="opt-letter">B</span><span class="opt-text">ALL staff present during bronchoscopy of a TB-suspect patient must wear N95 — not surgical masks. This is a non-negotiable RNTCP/NTEP and NABH requirement. Bronchoscopy is an aerosol-generating procedure with the highest TB transmission risk. Room ventilation is a supplement, not a replacement, for personal respiratory protection. Issue immediate instruction and document as a quality improvement action.</span></button><button class="opt-btn" data-q="q34" data-val="C"><span class="opt-letter">C</span><span class="opt-text">N95 is only required for confirmed TB — suspects can use surgical masks</span></button><button class="opt-btn" data-q="q34" data-val="D"><span class="opt-letter">D</span><span class="opt-text">N95 is required only for the bronchoscopist — other staff can use surgical masks</span></button></div></div>
</div>
<div class="q-card" data-id="q35">
  <div class="q-hdr"><span class="q-num">Q35</span><span class="diff diff-hard">hard</span><span class="q-type">identify_error</span></div>
  <div class="q-body"><p>Post-thoracocentesis (1200 mL drained), the nurse does not arrange an erect CXR because &#39;the procedure went smoothly with no complications.&#39; Patient develops increasing breathlessness 1 hour later.</p><div class="opts"><button class="opt-btn" data-q="q35" data-val="A"><span class="opt-letter">A</span><span class="opt-text">CXR is only needed if symptoms develop — the nurse was following clinical signs</span></button><button class="opt-btn" data-q="q35" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Post-thoracocentesis erect CXR is MANDATORY regardless of how the procedure went — pneumothorax can develop silently. &#39;Smooth procedure&#39; does not eliminate the risk of iatrogenic pneumothorax. The CXR should have been ordered immediately post-procedure. The subsequent breathlessness may represent pneumothorax — order emergency CXR now.</span></button><button class="opt-btn" data-q="q35" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Bilateral breath sounds post-procedure confirms no pneumothorax — CXR is optional</span></button><button class="opt-btn" data-q="q35" data-val="D"><span class="opt-letter">D</span><span class="opt-text">CXR within 4 hours is adequate — immediate post-procedure imaging is not required</span></button></div></div>
</div>
<div class="q-card" data-id="q36">
  <div class="q-hdr"><span class="q-num">Q36</span><span class="diff diff-medium">medium</span><span class="q-type">identify_error</span></div>
  <div class="q-body"><p>Nursing note: &#39;Patient allergy: NKDA.&#39; You ask the nurse how this was confirmed. She says: &#39;The allergy field was blank from last visit so I wrote NKDA — saves time for the next team.&#39;</p><div class="opts"><button class="opt-btn" data-q="q36" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Reasonable assumption — blank field in an existing patient likely means no allergies</span></button><button class="opt-btn" data-q="q36" data-val="B"><span class="opt-letter">B</span><span class="opt-text">NKDA must ONLY be documented when the patient explicitly confirms &#39;no known drug allergies&#39; in direct questioning. Blank field ≠ NKDA. The nurse created a false safety record — if this patient has an unrecorded allergy, the NKDA entry will actively suppress appropriate precautions. Correct immediately; reconfirm allergy status directly with patient.</span></button><button class="opt-btn" data-q="q36" data-val="C"><span class="opt-letter">C</span><span class="opt-text">The blank field is the error — the nurse was trying to improve safety</span></button><button class="opt-btn" data-q="q36" data-val="D"><span class="opt-letter">D</span><span class="opt-text">NKDA is a safe assumption for patients who have received multiple drugs without reactions</span></button></div></div>
</div>
<div class="q-card" data-id="q37">
  <div class="q-hdr"><span class="q-num">Q37</span><span class="diff diff-hard">hard</span><span class="q-type">identify_error</span></div>
  <div class="q-body"><p>Scope reprocessing log shows: pre-clean ✓, transport ✓, manual clean ✓, HLD (glutaraldehyde) 18 minutes ✓, dry with alcohol flush ✓, stored hanging. Concentration test strip not documented.</p><div class="opts"><button class="opt-btn" data-q="q37" data-val="A"><span class="opt-letter">A</span><span class="opt-text">18 minutes in glutaraldehyde is below the required 20 minutes — this is the primary error</span></button><button class="opt-btn" data-q="q37" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Two errors: (1) HLD time 18 minutes is below the 20-minute minimum — cannot be shortened for any reason; (2) Glutaraldehyde concentration must be tested with test strips before every HLD batch — below 1.5% is ineffective against mycobacteria. Both represent scope safety failures with potential patient infection risk. Review all patients scoped with this batch.</span></button><button class="opt-btn" data-q="q37" data-val="C"><span class="opt-letter">C</span><span class="opt-text">The concentration strip is a NABH documentation requirement only — not clinically significant</span></button><button class="opt-btn" data-q="q37" data-val="D"><span class="opt-letter">D</span><span class="opt-text">18 minutes is within acceptable variation — 2 minutes either way is clinically equivalent</span></button></div></div>
</div>
<div class="q-card" data-id="q38">
  <div class="q-hdr"><span class="q-num">Q38</span><span class="diff diff-hard">hard</span><span class="q-type">4p_philosophy</span></div>
  <div class="q-body"><p>A patient with moderate COPD is admitted for exacerbation. The nursing team focuses entirely on nebulisation, oxygen therapy, and medication administration during the admission. At discharge, no patient education on inhaler technique, exacerbation triggers, or action plan is provided. In the 4P framework, what is missing?</p><div class="opts"><button class="opt-btn" data-q="q38" data-val="A"><span class="opt-letter">A</span><span class="opt-text">P4 — personalised medication was not optimised</span></button><button class="opt-btn" data-q="q38" data-val="B"><span class="opt-letter">B</span><span class="opt-text">P1 — Preventive care was entirely absent. The purpose of P1 is preventing recurrent hospitalisations through education, action plans, and trigger identification. An admission without P1 interventions (inhaler technique, trigger counselling, written action plan) misses the most critical opportunity to prevent the next exacerbation. Every admission is a P1 teachable moment.</span></button><button class="opt-btn" data-q="q38" data-val="C"><span class="opt-letter">C</span><span class="opt-text">P2 — predictive assessment was not done during admission</span></button><button class="opt-btn" data-q="q38" data-val="D"><span class="opt-letter">D</span><span class="opt-text">P3 — participative rehabilitation was not started during admission</span></button></div></div>
</div>
<div class="q-card" data-id="q39">
  <div class="q-hdr"><span class="q-num">Q39</span><span class="diff diff-medium">medium</span><span class="q-type">governance</span></div>
  <div class="q-body"><p>The nursing team has been using hydrogen peroxide routinely for all wound dressings, citing &#39;standard practice from previous hospital.&#39; You review the wound care SOP.</p><div class="opts"><button class="opt-btn" data-q="q39" data-val="A"><span class="opt-letter">A</span><span class="opt-text">H₂O₂ is appropriate for infected wounds — restrict it to those cases</span></button><button class="opt-btn" data-q="q39" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Hydrogen peroxide is CYTOTOXIC to granulation tissue and impairs wound healing — it must NOT be used routinely. Normal saline is the only routine wound cleaning solution. This is a systemic practice error, not an individual one. Conduct immediate team education, update the wound dressing register with correct solution, and document as a quality improvement action. Review healing progress of all recently dressed wounds.</span></button><button class="opt-btn" data-q="q39" data-val="C"><span class="opt-letter">C</span><span class="opt-text">H₂O₂ is acceptable for necrotic wounds — restrict to those</span></button><button class="opt-btn" data-q="q39" data-val="D"><span class="opt-letter">D</span><span class="opt-text">The previous hospital&#39;s protocol is legitimate — get their SOP and review</span></button></div></div>
</div>
<div class="q-card" data-id="q40">
  <div class="q-hdr"><span class="q-num">Q40</span><span class="diff diff-hard">hard</span><span class="q-type">identify_error</span></div>
  <div class="q-body"><p>BOUNCER — A TB-suspect patient has sputum CBNAAT ordered. The nursing note documents: &#39;Sputum collected — clear watery specimen accepted. Formalin added to preserve specimen for transport. Nurse wore surgical mask.&#39; Three errors are present.</p><div class="opts"><button class="opt-btn" data-q="q40" data-val="A"><span class="opt-letter">A</span><span class="opt-text">One error: the specimen was clear and should have been rejected</span></button><button class="opt-btn" data-q="q40" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Three errors: (1) Clear watery specimen = saliva, not sputum — must be rejected and recollected as deep cough mucoid/purulent specimen; (2) Formalin DESTROYS GeneXpert DNA — CBNAAT specimens must NEVER have formalin added; (3) TB sputum collection is an aerosol-generating procedure — N95 mandatory for staff, surgical mask for the patient. All three errors compromise patient safety and diagnostic accuracy.</span></button><button class="opt-btn" data-q="q40" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Two errors: specimen quality and PPE — formalin preserves not destroys DNA</span></button><button class="opt-btn" data-q="q40" data-val="D"><span class="opt-letter">D</span><span class="opt-text">The main error is the PPE — the other two are less significant</span></button></div></div>
</div>
<div class="sec-hdr">Reception Oversight (Q41–Q50)</div>
<div class="q-card" data-id="q41">
  <div class="q-hdr"><span class="q-num">Q41</span><span class="diff diff-medium">medium</span><span class="q-type">identify_error</span></div>
  <div class="q-body"><p>You are running 45 minutes late in OPD. A patient has been waiting 90 minutes. The receptionist has not escalated, notified the patient, or updated the wait board. The patient complains to you directly.</p><div class="opts"><button class="opt-btn" data-q="q41" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Apologise directly and continue — this is an unavoidable OPD delay</span></button><button class="opt-btn" data-q="q41" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Escalation threshold is 45 minutes — this should have happened 45 minutes ago. As HOD, your response: acknowledge the patient, give a realistic time estimate, ensure the receptionist understands the escalation protocol (45 min = mandatory escalation to HOD, proactive patient communication, HIS delay log). Review why escalation did not happen — training gap or process gap.</span></button><button class="opt-btn" data-q="q41" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Ask the receptionist to give the next token to this patient</span></button><button class="opt-btn" data-q="q41" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Issue a written apology — patient relations protocol</span></button></div></div>
</div>
<div class="q-card" data-id="q42">
  <div class="q-hdr"><span class="q-num">Q42</span><span class="diff diff-hard">hard</span><span class="q-type">governance</span></div>
  <div class="q-body"><p>You review three consecutive cases where post-exacerbation COPD patients were referred to IPR more than 6 weeks after discharge. Investigation reveals the reception team was unaware that PFT booking instructions should include IPR referral timelines for post-exacerbation patients. What is the systemic issue?</p><div class="opts"><button class="opt-btn" data-q="q42" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Refer all COPD patients to IPR immediately — eliminate referral delay</span></button><button class="opt-btn" data-q="q42" data-val="B"><span class="opt-letter">B</span><span class="opt-text">This is a handover system failure between clinical and administrative teams. Reception must be briefed on clinical priority pathways — post-exacerbation IPR referral within 4 weeks is time-sensitive. A simple clinical flag in HIS (&#39;post-exacerbation: IPR referral urgent within 4 weeks&#39;) visible to reception would prevent this. Implement the flag, brief reception on the 4-week window, and audit retrospectively.</span></button><button class="opt-btn" data-q="q42" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Reception should not be involved in clinical pathway — doctors must make all referrals</span></button><button class="opt-btn" data-q="q42" data-val="D"><span class="opt-letter">D</span><span class="opt-text">The issue is doctor referral timing — reception is not responsible</span></button></div></div>
</div>
<div class="q-card" data-id="q43">
  <div class="q-hdr"><span class="q-num">Q43</span><span class="diff diff-medium">medium</span><span class="q-type">identify_error</span></div>
  <div class="q-body"><p>A TPA patient has a procedure at MIP. Post-procedure, billing is raised based on the assumed co-pay rate. The patient is then told the actual co-pay — which is higher than expected. The patient is upset; the TPA card was not scanned in HIS pre-procedure.</p><div class="opts"><button class="opt-btn" data-q="q43" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Billing disputes are managed by the finance team — not a clinical concern</span></button><button class="opt-btn" data-q="q43" data-val="B"><span class="opt-letter">B</span><span class="opt-text">TPA empanelment must be verified on the portal AND card scanned in HIS BEFORE the patient sees the doctor — co-pay must be communicated before service, not after. This is a reception SOP failure with a direct patient trust and financial impact. The patient had no informed consent on financial liability. Review the specific transaction, address the patient&#39;s concern, and retrain reception on TPA pre-verification protocol.</span></button><button class="opt-btn" data-q="q43" data-val="C"><span class="opt-letter">C</span><span class="opt-text">The TPA should have communicated the co-pay rate — this is the insurer&#39;s failure</span></button><button class="opt-btn" data-q="q43" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Accept the co-pay dispute and waive the difference — patient retention priority</span></button></div></div>
</div>
<div class="q-card" data-id="q44">
  <div class="q-hdr"><span class="q-num">Q44</span><span class="diff diff-hard">hard</span><span class="q-type">identify_error</span></div>
  <div class="q-body"><p>A patient&#39;s OPD file is left open on the reception desk while the receptionist attends to a phone call. Another patient in the waiting area reads the file contents. The first patient later complains about a breach of confidentiality.</p><div class="opts"><button class="opt-btn" data-q="q44" data-val="A"><span class="opt-letter">A</span><span class="opt-text">The waiting area patient should not have read another person&#39;s file</span></button><button class="opt-btn" data-q="q44" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Patient files must never be left unattended or open where other patients can view them — this is a confidentiality breach under NABH standards and the IT Act 2000. Files must be closed and face-down or locked in HIS when not actively in use. This is a training and process failure, not just a one-off incident. Review the physical layout of the reception counter and implement screen/file privacy barriers.</span></button><button class="opt-btn" data-q="q44" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Files should be stored digitally — physical files are the problem</span></button><button class="opt-btn" data-q="q44" data-val="D"><span class="opt-letter">D</span><span class="opt-text">The patient should have been more discrete when reading the file</span></button></div></div>
</div>
<div class="q-card" data-id="q45">
  <div class="q-hdr"><span class="q-num">Q45</span><span class="diff diff-medium">medium</span><span class="q-type">governance</span></div>
  <div class="q-body"><p>A patient with newly diagnosed severe OSA (AHI 52, ESS 18, on no treatment) drives to MIP for follow-up. The receptionist books the next appointment without flagging driving safety. What is the clinical governance issue?</p><div class="opts"><button class="opt-btn" data-q="q45" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Driving safety is the patient&#39;s personal responsibility</span></button><button class="opt-btn" data-q="q45" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Severe OSA with Epworth Sleepiness Scale 18 is an unacceptable driving risk — you as the treating physician have a duty to advise against driving until OSA is adequately treated (AHI &lt;5 on CPAP for at least 4 weeks). This must be documented in the clinical note. Reception staff should be aware that severe OSA patients should be flagged for this counselling — it can be built into the HIS appointment note as a clinical prompt.</span></button><button class="opt-btn" data-q="q45" data-val="C"><span class="opt-letter">C</span><span class="opt-text">ESS 18 is not severe enough to advise driving cessation</span></button><button class="opt-btn" data-q="q45" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Only patients on sedating medications need driving advice</span></button></div></div>
</div>
<div class="q-card" data-id="q46">
  <div class="q-hdr"><span class="q-num">Q46</span><span class="diff diff-hard">hard</span><span class="q-type">identify_error</span></div>
  <div class="q-body"><p>A patient for PFT is checked in by reception. She mentions she had Tiotropium Respimat this morning, a heavy lunch 90 minutes ago, and smoked one cigarette 3 hours ago. The receptionist sends her to the PFT lab.</p><div class="opts"><button class="opt-btn" data-q="q46" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Only the LAMA withhold is a concern — the PFT must be rescheduled</span></button><button class="opt-btn" data-q="q46" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Three pre-test instruction failures: (1) LAMA (Tiotropium) must be withheld 24 hours before BD spirometry — session cannot proceed; (2) Heavy meal must be avoided 2 hours prior — 90 minutes is insufficient; (3) No smoking 4 hours prior — 3 hours is insufficient. All three violations were present because pre-test instructions were not given at booking. This is a reception SOP failure. Reschedule; issue instruction sheet in regional language; SMS reminder 1 day before.</span></button><button class="opt-btn" data-q="q46" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Only the smoking is a concern — 3 hours is close enough for practical purposes</span></button><button class="opt-btn" data-q="q46" data-val="D"><span class="opt-letter">D</span><span class="opt-text">The PFT can proceed — note pre-test deviations on the report</span></button></div></div>
</div>
<div class="q-card" data-id="q47">
  <div class="q-hdr"><span class="q-num">Q47</span><span class="diff diff-hard">hard</span><span class="q-type">4p_philosophy</span></div>
  <div class="q-body"><p>A patient comes to MIP OPD for the first time with a referral for &#39;possible asthma.&#39; The receptionist books them directly for consultation. In the 4P framework, what is the ideal first-visit pathway that reception should facilitate?</p><div class="opts"><button class="opt-btn" data-q="q47" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Direct to doctor — history-taking establishes the P2 profile</span></button><button class="opt-btn" data-q="q47" data-val="B"><span class="opt-letter">B</span><span class="opt-text">The ideal first-visit pathway should include nurse vitals and triage (P1 screening), then AOS + FeNO + spirometry (P2 predictive profile) before the consultation — so the doctor has the complete investigative picture at the first visit. Reception&#39;s role is to ensure this sequence is booked together as a first-visit bundle. The doctor sees the patient WITH the data, not before it. Reception staff must understand why this sequence matters.</span></button><button class="opt-btn" data-q="q47" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Book consultation first; investigations at a separate visit after clinical assessment</span></button><button class="opt-btn" data-q="q47" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Book investigations only — no consultation until all tests are complete</span></button></div></div>
</div>
<div class="q-card" data-id="q48">
  <div class="q-hdr"><span class="q-num">Q48</span><span class="diff diff-medium">medium</span><span class="q-type">identify_error</span></div>
  <div class="q-body"><p>End-of-shift handover note reads: &#39;Pending reports: 3. Unresolved complaints: 1. Appointment changes: 2. Cash reconciled: ₹18,240.&#39; Incoming staff were briefed verbally. The outgoing receptionist left without signing the handover register.</p><div class="opts"><button class="opt-btn" data-q="q48" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Verbal briefing is adequate — the written note covers all essentials</span></button><button class="opt-btn" data-q="q48" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Handover register must be SIGNED by both outgoing and incoming staff — this is a formal accountability transfer. Without countersignature from incoming staff, the handover is incomplete and unverified. Pending items must be highlighted in RED in the register (not just listed). The 1 unresolved complaint must have a named action owner and timeline for resolution. Recall the outgoing receptionist to complete the formal handover sign-off.</span></button><button class="opt-btn" data-q="q48" data-val="C"><span class="opt-letter">C</span><span class="opt-text">The handover note is complete — signature can be added the next day</span></button><button class="opt-btn" data-q="q48" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Verbal briefing with a written note is sufficient — joint signature is optional</span></button></div></div>
</div>
<div class="q-card" data-id="q49">
  <div class="q-hdr"><span class="q-num">Q49</span><span class="diff diff-hard">hard</span><span class="q-type">governance</span></div>
  <div class="q-body"><p>You review 6 months of grievance register data. You notice 80% of complaints involve wait times exceeding 45 minutes, and in only 12% of cases was escalation to HOD documented. What is the systemic governance response?</p><div class="opts"><button class="opt-btn" data-q="q49" data-val="A"><span class="opt-letter">A</span><span class="opt-text">Increase OPD session slots — the problem is capacity</span></button><button class="opt-btn" data-q="q49" data-val="B"><span class="opt-letter">B</span><span class="opt-text">The data shows the escalation protocol is not being followed consistently — 88% of qualifying wait complaints did not reach HOD. This is a training and process audit finding. Response: (1) Retrain reception on 45-minute escalation threshold; (2) Add HIS auto-flag at 45-minute wait time; (3) Monthly complaint analysis report to Quality Committee; (4) HOD should review wait time data weekly, not reactively. The 45-minute rule is the P1 prevention mechanism — it prevents complaints before they become escalated grievances.</span></button><button class="opt-btn" data-q="q49" data-val="C"><span class="opt-letter">C</span><span class="opt-text">Hire additional reception staff — the queue is too large for current staffing</span></button><button class="opt-btn" data-q="q49" data-val="D"><span class="opt-letter">D</span><span class="opt-text">Accept complaints as unavoidable in a pulmonology OPD — complex patients need more time</span></button></div></div>
</div>
<div class="q-card" data-id="q50">
  <div class="q-hdr"><span class="q-num">Q50</span><span class="diff diff-hard">hard</span><span class="q-type">identify_error</span></div>
  <div class="q-body"><p>BOUNCER — You are reviewing MIP&#39;s first quarter after full SOP implementation. Nursing ABHR compliance is 72% (NABH target ≥80%). Scope reprocessing logs have 3 missing glutaraldehyde concentration entries. The IPR team has no shared HIS care plan template. Reception has no record of pre-test PFT instructions being given in the past month. What is the highest-priority patient safety risk among these findings?</p><div class="opts"><button class="opt-btn" data-q="q50" data-val="A"><span class="opt-letter">A</span><span class="opt-text">ABHR compliance at 72% — infection risk is the highest priority</span></button><button class="opt-btn" data-q="q50" data-val="B"><span class="opt-letter">B</span><span class="opt-text">Missing glutaraldehyde concentration entries are the highest-priority safety risk — if concentration was below 1.5% on those days, patients were scoped with potentially inadequately disinfected instruments (mycobacteria and viral transmission risk). This is an immediate retrospective patient safety issue requiring: (1) identify patients from those dates, (2) assess clinical risk, (3) consider notification if risk is significant, (4) implement immediate corrective action. The other findings are serious but do not carry the same immediate harm potential.</span></button><button class="opt-btn" data-q="q50" data-val="C"><span class="opt-letter">C</span><span class="opt-text">IPR shared care plan absence — missed coordination is the priority</span></button><button class="opt-btn" data-q="q50" data-val="D"><span class="opt-letter">D</span><span class="opt-text">PFT instruction failure — all those patients have invalid test results</span></button></div></div>
</div>`,
};

</script>
